  {cat:"デバッグ / 環境",situation:"調査の結果、zb-kintai は 18080 の Docker backend が seed 済みDBで正常稼働しており、そこで手動QAの観点1・2がそのまま実施できると分かった。環境整理(ホスト air に統一 等)も提案されたが任意とされた。今すぐQAを進めたい。",q:"今すぐ手動QAを進めるうえで最適な判断は？",options:["環境が混乱しているので、まず環境整理(Bの統一作業)を完了させてからQAに着手する","既に正常稼働している 18080 をそのまま使ってQAを進め、環境整理は任意なので後回しにする","8080 で動いていないQAはできないので、8080 を空けて zb-kintai を置き直してから始める","複数ポートで動いていて不安定なので、全プロセスを一度落としてから1つずつ起動し直す"],answer:1,explain:"目的は『手動QAを今すぐ進める』こと。18080 の Docker backend が現行コード・seed済みDBで正常に動いており、渡したQA観点がそのまま実施できると確認できている=最短でゴールに行ける道が既にある。環境整理(ホスト air に統一する等)は『あると望ましい』が任意で、QAの前提条件ではないので後回しでよい。先に整理を済ませる/8080に置き直す/全部落として再起動は、いずれも今やる必要のない作業を増やしてQA着手を遅らせる。『動いているものを使い、片付けは別途』とスコープを切るのが正しい(目的に最短で効く道を選ぶ)。"},
  {cat:"基礎 / Git",situation:"ローカルに feat/#99 や feat/97-terminal-setup など過去のブランチが何本も残っている。『整理(削除)した方がいい?』『容量を食っているから消すべき?』という疑問が出た。",q:"ローカルブランチを削除する主な理由として正しいのは？",options:["ブランチはディスク容量を大きく消費するので、容量を空けるために消すべきだから","容量はほぼ食わない。削除の狙いは一覧の見通しを良くし、古いブランチへ誤ってcheckout・派生する取り違え事故を防ぐことだから","残っているとそのブランチのCIが動き続けてコストがかかるので止めるために消すから","ローカルに多くのブランチがあるとリモートのpush/pullが遅くなるのを防ぐため"],answer:1,explain:"ローカルブランチの実体は『あるコミットを指すポインタ(数十バイト)』にすぎず、コミットの中身は共有の.gitに既にある=何本あっても容量はほぼ食わない。だから削除の目的は容量ではなく『git branch 一覧の見通しを良くする』『用済みの古いブランチに誤って checkout したり派生したりする取り違え事故を防ぐ』こと(=過去に出た『古い派生元で作業し続ける事故』の予防)。CIはリモート/PR起点で動くのでローカルブランチ放置とは無関係、push/pull速度にも影響しない。"},
  {cat:"基礎 / Git",situation:"今回のタスク範囲外として残した feat/#99 等のローカルブランチを『整理したいなら別途』と提案された。だが feat/#99 はまだ develop に未マージで、他の作業の依存元になりうるブランチでもある。",q:"ローカルブランチを消すかどうかの判断基準は？",options:["ローカルが散らかるので、当面使わないものは未マージでも一律に消してよい","『もう用済みか(マージ済み・役割を終えたか)』で判断する。未マージで依存元になりうるブランチは消すと困るため残す","作成日が古い順に機械的に消し、新しいものだけ残すのが安全","リモートにも同名ブランチがあるものはローカルから消してよい(リモートから復元できるから)"],answer:1,explain:"削除の判断軸は『容量』でも『古さ』でもなく『もう用済みか』。PRがマージ済みで役割を終えたブランチは消して安全だが、feat/#99 のように未マージで他作業の依存元になりうるものは、消すと必要なコードの起点を失って困る。だから一律削除や日付での機械削除は危険。『リモートにあるから』も、リモート側も消えていれば復元できないため万能ではない。マージ済み(git branch --merged で確認)を基準に、用済みのものだけ消すのが安全。"},
  {cat:"基礎 / Git",situation:"用済みと判断したローカルブランチを削除する。コマンドには git branch -d <名前> と git branch -D <名前> がある。",q:"-d と -D の違いと、どちらを使うべきか？",options:["-d は確認なしで即削除、-D は確認ダイアログを出してから削除する。安全なので -D を使う","-d は『マージ済みでないと削除を拒否する安全版』、-D は『未マージでも強制削除』。まず -d を使い、拒否されたら本当に不要か確認する","-d はローカルのみ、-D はリモートも同時に削除する。手元だけ消すなら -D を使う","-d は1本ずつ、-D は全ブランチを一括削除する。まとめて消すなら -D が便利"],answer:1,explain:"git branch -d は『そのブランチが(現在のブランチ等に)マージ済みでなければ削除を拒否する』安全版で、まだ取り込まれていない変更を誤って失うのを防ぐガードになっている。-D は大文字=強制で、未マージでも問答無用で消す。だから基本は -d を使い、もし『マージされていないので消せない』と拒否されたら、それは『まだ生きている変更があるサイン』なので、本当に捨ててよいか確認してから初めて -D を検討する。確認ダイアログ・リモート同時削除・一括削除といった違いではない。"},
  {cat:"基礎 / Git",situation:"『今回のタスク範囲外なので過去のブランチには触っていません。整理したい場合は別途お申し付けください』という報告があった。",q:"この『範囲外なので触らず、整理は別途』という進め方の意図は？",options:["面倒な作業を避けて相手に押し付けるための、責任回避の言い回しだから","今回の目的に無関係なブランチ整理を勝手に巻き込まず作業範囲を保ちつつ、整理という別タスクの存在は伝えて判断を委ねるため(1作業=1目的)","ブランチ削除は危険すぎて自分では実行できない操作だから、必ず依頼者にやってもらう決まりだから","整理は次回のタスクで必ずやる約束なので、その予約として書いているだけだから"],answer:1,explain:"今回の目的に関係ないブランチ整理を勝手に実行すると、作業範囲が広がり(消して困るものを消す等の)事故リスクも増える。だから『範囲外なので触らない』でスコープを保ちつつ、『整理という別の作業が可能』という情報は伝えて、やるかどうかの判断を相手に委ねる=1作業=1目的を守りながら気づきは共有する、という姿勢。責任回避でも、危険だから必ず他人に、でも、次回必ずやる予約でもない。"},
  {cat:"設計判断",situation:"Secret Manager からのシークレット取得方式で迷う。(1)参照解決方式=環境変数に sm://.../jwt-key/... の『参照』を入れ起動時に解決。汎用でテストしやすく設計的に筋が良い。(2)固定名フェッチ=jwt-key/csrf-key/db-password など固定名で取得。だが Issue #86 のタスク分解は『シークレット定義(jwt-key, csrf-key, db-password)』『取得する loader 実装』と固定名を明示列挙しており、(2)に近い。",q:"『設計的に良い案(1)』と『Issueが明示する案(2)』が食い違うとき、どう進めるべき？",options:["設計的に優れている(1)参照解決方式が客観的に正しいので、Issueの記述より設計の良さを優先して(1)で進める","まず Issue が明示列挙した固定名(2)を一次情報として尊重し要件を満たす。(1)の方が良いと考えるなら、勝手に置き換えず理由を添えて提案・合意してから変える","Issueは参考程度なので、実装者が良いと思う(1)で進めて事後にIssueを実装に合わせて書き換える","どちらも一長一短で決められないため、両方式を実装して切り替え可能にしておく"],answer:1,explain:"Issue #86 は『jwt-key, csrf-key, db-password を定義』『取得する loader を実装』と固定名を明示しており、これが要件の一次情報。設計的に参照解決方式の方が汎用でテストしやすいとしても、要件と食い違うなら勝手に置き換えるのは要件未達のリスクがある。正しいのは、まず明示要件(固定名フェッチ)を尊重しつつ、より良い案があるなら『なぜ参照解決が良いか』を理由とともに提案し合意を得てから変えること(=Issueの推奨と調査結果が食い違うときの判断・明示要件は満たすか合意の上で変える、と同根)。設計の良さは要件を無視してよい理由にならないし、事後にIssueを実装へ合わせる/両方実装は筋が悪い。"},
  {cat:"設計判断",situation:"Issue は明示的に『アプリ側のシークレットローダー実装』を求めている。一方 Cloud Run の機能を使えば Secret Manager の値をネイティブに環境変数へ注入でき、アプリ側はその環境変数を検証するだけでよく、SDKもローダーも不要にできる(運用手順とdocで担保)。",q:"Cloud Runネイティブ注入で『アプリ側ローダーを作らない』案をどう評価する？",options:["コードが最少で済みSDK依存も避けられるので、最も筋が良くこれを採用すべき","コード量は減るが Issue が明示的に求める『アプリ側ローダー』を実装しないため要件未達になる。運用手順での代替は要件の置き換えにならない","ローダーを作るかは実装者の自由なので、楽な方を選んで問題ない","ネイティブ注入は本番でしか動かないので、テストが書けず必ず不採用にすべき"],answer:1,explain:"技術的には Cloud Run のネイティブ注入でローダー無しでも動かせる(コード最少・SDK不要)。だが Issue は『アプリ側のローダー実装』を明示要件として挙げている。要件で求められたものを『運用手順とdocで担保するから実装しない』と置き換えるのは、要件未達(別物で代替)になる。プラットフォーム機能で楽にできることと、要件が指定した実装方針を満たすことは別問題で、要件を変えたいなら勝手に省略せず提案・合意を取るべき。『楽だから省く』『自由だから好きに』ではなく、明示要件は満たすか合意の上で変える。"},
  {cat:"スコープ設計",situation:"GCP Secret Manager SDK を今回追加するか。Issue #86 の DoD は『本番起動時に Secret Manager から JWT/CSRF/DB 鍵が取得される』を受け入れ基準に挙げ、依存関係に『ブロック: A-1/A-2(認証で必須)』とある。案: (1)実クライアントも実装=SDK追加し本番フェッチまで動かす(ローカル統合テストは不可だがインターフェース+fakeで単体テスト)、(2)インターフェースのみ=境界とロジックだけ実装し実配線は後続PR(このPRはテスト完結だが本番フェッチは未稼働)。",q:"このIssueを完結させる前提で、SDKの扱いとしてベストは？",options:["(2)インターフェースのみ。1PR=1目的で最も綺麗に分割でき、テストも完結するから","(1)実クライアントも実装。DoD『本番起動時にSMから取得される』を実際に満たせてIssueをクローズでき、ブロックしているA-1/A-2も待たせずに済むから","(2)インターフェースのみにして、DoDは後続PRで満たす前提のまま今回はIssueをクローズするから","(1)を選びつつ、ローカルで統合テストできないので単体テストも省いて本番確認だけに委ねるから"],answer:1,explain:"判断の基準は『このIssueのDoD』。DoDは『本番起動時にSMから取得される』を求めており、(2)インターフェースのみだと本番フェッチが未稼働=DoD未達でIssue #86をクローズできない。さらに依存関係でA-1/A-2がこのIssue完了を待っている=早く満たして閉じる価値が高い。だから本IssueのDoDを変えないなら(1)が正しい。(2)は工学的に綺麗だが『DoDより1PR分割を優先』した要件未達で、分割したいならDoD自体をインターフェース編/実配線編に分け直すのが前提。DoD未達のままクローズや、統合不可を口実に単体テストまで省くのは不可。設計の良さは要件(DoD)を満たさない理由にならない。"},
  {cat:"基礎 / 設計",situation:"シークレット取得を『Resolver』というインターフェース(取得する、という約束だけを定めた窓口)として定義し、本番では実 Secret Manager クライアント、テストでは fake(固定値を返す偽実装)を差し込めるようにする。",q:"取得処理をインターフェースにして実装を差し替え可能にする利点は？",options:["インターフェースを挟むと実行速度が上がり、シークレット取得が高速になるから","本番は実クライアント・テストは fake と実装を差し替えられ、実GCPに繋がなくてもロジック(パース・検証・フォールバック)をテストできるから","インターフェースにすると外部依存が自動的に不要になり、SDKを一切入れずに済むから","インターフェースを使うと型チェックが無効化され、どんな実装でも通せるようになるから"],answer:1,explain:"インターフェース(=『こう呼べばシークレットが返る』という約束)を挟むと、その約束を満たす実装を自由に差し込める。本番は実 Secret Manager クライアント、テストは固定値を返す fake、というように。すると実GCPに繋がらない環境でも、fake を使って『参照のパース・検証・.envフォールバック』といった自分のロジックを完全にテストできる。速度向上や型無効化のためではなく、外部依存を切り離してテスト可能にし、実装を後から差し替えられる柔軟性を得るための設計(依存性逆転)。"},
  {cat:"設計判断",situation:"Secret Manager と .env を切り替える条件を決める。案: (1)GCP_PROJECT_ID の有無=設定されていれば Secret Manager から取得、無ければ .env、(2)APP_ENV=production で自動=本番のみ Secret Manager、development/test は .env。Issue は『本番では Secret Manager』と書いている。",q:"切替条件としてベストは？",options:["(2)APP_ENV=production で自動。Issue の『本番 Secret Manager』記述に直接沿い、環境名で明快に分かれるから","(1)GCP_PROJECT_ID の有無。本番/開発という環境名に依存せず、staging など本番そっくりの環境でも SM 接続を実際に試せてテストしやすいから","切替は設けず常に Secret Manager を使い、ローカルにも必ず GCP 接続を要求するのが一貫していて良いから","起動時に両方から取得を試し、成功した方を採用する自動フォールバックにするのが堅牢だから"],answer:1,explain:"『production かどうか』で切り替えると、本番そっくりの staging 環境では production ではないため Secret Manager 接続を本番前に実際に試せない=本番でしか動作確認できない穴ができる。一方『GCP_PROJECT_ID があるか』で切り替えれば、環境名に縛られず『GCPに繋ぐ設定があるかどうか』という実態で判定でき、staging でも SM を試せてローカルは .env で動く。これは『環境ごとに値を切り替えるが、判定は環境名でなく能力(設定の有無)で行う』設計。常時SM強制はローカル開発を壊し、両方試す自動フォールバックは挙動が読みにくく危険。"},
  {cat:"設計判断",situation:"db-password(DB資格情報)の扱いを決める。既存 config は DATABASE_URL 単一構成(接続文字列1本にホスト・ユーザー・パスワード等が全部入る)。案: (1)DATABASE_URL 全体を database-url というシークレット名で取得(パスワードを含む)=既存の単一構成を維持し最小変更、(2)パスワードのみ Secret Manager、ホスト/ユーザー/DB名は環境変数で URL を組み立て=Issue の db-password に厳密だが config・接続コードの変更が大きい。",q:"既存が DATABASE_URL 単一構成のとき、ベストは？",options:["(2)パスワードのみ取得。Issue が db-password と書いている以上、パスワード単体で管理するのが要件に最も忠実だから","(1)DATABASE_URL 全体を取得。既存の単一構成を壊さず最小変更で済み、接続コードもそのまま使えるから","DATABASE_URL を廃止し、ホスト・ユーザー・パスワードを個別のシークレットに分割して持つのが最も整理されるから","パスワードは Secret Manager、それ以外はコードに直書きして接続文字列を再構築するのが速いから"],answer:1,explain:"既存が『DATABASE_URL という1本の接続文字列』で動いているなら、その文字列まるごとを1つのシークレット(database-url)にして取得するのが、既存の config・接続コードを変えずに済む最小変更。Issue の文言は db-password だが、それは『DB資格情報を秘匿する』という意図の表現であって、必ずパスワード単体に分解せよという意味とは限らない=既存構成という一次情報を確かめると全体取得が筋。パスワード単体取得や個別分割は config と接続コードの改修が大きく、今回のスコープに対し変更過剰。文言の字面より既存実装と意図に合わせる(前回の固定名の教訓と同根)。"},
  {cat:"基礎 / 環境",situation:"環境の切替を『APP_ENV=production か』で判定すると、本番そっくりに作った staging 環境は production ではないため、本番用の経路(Secret Manager 接続など)が staging では動かず、本番で初めて実行されることになる。",q:"『production だけ特別扱い』の切替が危ういのはなぜ？",options:["production という文字列は環境変数に設定し忘れやすく、タイプミスで動かなくなるから","本番だけ通る経路を本番前のどの環境でも実行・検証できず、本番で初めて動く=事前に問題を見つけられないから","production 環境はアクセスが集中するため、その判定処理自体が高負荷になるから","APP_ENV は将来廃止予定の古い環境変数で、新しい仕組みでは使えないから"],answer:1,explain:"staging は『本番そっくりの最終確認の場』。なのに『production のときだけ Secret Manager』のような分岐にすると、staging は production ではないのでその経路を通らず、本番用の動作を本番に出すまで一度も検証できない。問題があっても本番で初めて露呈する。だから『本番だけ特別』ではなく、staging でも本番と同じ経路を通せる判定(例: GCP_PROJECT_ID の有無)にして、本番前に同じ道を歩いて確認できるようにするのが安全。タイプミスや負荷・廃止予定が理由ではなく『本番前に検証できない経路を作らない』という原則。"},
  {cat:"設計判断",situation:"前回 Issue の文面(db-password)だけを見て、設計者がパスワード単体管理を選ぼうとした。だが既存 config を確認すると DATABASE_URL 単一構成で、パスワード単体ではない実態があった。Issue の文面と既存実装が食い違っていた。",q:"Issue の文言と既存実装が食い違うとき、どう確かめるべき？",options:["Issue は最新の意思決定なので、既存実装が違っても Issue の文言どおりに実装する","Issue の文言(db-password)を字面どおり受け取らず、既存実装(DATABASE_URL単一構成)という一次情報を確認し、文言の意図を満たしつつ既存に最小変更で乗る形を選ぶ","既存実装が正なので Issue は無視し、既存の DATABASE_URL をそのまま使い続けて新規対応はしない","食い違っている時点で判断不能なので、Issue 起票者が直すまで実装を止める"],answer:1,explain:"Issue の『db-password』は要件の表現だが、既存が DATABASE_URL 単一構成なら、字面どおりパスワード単体に分解すると既存を大きく壊す。正しいのは、Issue の文言を鵜呑みにせず既存実装(一次情報)を確認し、『DB資格情報を Secret Manager で秘匿する』という意図を満たしつつ既存構成に最小変更で乗る形(DATABASE_URL 全体取得)を選ぶこと。Issue 文言の機械的遵守も、Issue 全無視も、判断停止も不適切で、『文言の意図 × 既存の実態』を突き合わせて落とし所を決め、必要なら提案・確認する(設計の良し悪し以前に、まず一次情報を見る)。"},
  {cat:"スコープ設計",situation:"『重い外部依存(SDK)を伴う実装は後続PRに分離し、このPRは境界とテストだけにする』という分割案は一般に綺麗だ。だが今回の Issue #86 は DoD に『本番起動時にSMから取得される』を明記しており、分割するとこのDoDが今回のPRでは満たせない。",q:"『1PR=1目的の分割』を採るかどうかは、何を基準に決めるべき？",options:["分割は常に正義なので、DoDが何であれ重い依存は必ず後続PRに分けるべき","そのIssue/PRのDoD(受け入れ基準)を基準にする。DoDが本番稼働まで求めるなら分割せず満たし、分割したいならDoD自体を分け直して合意する","PRの行数が一定を超えそうかどうかだけで機械的に分割を決めるべき","レビュアーの負荷が下がるかどうかだけを基準に、常に小さく分割するのを優先すべき"],answer:1,explain:"『1PR=1目的で分割』は良い原則だが、無条件の正義ではなく、そのIssueのDoD(=何をもって完了とするか)に従属する。DoDが『本番起動時に取得される』まで求めているなら、インターフェースだけ実装して実配線を後続に回すとDoD未達=Issueを閉じられない。どうしても分割したいなら、DoDを『インターフェース編』『実配線編』に分け、Issueも分割して合意するのが筋(DoDを満たさない分割は要件未達)。行数やレビュー負荷は補助的な観点で、第一基準はDoD。『分割という手段』が『完了の定義(DoD)』を上書きしてはいけない。"},
  {cat:"テスト / スコープ",situation:"Issue #86 の DoD を満たすには実 Secret Manager クライアントを実装し本番フェッチを動かす必要がある。だがローカルは実GCPに繋がらず、実クライアント経路の統合テストはローカルで書けない。",q:"『DoD達成に必要だが、ローカルで統合テストできない実装』をどう扱うのがベスト？",options:["ローカルで統合テストできない実装はテストで守れず危険なので、その部分の実装自体を見送る","実クライアント経路はインターフェース+fakeで単体テストし、ロジック(パース/検証/フォールバック)を守った上で、実GCPに依存する配線は本番相当(staging)で動作確認する","統合テストが書けない以上、単体テストも含めてテストは全部省き、本番での目視確認だけに頼る","実GCPに繋ぐ統合テストをローカルでも必ず通すため、テスト時に本物のSMへ毎回アクセスする"],answer:1,explain:"『実GCP依存なのでローカル統合テスト不可』でも、テストを諦める必要はない。インターフェース+fakeで自分のロジック(参照パース・必須検証・fail-fast・.envフォールバック)は完全に単体テストでき、実GCPに依存する薄い配線部分だけを本番相当(staging)で確認すればよい=テストできる所は最大限テストし、できない所だけ実環境検証に回す切り分け。実装を見送るとDoD未達、テスト全省略は無謀、テストで毎回本物のSMに繋ぐのは遅く不安定でCIに不向き。『外部依存はfakeで境界をテストし、実配線はstagingで確認』が定石(stagingで本番経路を事前に通せるのも、環境名でなく能力で切り替える設計の利点)。"},
  {cat:"基礎 / 心構え",situation:"設計者(AI)が当初『SDKはインターフェースのみが綺麗』と判断したが、依頼者の指摘で Issue #86 のDoDを読み直すと『本番起動時にSMから取得される』が受け入れ基準で、実クライアント実装まで必要だと分かった。設計の美しさを要件確認より先に置いていた。",q:"この一件の教訓として最も適切なのは？",options:["AIの判断は信用できないので、設計判断は常に人間が最初から全部やるべきだ","『どれが設計的に綺麗か』より先に、そのIssueのDoD・スコープ・依存関係という一次情報で『何をもって完了か』を確認し、それに照らして手段を選ぶべき","綺麗な設計(分割・インターフェース化)は常に正しいので、要件の方を設計に合わせて調整すべき","DoDは細かく読むと実装が縛られるので、大枠だけ把握して詳細は実装者の裁量に任せるべき"],answer:1,explain:"この失敗の本質は『設計の美しさ(1PR分割・インターフェース化)』を『完了の定義(DoD)』より先に置いてしまったこと。正しい順序は、まずDoD・スコープ・依存関係という一次情報で『このIssueは何が満たされたら完了か』を確認し、その達成手段として設計を選ぶこと。DoDが本番稼働まで求めるなら、綺麗でも未達の分割は選べない。AI不信(全部人間)や設計絶対(要件を設計に合わせる)、DoD軽視(大枠だけ)はいずれも逆。『手段(設計)の前に目的(DoD)を一次情報で確かめる』が再発防止の核心。"},
  {cat:"デバッグ / 環境",situation:"本番データ移行(高リスク作業)で、本番DBの company_id が NULL のレコード件数を調べたい。だが作業者(AI)は本番DBに直接アクセスできない。案: (1)作業者が調査用SQLを用意し、権限を持つ人が本番/ステージングで実行して件数を共有、(2)接続済みの Supabase MCP で作業者が execute_sql して取得(ただし対象が本番か要確認・本番接続は事故リスク)、(3)開発DB(0件)前提で進め、本番調査は省いてマイグレーション側でNULLを吸収する設計にする。",q:"本番アクセス権が無い作業者が本番の件数調査を進める方法は？",options:["(2)MCPで自分で取得。手元で完結し最も速いので、対象確認は後回しにして先に件数を取る","(1)調査用SQLを用意し、権限を持つ人が本番/ステージングで実行して件数を共有してもらう。最も安全で正確、移行設計に反映できる","(3)開発DBが0件なので本番も同様とみなし、調査自体を省いて移行を進める","本番にアクセスできない以上、件数調査は不可能なので移行作業そのものを中止する"],answer:1,explain:"本番データ移行は事故が即被害になる高リスク作業。アクセス権の無い作業者が無理に本番へ繋ぐ(MCPで対象未確認のまま実行)のは事故リスクが高い。正しいのは『作業者は調査の手順(SQL)を用意し、権限を持つ人が安全な手元で実行して結果を共有する』分業。これで本番の実態(NULL件数)という一次情報を安全に取得でき、移行設計に反映できる。開発DB0件を本番とみなすのは実態を見ない危険な仮定(本番は別物)、作業中止は調査を諦める過剰反応。『権限が無いことは無理にやらず、権限を持つ人に安全な手順を渡す』のが筋。"},
  {cat:"基礎 / DB",situation:"本番移行で、既存データの company_id が NULL のものを正しい会社IDで埋める『バックフィル』を行う。employee_companies テーブルには is_primary(主会社フラグ)があり、これを employees の company_id を埋める元データとして使える。一方 departments/contractors には会社の紐付け元になるテーブルが無い。",q:"『バックフィル』とは何をする作業か？",options:["新しく追加した列にデフォルト値を自動で入れる、DBの標準機能のこと","既存レコードの欠けている(NULL等の)値を、別の確かな情報源から遡って埋める作業のこと","本番DBのデータを開発DBへコピーして、テスト用に同じ状態を作る作業のこと","古くなったレコードを削除して、テーブルの容量を空ける整理作業のこと"],answer:1,explain:"バックフィル(backfill)は『後から(back)埋める(fill)』作業=既に存在するレコードで欠けている値を、信頼できる別の情報源から遡って補充すること。今回なら employee_companies の is_primary=主会社 を元に、employees の NULL の company_id を正しい会社で埋める。新列のデフォルト自動挿入(DB機能)・データコピー・レコード削除とは別物。紐付け元テーブルがある employees はバックフィルできるが、元が無い departments/contractors は別の手当てが要る=『埋める元の情報があるか』がバックフィル可否を分ける。"},
  {cat:"設計判断",situation:"NULLの company_id を埋めるバックフィルで、employees は employee_companies の is_primary から元データを引ける。だが departments/contractors には会社の紐付け元になるテーブルが存在しない。",q:"紐付け元が無い departments/contractors のNULLをどう扱うべき？",options:["元データが無くても何か入れる必要があるので、とりあえず先頭の会社IDを一律で割り当てる","元データが無い以上 employees と同じ機械的バックフィルはできないと認識し、別の確定方法(運用での手入力・既定会社の定義等)を分けて検討する","紐付け元が無いテーブルは移行対象から外し、company_id は NULL のまま放置してよい","employees のバックフィル結果を流用し、同じ会社IDを departments/contractors にもコピーする"],answer:1,explain:"バックフィルは『信頼できる元データ』があって初めて正しく埋められる。employees は is_primary という根拠があるが、departments/contractors には根拠が無い。ここで根拠なく一律の会社IDを割り当てたり、無関係な employees の結果を流用するのは『間違ったデータを確定させる』最悪手(後から誤りと気づいても元が分からない)。正しいのは『機械的バックフィル不可』と認識し、運用での手入力・既定会社の定義など別の確定手段を分けて検討すること。NULL放置は必須化や整合性の前提を崩す。元データの有無で手段を分けるのが誠実な移行設計。"},
  {cat:"基礎 / DB",situation:"会社が削除されたとき、その会社に紐づく employees/departments の company_id をどうするかを onDelete で定義する。候補に Cascade(親が消えたら子も削除)、SetNull(子のcompany_idをNULLにする)、Restrict(子が残っている限り親を削除させない)などがある。",q:"外部キーの onDelete 設定は何を決めるものか？",options:["参照先(親)レコードが削除されたとき、それを参照している子レコードをどう扱うかの連動動作","子レコードを追加するとき、親レコードを自動で作成するかどうかの設定","親テーブルの削除を実行できるユーザーの権限レベルの設定","削除されたレコードを何日間ゴミ箱に保持してから完全削除するかの期間設定"],answer:0,explain:"onDelete は外部キー(親子の参照関係)で『親が削除されたとき、それを指している子レコードをどう連動させるか』を決める設定。主な選択肢は Cascade(子も一緒に削除)、SetNull(子の参照列をNULLにする)、Restrict/NoAction(子が残る限り親の削除を拒否)など。会社(親)を消したとき従業員(子)を消すのか・company_idをNULLにするのか・そもそも消させないのかは業務要件で変わる重要な設計判断。権限・自動作成・ゴミ箱保持期間の設定ではない。データ整合性を壊さないために、削除時の連動を明示的に決める。"},
  {cat:"基礎 / DB",situation:"company_id を NOT NULL 化する移行で、外部キーの onDelete をどうするか。現状は SetNull(会社削除時に子の company_id を NULL にする)。だが Issue #758 の受け入れ条件は『NOT NULL 化されマイグレーションが develop/main の自動適用(prisma migrate deploy)で問題なく流れる』。",q:"NOT NULL 化に伴い onDelete=SetNull を変更しないといけないのはなぜ？",options:["SetNull は古い書き方で、新しい Prisma では別の名前に変わったから","NOT NULL(NULL禁止)の列に対し SetNull(削除時にNULLを入れる)は論理的に両立しない。会社削除時にNULL禁止の列へNULLを入れようとして矛盾・失敗するから","SetNull は処理が遅く、NOT NULL 列では性能要件を満たせなくなるから","onDelete は NOT NULL 列には設定できない仕様で、外部キー自体を外す必要があるから"],answer:1,explain:"SetNull は『親(会社)が消えたら子の参照列を NULL にする』動作。だが company_id を NOT NULL(NULL禁止)にすると、その同じ列に NULL を入れようとする SetNull は自己矛盾になり、削除時にNOT NULL制約違反で失敗する。だから NOT NULL 化するなら onDelete を Restrict(子が残る限り親削除を拒否)や Cascade(子も削除)など『NULLを入れない動作』へ変える必要がある。古い書き方・性能・外部キー不可といった話ではなく『NULL禁止とNULLを入れる動作は両立しない』という論理的帰結。NOT NULL化は onDelete 設計まで連動して見直させる。"},
  {cat:"基礎 / DB",situation:"Issue #758 の受け入れ条件に『NULLレコードへの会社割当(データ移行)が完了』『NOT NULL 化のマイグレーションが develop/main の自動適用(prisma migrate deploy)で問題なく流れる』とある。移行とNOT NULL化の順序が問われる。",q:"既存NULLデータがあるとき、データ移行とNOT NULL化はどの順で行うべき？",options:["先に NOT NULL 制約を追加し、弾かれたNULLレコードを後から1件ずつ手で直す","先に全NULLレコードへ会社を割り当てる(バックフィル)てNULLをゼロにし、その後で NOT NULL 制約を追加する","NOT NULL 化とデータ移行は独立なので順序は問わず、どちらを先にしてもよい","NOT NULL 制約だけ先に入れ、移行は本番で自然にデータが埋まるのを待つ"],answer:1,explain:"NOT NULL 制約は『その列にNULLが1件もない』ことが前提。既存にNULLが残ったまま制約を追加すると、その追加マイグレーション自体が失敗し、prisma migrate deploy が develop/main で流れない=受け入れ条件を満たせない。だから順序は必ず『先にバックフィルでNULLを全部埋める→NULLがゼロになってからNOT NULL制約を追加』。先に制約は失敗するし、自然に埋まるのを待つのは保証が無い。Phase 3 が『データ移行後にDB制約を追加』と明記するのはこの順序依存のため。土台(データ)を整えてから制約(ルール)をかける。"},
  {cat:"スコープ設計",situation:"NOT NULL 化の対象テーブルを decide する。Issue #758 は Phase 2 でフィルタ対象とした employees/departments/contractors の3テーブルを挙げている。案: (1)3テーブルすべてを NOT NULL 化、(2)employees のみ NOT NULL 化(フィルタの中核。他2つは別途)。",q:"対象テーブルの選び方としてベストは？",options:["(2)employees のみ。最小変更で済み、中核テーブルさえ保証すれば実用上は足りるから","(1)3テーブルすべて。スコープフィルタの前提(各テーブルが会社に紐づく)をスキーマ全体で漏れなく保証できるから","アクセス頻度が最も高いテーブル1つだけを選び、残りは性能影響を見てから決めるから","NULLレコードが0件のテーブルだけを対象にし、NULLが残るテーブルは対象から外すから"],answer:1,explain:"会社スコープフィルタは『employees/departments/contractors それぞれが company_id で会社に正しく紐づく』ことが前提。1テーブルだけ NOT NULL 化しても、残りでNULLが許されると『どの会社のデータか不定な行』が残り、フィルタの前提がスキーマレベルで保証されない(穴が残る)。Issue が3テーブルを挙げているのは、前提を全体で担保するため。employees のみは穴が残り、頻度で選ぶ/NULLが0件のものだけ対象も前提保証として不完全。『フィルタが依存する全テーブルで制約を揃える』のが筋(前提は一部でなく全体で守る)。"},
  {cat:"設計判断",situation:"バックフィルで、employees は employee_companies の is_primary から会社を復元できる。だが is_primary が無い行や、紐付け元が無い departments/contractors も残る。受け入れ条件は『migrate deploy が流れる』=NULLゼロが必須。",q:"復元元が無い行も含め、NULLを確実にゼロにするにはどうする？",options:["復元できる行だけ埋め、復元元が無い行は NULL のまま残して制約追加時に例外扱いにする","employee_companies から復元できる行はそれで埋め、復元不能な行や紐付け元の無いテーブルはデフォルト会社を割り当てて、全行をNULLゼロにする","復元元が無い行はレコードごと削除して、NULLが存在しない状態を作る","復元元が無い行の company_id 列だけ後で NULL 許容に戻し、その列は NOT NULL 化の対象から外す"],answer:1,explain:"NOT NULL 化を通す(migrate deploy を流す)には、対象列のNULLが1件も残っていてはいけない。だから『正確に復元できる行は employee_companies(is_primary)から埋め、復元元が無い行や紐付け元の無いテーブルはデフォルト会社を割り当てる』という二段構えで、全行を確実にNULLゼロにする。NULLを残して例外扱いは制約追加が失敗、レコード削除は実データの喪失で危険、列だけ NULL 許容に戻すのはNOT NULL化の目的(前提保証)を放棄することになる。『確実に復元する経路』と『最後の砦のデフォルト』を組み合わせて漏れをゼロにするのが移行の定石。"},
  {cat:"設計判断",situation:"監査ログ一覧のページネーション方式を決める。UIダイアログは(1)ページ番号(offset)方式を『推奨』と表示。仕様17.4は『100件/ページ・初期ロード上限1000件・以前は日付フィルタで遡及』。だが Issue #160 のタスク分解は『ページネーション(100件/ページ、cursor-based)』と明記している。",q:"どの方式を採るべきか？",options:["(1)offset方式。UIダイアログが推奨と表示しており、仕様の『1000件を10ページ』にも素直で実装が単純だから","(2)カーソル(cursor-based)方式。Issue #160 のタスク分解が cursor-based を明記しており、一次情報の指定に従うべきだから","UIの推奨と実装の単純さを優先し offset で進め、Issueの記述は後でcursorに直す前提で進める","推奨と明記が食い違って決められないので、両方式を実装して設定で切り替えられるようにする"],answer:1,explain:"UIダイアログの『推奨』はあくまで表示上の初期候補で、要件の一次情報ではない。Issue #160 のタスク分解は『cursor-based』と明記しており、これが従うべき指定。前回(Secret Manager)と同じく『ダイアログの推奨や実装の楽さ』に引っ張られず、Issueという一次情報を確認するのが筋。仮にoffsetの方が良いと考えるなら、勝手に進めず理由を添えて提案・合意してから変える。両方実装は過剰で、後で直す前提の見切り発車も要件と食い違ったまま進むリスクがある。"},
  {cat:"基礎 / DB",situation:"監査ログのように『常に新しいレコードが追記され続ける』一覧を offset(LIMIT/OFFSET でN件目から取得)でページ送りすると、閲覧中に新規ログが INSERT されたとき境界で問題が起きうる。",q:"追記が多いデータで offset ページングが重複・欠落を起こすのはなぜ？",options:["offset は内部で全件をメモリに読み込むため、件数が増えると途中でデータが溢れて消えるから","OFFSET は『先頭からN件飛ばす』ため、閲覧中に先頭へ新規行が入ると全体が1つずれ、次ページで同じ行を再表示したり1行飛ばしたりするから","offset 方式は降順ソートに対応しておらず、新しい行が末尾に回って見えなくなるから","OFFSET には上限があり、1000件を超えると古い行が自動的に削除されるから"],answer:1,explain:"OFFSET は『今の並び順で先頭からN件飛ばしてその次を返す』方式。だから1ページ目を見ている間に先頭(最新)へ新規ログが1件 INSERT されると、全体が1つ後ろにずれ、2ページ目の先頭が1ページ目の末尾と重複したり、逆に1行飛ばされたりする。原因は『絶対位置(N件目)で指す』ことにあり、メモリ溢れ・降順非対応・自動削除ではない。追記の多い監査ログでこれが効くため、Issueは位置でなく『最後に見た行の値』を起点にするカーソル方式を選んでいる。"},
  {cat:"基礎 / DB",situation:"カーソル方式のページングで、監査ログを occurred_at(発生時刻)の降順で並べる。だが同じ occurred_at を持つレコードが複数あると、その中での順序が一意に定まらない。そこで (occurred_at, id) の組で順序を決める。",q:"occurred_at だけでなく id も併せてカーソルにするのはなぜ？",options:["id を含めると検索が速くなり、ページ取得のパフォーマンスが上がるから","occurred_at が同値のレコードがあると順序が確定せず、境界で取りこぼし・重複が起きる。id をタイブレークに足して順序を一意にするため","id は主キーなので、カーソルには必ず主キーだけを使う決まりだから","occurred_at は時刻なので精度が荒く、id がないとそもそも降順に並べられないから"],answer:1,explain:"カーソル方式は『最後に見た行の値より小さい(大きい)もの』を次に取る。だが occurred_at が全く同じ行が複数あると、『その時刻ちょうどの行』をどこまで取ったかが曖昧になり、境界で重複・欠落が起きる。そこで一意な id をタイブレーク(同点時の決定打)に加え、(occurred_at, id) の組で全行に厳密な順序を付ければ、『この組より後』を確実に指せる。速度や主キー縛り・降順可否の話ではなく『順序を一意に確定させる』ためのタイブレーク。NULLや配列先頭の話と同じく、順序の曖昧さを境界値で潰す発想。"},
  {cat:"設計判断",situation:"監査ログ閲覧画面で『閲覧専用画面は view を監査記録しない』既存方針(view記録は別issueの横断 middleware で扱う)を確認し、本画面もそれを踏襲する。また仕様17.4は HQ 限定なので manager のコーススコープ処理は不要と判断した。",q:"このように『既存方針を確認して踏襲する』判断の意義は？",options:["既存方針は古い可能性が高いので、新画面では一旦無視して最新のやり方で作り直すべき","画面ごとに view 監査の有無やスコープ処理を場当たりで決めず、既存の横断方針に揃えることで一貫性を保ち、二重実装や抜け漏れを防げるから","新画面は必ず独自の監査・スコープ処理を持つべきで、既存方針に合わせるのは手抜きだから","既存方針に合わせれば、その画面のテストは既存分で兼ねられるので新規テストは不要になるから"],answer:1,explain:"『view監査は別の横断middlewareで扱う』『HQ限定だからmanagerスコープ処理は不要』のように、既存の方針・前提を確認してから踏襲するのは、画面ごとに実装がバラつくのを防ぎ一貫性を保つため。view監査をこの画面だけ独自に足すと横断middlewareと二重になるし、HQ限定なのにmanagerスコープを書くのは不要な実装。既存方針が常に正しいとは限らないが、まず確認し、合理的なら揃える(おかしければ見直しを提案する)。手抜きでも無視対象でもなく、横断的関心事は横断の仕組みに委ねるのが筋。なお踏襲しても新画面固有のテストは別途必要。"},
  {cat:"セキュリティ",situation:"Issue #759 は当初『会社スコープRLSをマトリックス通り本番適用』を意図。だが実ファイル調査で前提が崩れた: フロントはSupabaseに直接アクセスせず(独自Cookie認証)、接続側に会社IDが無い(auth.uid()利用ゼロ・employees↔auth.usersマッピング無し)ため会社スコープRLSを書く土台が無い。一方 anon/authenticated に全テーブルCRUD権限が既定付与+RLS無効で、anon keyで他社データを直接読み書きできる実在の穴がある。",q:"この調査結果を踏まえ、#759 をどう進めるべきか？",options:["Issueの当初意図どおり、会社スコープRLSをマトリックス通りに本番適用する","土台が無く会社スコープRLSは今は実装不能なので、まず実在する穴(anon全CRUD+RLS無効)をDeny by defaultで塞ぐ方針へ見直し、会社スコープはアプリ層で担保済みと整理する","会社スコープRLSが書けない以上 #759 は対応不能としてクローズする","当初意図を維持するため、まず Supabase Auth 移行まで含めてこのIssueで一気に実装する"],answer:1,explain:"着手後の調査でIssueの前提(Supabase直アクセス・接続に会社ID有り)が事実と違うと判明したら、前提に縛られず方針を見直すのが正しい(=Issueの推奨と調査結果が食い違うときの判断と同根)。会社スコープRLSは土台(接続に会社ID)が無く今は実装不能だが、『anon/authenticatedへの過剰GRANT+RLS無効』という実在の重大な穴は今すぐ塞げる。だからDeny by defaultで穴を塞ぐ方針へ転換し、会社スコープ自体はアプリ層(#755-757)で担保済みと整理する。当初意図の固執も、対応不能クローズ(穴を放置)も、Auth移行まで一気に(スコープ過大)も不適切。『実在のリスクを今塞ぐ』を優先する。"},
  {cat:"セキュリティ",situation:"Supabaseで anon(公開キー)/authenticated ロールに全テーブルの CRUD 権限が既定付与され、かつ RLS が無効。anon key は公開鍵なので、PostgREST 経由で employees・companies・documents 等を誰でも直接読み書きできる状態だった。対策に Deny by default(全テーブルRLS有効化+許可ポリシー無し=拒否、anon/authenticatedのGRANTをREVOKE)を採る。",q:"『Deny by default』で穴を塞ぐとはどういうことか？",options:["全テーブルを暗号化し、復号鍵を持つ者だけがアクセスできるようにすること","明示的に許可されない限り全て拒否する状態にすること。RLS有効化+許可ポリシー無しと過剰GRANTのREVOKEで、anon経由の直接アクセスを既定で全拒否する","アクセスを試みたanonユーザーを検知して、以後そのIPをブロックリストに入れること","危険なテーブルだけを列挙して個別にアクセス禁止に設定していくこと"],answer:1,explain:"Deny by default(既定拒否)は『明示的に許可したものだけ通し、それ以外は全部拒否』という設計。RLSを有効化して許可ポリシーを置かなければ、その経路のアクセスは既定で全て拒否される。さらに anon/authenticated への過剰なGRANTをREVOKEすれば、公開鍵経由の直接読み書きを根本から塞げる。暗号化・IPブロック・危険なものを列挙して禁止(=ブラックリスト的発想、列挙漏れが穴になる)とは逆で、『許可リスト的に既定全拒否、必要な分だけ開ける』のが最小権限の実践。バックエンドはService Role Keyで別経路のため影響しない。"},
  {cat:"設計判断",situation:"Deny by defaultの対象範囲を決める。案: (1)public スキーマの全テーブル一括=スキーマ単位でanon/authenticatedのCRUDをREVOKE+既定権限を将来テーブルにも拒否設定。新規テーブル追加時も自動保護、(2)docs/database.mdのマトリックスに載る23テーブルのみ=記載外テーブル(patents系・ledger系・workflow系等)に穴が残る。フロントは元々直接アクセスしないため副作用なし。",q:"ロックダウンの対象範囲としてベストは？",options:["(2)マトリックス記載の23テーブルのみ。文書化された対象に絞る方が管理が明確だから","(1)public 全テーブル一括。漏れが無く、将来追加されるテーブルも既定で自動保護され、フロントは直接アクセスしないので副作用も無いから","アクセスログで実際に叩かれているテーブルだけを対象に、使われていないものは後回しにするから","まず最も重要な employees と companies だけ塞ぎ、残りは段階的に対応するから"],answer:1,explain:"セキュリティの穴を塞ぐときは『一部でなく全体』で守るのが原則(前提は全体で保証する、と同根)。マトリックス記載の23テーブルだけだと記載外テーブルに穴が残り、しかも将来テーブルが追加されるたびに塞ぎ忘れる危険がある。public スキーマ単位でREVOKE+既定権限(default privileges)を拒否に設定すれば、既存も将来追加分も自動的に保護され漏れが無い。フロントは直接アクセスしないので全拒否でも副作用なし。叩かれているものだけ/重要な2つだけ、は穴を残す部分対応で、攻撃者は塞ぎ忘れを突く。網羅的に既定拒否してから必要な分だけ開けるのが安全。"},
  {cat:"基礎 / セキュリティ",situation:"RLSはフロントの Supabase 直接アクセス(Anon Key経由)にのみ効き、バックエンド(Service Role Key接続)は RLS をバイパスする。会社スコープの制御は、RLS だけでなくアプリ層フィルタ(#755-757)でも行っている。",q:"RLS とアプリ層フィルタを両方持つ『多層防御』の意義は？",options:["同じ制御を2回書くことで、片方の実装が遅くてももう片方が速く処理を返せるから","経路ごとに効く防御が違う(RLSはフロント直アクセス、アプリ層フィルタはバックエンドAPI経由)ため、両方揃えてどの経路からも他社データに到達できないようにするため","RLSは将来廃止予定なので、移行期間中だけアプリ層と二重化して安全に乗り換えるため","2つあれば片方のポリシーを自由に緩めても、もう片方が必ず補ってくれるから"],answer:1,explain:"多層防御(Defense in Depth)は『守る経路・角度が違う防御を重ねる』こと。RLSはフロントのSupabase直接アクセス(Anon Key)に効くが、バックエンドはService Role KeyでRLSをバイパスするので効かない。逆にアプリ層フィルタ(#755-757)はバックエンドAPI経由のアクセスに効く。だから両方揃えて初めて『フロント直アクセスもバックエンド経由も、どちらからも他社データに届かない』状態になる。速度のためでも、廃止移行のためでも、片方を緩めてよいためでもなく、『各経路をそれぞれの防御で塞ぐ』のが要点。1つでは塞げない経路が残る(既存のMass Assの多層防御と同じ発想)。"}
];

// 用語集：問題文・解説中の語句にカーソル/タップで意味を表示する。新しい質問のたびにここへ追記する。
const GLOSSARY={
  "PR":"プルリクエスト。あるブランチの変更をdevelopなどの本流へ取り込んでほしいと依頼するマージ提案。1つの作業ブランチと結びつく。",
  "ブランチ":"作業を枝分かれさせて進めるための分身。本流を壊さずに変更を試せる。",
  "develop":"開発の本流ブランチ。各作業ブランチはここから派生し、ここへマージされることが多い。",
  "HEAD":"いま自分がチェックアウトしている位置（現在のブランチ／コミット）を指すポインタ。",
  "コンフリクト":"2つの変更が同じ箇所を別々に書き換え、Gitが自動で統合できなくなった状態。手動で解決が必要。",
  "衝突":"コンフリクトのこと。同じ箇所への変更がぶつかり自動で統合できない状態。",
  "マージ":"別々のブランチの変更を1つに統合すること。",
  "CI":"継続的インテグレーション。pushのたびに自動でテストやlintを走らせ、壊れていないか検査する仕組み。",
  "Linter":"コードの書き方や規約違反を自動でチェックするツール。",
  "lint":"Linterによるコードチェックのこと。",
  "ESLint":"JavaScript/TypeScript用の代表的なLinter。",
  "warn":"Linterの警告レベル。違反があっても処理は止めず、注意だけ表示する。",
  "error":"Linterのエラーレベル。違反があるとCIなどが失敗（停止）する。",
  "i18n":"国際化(internationalization)。文言を多言語対応できるようにする仕組み。iとnの間が18文字あるのが由来。",
  "Mass Assignment":"入力項目をまとめて保存する処理で、本来書き換えさせたくない項目まで外部から書き換えられてしまう脆弱性。",
  "脆弱性":"攻撃に悪用されうるセキュリティ上の弱点。",
  "多層防御":"1つの対策に頼らず、複数の防御を重ねて守る考え方（Defense in Depth）。",
  "Defense in Depth":"多層防御。複数の対策を重ねて守るセキュリティの考え方。",
  "super_admin":"最上位の管理者権限。通常はすべてにアクセスできる。",
  "最小権限":"必要最小限の権限だけを与えるセキュリティ原則。",
  "Issue":"GitHubなどで管理する課題・タスクの単位。バグ報告や機能要望など。",
  "doc-drift":"ドキュメントと実装コードが食い違っている状態（ドキュメントのズレ）。",
  "Vue":"画面側(フロントエンド)を作るためのJavaScriptフレームワーク。",
  "frontend":"利用者が直接触れる画面側。",

  "承認反映":"申請が承認された結果を実データや画面へ反映する処理。",
  "DELETE":"HTTPメソッドの一つ。リソースの削除を表す(GET取得/POST作成/PUT更新など)。",
  "監査性":"誰がいつ何を変更したかを後から追跡・検証できる性質。承認フローや変更ログで担保する。",
  "監査ログ":"操作の履歴(誰が・いつ・何を)を記録したもの。不正調査や検証の証跡になる。",
  "ワークフロー":"申請→承認→反映のように、決められた順序で処理を進める業務フロー。",
  "セルフサービス":"利用者自身が操作・申請して完結できる仕組み。管理者の手を借りない。",
  "CRUD":"データ操作の基本4つ。Create(作成)/Read(取得)/Update(更新)/Delete(削除)の頭文字。",
  "不変条件":"システムが常に守るべき前提・ルール(invariant)。壊すとデータ不整合やバグの原因になる。",
  "nullable":"その項目に空(null)を許す設定。値が未定でもよいことを表す。",
  "オーバーエンジニアリング":"今は不要な拡張性まで作り込み、必要以上に複雑にしてしまうこと。",
  "scope creep":"当初の作業範囲が少しずつ膨らんで本来の目的を超えてしまうこと。",
  "PUT":"HTTPメソッドの一つ。リソースの更新(置き換え)を表す。",
  "DateTime":"日付と時刻をまとめて表すデータ型。",
  "mock":"テストで本物の代わりに使う偽物のデータや処理。依存を切り離して検証しやすくする。",
  "Prisma":"DBをTypeScriptから型安全に操作できるORM(データベースツール)。",
  "ORM":"DBのテーブルをプログラムのオブジェクトとして扱えるようにする仕組み。",
  "@default(false)":"Prismaスキーマの指定。その項目を省略したらDB側で自動的にfalseを入れる既定値設定。",
  "フォールバック":"指定や値が無いときに使う代替の動き・既定値。",
  "忠実性":"テストのmockなどが本物の挙動をどれだけ正確に再現できているか。",
  "won't-fix":"課題として認識した上で『今回は対応しない』と判断してクローズすること。",
  "spread":"{ ...data } のように既存オブジェクトの中身を展開してコピーするJavaScriptの記法。"
};
const GLOSS_TERMS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GLOSS_RE=new RegExp(GLOSS_TERMS.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'g');
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// テキストをエスケープしつつ、用語にハイライト用spanを付与する（同一テキスト内では各用語を1回だけ）
function gloss(text){
  const seen=new Set();
  return esc(text).replace(GLOSS_RE,(m,offset,full)=>{
    if(seen.has(m))return m;
    if(/^[\x20-\x7e]+$/.test(m)){ // 英数字の用語は、より長い単語の一部なら除外
      const b=full[offset-1],a=full[offset+m.length];
      if(b&&/[A-Za-z0-9]/.test(b))return m;
      if(a&&/[A-Za-z0-9]/.test(a))return m;
    }
    seen.add(m);
    return `<span class="term" tabindex="0" data-def="${escAttr(GLOSSARY[m])}">${m}</span>`;
  });
}
// 状況文を見やすく整形する（テキストは変えず表示だけ）。
// 「(1)…、(2)…、(3)…」のような箇条が含まれる場合、各項目を箇条書きの行に分けて表示する。
// gloss() でハイライト済みのHTMLを受け取り、(n) の番号で分割する。番号は半角/全角どちらも対応。
function formatSituation(rawText){
  // 箇条の区切り「(1)」「（1）」を検出。(1)と(2)の両方があるときだけ箇条化する。
  const numRe=/[（(]\s*([1-9１-９])\s*[）)]/g;
  const nums=[...rawText.matchAll(numRe)];
  if(nums.length<2)return `<div>${gloss(rawText)}</div>`; // 箇条が無ければそのまま
  // gloss(HTML化)はタグ内に = や ( を含むため、整形は生テキスト上で行ってから最後にglossする。
  const firstIdx=nums[0].index;
  const lead=rawText.slice(0,firstIdx).trim();
  const items=[];
  for(let i=0;i<nums.length;i++){
    const start=nums[i].index+nums[i][0].length;
    const end=(i+1<nums.length)?nums[i+1].index:rawText.length;
    let seg=rawText.slice(start,end).trim();
    seg=seg.replace(/^[、,\s]+/,'').replace(/[、,\s]+$/,''); // 端の読点を除去
    items.push({n:nums[i][1],seg});
  }
  // 各項目の生テキスト内「=」を一旦プレースホルダにし、gloss後に矢印spanへ戻す（タグ内の=と混同しないため）
  const EQ=String.fromCharCode(0xE000); // 私用領域文字。通常文やGLOSSARY語・HTMLと衝突しないプレースホルダ
  const lis=items.map(it=>{
    const seg=it.seg.replace(/\s*=\s*/,EQ);
    let g=gloss(seg).replace(EQ,' <span class="eq">→</span> ');
    return `<li><span class="num">${it.n}</span>${g}</li>`;
  }).join('');
  return `${lead?`<span class="lead">${gloss(lead)}</span>`:''}<ul class="enum">${lis}</ul>`;
}
function initGlossary(){
  const pop=document.createElement('div');
  pop.className='glosspop';pop.style.display='none';
  document.body.appendChild(pop);
  let pinned=null,timer=null;
  function show(el){
    pop.textContent=el.getAttribute('data-def');
    pop.style.display='block';pop.style.left='0px';pop.style.top='0px';
    const r=el.getBoundingClientRect();
    const pw=pop.offsetWidth,ph=pop.offsetHeight,vw=document.documentElement.clientWidth;
    let left=window.scrollX+r.left+r.width/2-pw/2;
    left=Math.max(window.scrollX+8,Math.min(left,window.scrollX+vw-pw-8));
    let top=window.scrollY+r.top-ph-10;
    if(top<window.scrollY+4)top=window.scrollY+r.bottom+10;
    pop.style.left=left+'px';pop.style.top=top+'px';
  }
  function hide(){pop.style.display='none';}
  document.addEventListener('mouseover',e=>{const t=e.target.closest&&e.target.closest('.term');if(t){clearTimeout(timer);if(!pinned)show(t);}});
  document.addEventListener('mouseout',e=>{const t=e.target.closest&&e.target.closest('.term');if(t&&!pinned)timer=setTimeout(hide,140);});
  document.addEventListener('click',e=>{
    if(e.target.closest('.glosspop'))return;
    const t=e.target.closest('.term');
    if(t){e.stopPropagation();if(pinned===t){pinned=null;hide();}else{pinned=t;show(t);}return;}
    if(pinned){pinned=null;hide();}
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){pinned=null;hide();return;}
    const ae=document.activeElement;
    if((e.key==='Enter'||e.key===' ')&&ae&&ae.classList&&ae.classList.contains('term')){
      e.preventDefault();if(pinned===ae){pinned=null;hide();}else{pinned=ae;show(ae);}
    }
  });
  window.addEventListener('scroll',()=>{if(pinned)show(pinned);else hide();},true);
  window.addEventListener('resize',()=>{if(pinned)show(pinned);else hide();});
}

const LS_BEST="learnquiz_best_v1";
const LS_DELETED="learnquiz_deleted_v1";
const LS_SRS="learnquiz_srs_v1";
let pool=QUESTIONS.slice();
let activeCats=null;
let mode="practice"; // "practice"=苦手・期限到来を優先 / "all"=カテゴリ内ランダム
let order=[],idx=0,score=0,answered=false,history=[];
// 1問内の回答状態（自信ヒアリング・段階ヒント・分かったつもり対策）
let confidence=null,hintLevel=0,picked=false;
// 選択肢の表示順（元indexの配列）。正解が常にBに来る偏りを消すため出題ごとにシャッフルする。
let viewOrder=[];

function getBest(){try{return JSON.parse(localStorage.getItem(LS_BEST))||{};}catch(e){return {};}}
function setBest(b){try{localStorage.setItem(LS_BEST,JSON.stringify(b));}catch(e){}}

/* ── 間隔反復（Leitnerの箱）──────────────────────────────
  スライドの方針に従い「数値の状態は持たず、理解度ラベル(box)＋最終学習日(last)だけ」で判定する最小構成。
  box1=△まだ自信なし(約1〜2日) / box2=○なんとなく(約7日) / box3=◎説明できる(約30日)。
  答え方で箱を動かす：自力で正解→1つ上げる / ヒントあり正解→据え置き / 間違い→box1へ戻す。 */
const BOX_DAYS={1:1,2:7,3:30};
const BOX_LABEL={1:"△ まだ自信なし",2:"○ なんとなく",3:"◎ 説明できる"};
function getSrs(){try{return JSON.parse(localStorage.getItem(LS_SRS))||{};}catch(e){return {};}}
function setSrs(s){try{localStorage.setItem(LS_SRS,JSON.stringify(s));}catch(e){}}
function srsOf(q){const s=getSrs();return s[qkey(q)]||{box:1,last:null,miss:0};}
// 期限到来か：未学習はすぐ出す。box段階に応じた日数が経過していたら出題対象。
function isDue(q){
  const r=srsOf(q);
  if(!r.last)return true;
  const days=(Date.now()-new Date(r.last).getTime())/86400000;
  return days>=(BOX_DAYS[r.box]||1);
}
function dueCount(list){return list.filter(isDue).length;}
// 回答結果を箱へ反映。selfSolved=ヒント無しで自力正解、hinted=ヒント使って正解、wrongHadConfidence=自信ありで間違えた(最優先で再出題)
function recordResult(q,{correct,selfSolved,hinted,wrongHadConfidence}){
  const s=getSrs();const k=qkey(q);const r=s[k]||{box:1,last:null,miss:0};
  if(correct&&selfSolved)r.box=Math.min(3,r.box+1);   // 自力正解→1段上げる
  else if(correct&&hinted){/* ヒントあり正解→据え置き */}
  else{r.box=1;r.miss=(r.miss||0)+1;}                  // 間違い→box1へ戻す
  r.wasConfidentMiss=!!wrongHadConfidence;             // 「自信あり×不正解」は思い込み。直しても消さず何度でも出す
  r.last=new Date().toISOString();
  s[k]=r;setSrs(s);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 削除した問題はこの端末に記録し、以後出題しない（問題文＋カテゴリで識別。復元も可能）
function qkey(q){return q.cat+'|'+q.q;}
function getDeleted(){try{return JSON.parse(localStorage.getItem(LS_DELETED))||{};}catch(e){return {};}}
function setDeleted(d){try{localStorage.setItem(LS_DELETED,JSON.stringify(d));}catch(e){}}
function liveQuestions(){const d=getDeleted();return QUESTIONS.filter(q=>!d[qkey(q)]);}
function deletedCount(){return Object.keys(getDeleted()).length;}
function restoreDeleted(){setDeleted({});}
function deleteCurrent(){
  if(answered)return;
  const q=pool[order[idx]];
  if(!confirm('この問題を削除しますか？\nこの端末では今後出題されなくなります（復元も可能）。'))return;
  const d=getDeleted();d[qkey(q)]=1;setDeleted(d);
  order.splice(idx,1);
  if(idx>=order.length)renderResult();else renderQ();
}

function renderBest(){
  const b=getBest();
  const el=document.getElementById('best');
  if(b.pct!=null){el.innerHTML=`ベスト記録 <b>${b.pct}%</b>（${b.score}/${b.total}）`;}
  else{el.textContent="";}
}

function setBar(p){const el=document.getElementById('bar');if(el)el.querySelector('i').style.width=p+'%';}

function start(){
  const base=liveQuestions();
  pool=activeCats?base.filter(q=>activeCats.includes(q.cat)):base.slice();
  if(mode==="practice"){
    // 期限到来分だけを出題。「自信あり×不正解(思い込み)」→未学習/期限到来 の順で優先。
    const idxs=pool.map((_,i)=>i).filter(i=>isDue(pool[i]));
    const rank=i=>{const r=srsOf(pool[i]);return r.wasConfidentMiss?0:(r.last?2:1);};
    shuffle(idxs);
    idxs.sort((a,b)=>rank(a)-rank(b));
    order=idxs;
  }else{
    order=shuffle(pool.map((_,i)=>i));
  }
  idx=0;score=0;answered=false;history=[];
  if(order.length===0)return renderResult();
  renderQ();
}

const marks=['A','B','C','D','E','F'];
// 各問のヒントは持たないので、選択肢から段階的に作る（白紙→比喩/カテゴリ→絞り込み→2択）。
// hideSet: 非表示にする「元index」の集合。レベルが上がるほど誤答を消して2択に近づける。
// 正解(q.answer)は決して隠さない。
function hintHideSet(q,level){
  const wrong=q.options.map((_,i)=>i).filter(i=>i!==q.answer);
  shuffle(wrong);
  const total=q.options.length;
  if(level<=1)return new Set();              // レベル0(白紙)・1(比喩)は全選択肢を見せる
  if(level===2)return new Set(wrong.slice(0,Math.max(0,total-3))); // 3択程度まで
  return new Set(wrong.slice(0,Math.max(0,total-2)));              // レベル3=2択(最後の救済)
}
const HINT_TEXT=[
  null,
  q=>`ヒント①：このカテゴリは「${q.cat}」。状況の中の太字キーワードや『つまり何型か』に注目。`,
  q=>`ヒント②：明らかに筋の悪い選択肢を消して、残りを絞り込みました。`,
  q=>`ヒント③（最後の救済）：2択まで絞りました。状況の目的に立ち返って選ぶ。`
];

function renderQ(){
  const s=document.getElementById('screen');
  if(idx>=order.length)return renderResult();
  const q=pool[order[idx]];
  answered=false;confidence=null;hintLevel=0;picked=false;
  viewOrder=shuffle(q.options.map((_,i)=>i)); // 選択肢の並びを毎回シャッフル（正解位置の偏りを解消）
  const r=srsOf(q);
  s.innerHTML=`
    <div class="bar" id="bar"><i></i></div>
    <div class="toprow">
      <span class="cat">${esc(q.cat)}</span>
      <span class="meta">問題 ${idx+1} / ${order.length}　スコア ${score}</span>
    </div>
    <div class="boxrow"><span class="boxtag box${r.box}">${BOX_LABEL[r.box]}</span>${r.wasConfidentMiss?'<span class="boxtag warn">⚠ 要注意（前回 自信あり→不正解）</span>':''}</div>
    <div class="situation"><div class="lbl">状況</div><div class="body">${formatSituation(q.situation)}</div></div>
    <div class="question">${gloss(q.q)}</div>
    <div id="confbox"></div>
    <div id="optwrap" style="display:none">
      <div id="hintbox"></div>
      <div class="opts" id="opts"></div>
      <div id="hintrow"></div>
    </div>
    <div id="fb"></div>
    <div id="delrow"><button class="delbtn" id="delq">🗑 この問題を削除</button></div>`;
  setBar(idx/order.length*100);
  renderConfidence();
  document.getElementById('delq').onclick=deleteCurrent;
}

// 回答前に自信を聞く（分かったつもり対策）。選んでから選択肢を表示する。
function renderConfidence(){
  const cb=document.getElementById('confbox');
  cb.innerHTML=`
    <div class="conflbl">答える前に——いまの自信は？</div>
    <div class="confbtns">
      <button class="confbtn" data-c="1">自信あり</button>
      <button class="confbtn ghosty" data-c="0">自信なし</button>
    </div>
    <div class="conftip">※ 自信を先に決めることで「分かったつもり」を見つけやすくなります。</div>`;
  cb.querySelectorAll('.confbtn').forEach(b=>{
    b.onclick=()=>{confidence=b.getAttribute('data-c')==='1';revealOptions();};
  });
}

function revealOptions(){
  document.getElementById('confbox').style.display='none';
  document.getElementById('optwrap').style.display='block';
  renderOptions();
  renderHintRow();
}

function renderOptions(){
  const q=pool[order[idx]];
  const hide=hintHideSet(q,hintLevel);      // 隠す「元index」の集合
  const hb=document.getElementById('hintbox');
  hb.innerHTML=(hintLevel>0&&HINT_TEXT[hintLevel])?`<div class="hint">${gloss(HINT_TEXT[hintLevel](q))}</div>`:'';
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  // 表示順(viewOrder)で並べ、ラベルA/B/C/Dは表示位置に振る。判定は元index(oi)で行う。
  let pos=0;
  viewOrder.forEach(oi=>{
    if(hide.has(oi))return;
    const b=document.createElement('button');
    b.className='opt';
    b.dataset.oi=oi;
    b.innerHTML=`<span class="mk">${marks[pos]}</span><span>${gloss(q.options[oi])}</span>`;
    b.onclick=(e)=>{if(e.target.closest('.term'))return;pick(oi);};
    opts.appendChild(b);
    pos++;
  });
}

function renderHintRow(){
  const q=pool[order[idx]];
  const hr=document.getElementById('hintrow');
  if(answered){hr.innerHTML='';return;}
  // ヒントは最大3段階（白紙の次から）。2択まで出したら打ち止め。
  if(hintLevel>=3){hr.innerHTML='<div class="hintdone">これ以上のヒントはありません。状況の目的に立ち返って選びましょう。</div>';return;}
  hr.innerHTML=`<button class="hintbtn" id="hintbtn">💡 ヒントを1段もらう（${hintLevel}/3）</button>`;
  document.getElementById('hintbtn').onclick=()=>{hintLevel++;renderOptions();renderHintRow();};
}

function pick(i){
  if(answered)return;answered=true;picked=true;
  const dr=document.getElementById('delrow');if(dr)dr.style.display='none';
  const hr=document.getElementById('hintrow');if(hr)hr.innerHTML='';
  const q=pool[order[idx]];
  const correct=i===q.answer;
  const usedHint=hintLevel>0;
  const selfSolved=correct&&!usedHint;          // 自力で正解（ヒント未使用）
  const hinted=correct&&usedHint;               // ヒントありで正解
  const wrongHadConfidence=!correct&&confidence; // 自信あり×不正解＝思い込み（最優先で再出題）
  if(correct)score++;
  history.push({cat:q.cat,correct,confidence,usedHint});
  recordResult(q,{correct,selfSolved,hinted,wrongHadConfidence});
  const opts=document.getElementById('opts').children;
  for(let k=0;k<opts.length;k++){
    opts[k].disabled=true;
    const oi=Number(opts[k].dataset.oi);
    if(oi===q.answer)opts[k].classList.add('correct');
    else if(oi===i)opts[k].classList.add('wrong');
  }
  // 自信×正誤の4象限メッセージ（分かったつもり対策）
  let quad,quadCls;
  if(correct&&confidence){quad="本物か確認：なぜ正しいかを言えれば◎へ昇格の候補。";quadCls="ok";}
  else if(correct&&!confidence){quad="まぐれ確認：理由を言えなければ据え置き。解説で裏取りを。";quadCls="warn";}
  else if(!correct&&confidence){quad="⚠ 最優先で訂正：思い込みです。直しても消さず、何度でも出題します。";quadCls="ng";}
  else{quad="想定内：基礎から学び直し。box1に戻してすぐまた出します。";quadCls="warn";}
  const r=srsOf(q);
  const moveTxt=selfSolved?`自力正解 → ${BOX_LABEL[r.box]} に昇格（次は約${BOX_DAYS[r.box]}日後）`
    :hinted?`ヒントあり正解 → 据え置き（${BOX_LABEL[r.box]}）`
    :`box1へ → すぐまた出題`;
  const last=idx+1>=order.length;
  document.getElementById('fb').innerHTML=`
    <div class="fb">
      <div class="res ${correct?'ok':'ng'}">${correct?'✓ 正解':'✕ 不正解'}　<span class="confchip">${confidence?'自信あり':'自信なし'}${usedHint?' / ヒント使用':''}</span></div>
      <div class="quad ${quadCls}">${quad}</div>
      <div class="exp"><b>解説：</b>${gloss(q.explain)}</div>
      <div class="srsmove">${moveTxt}</div>
      <button class="next" id="nx">${last?'結果を見る':'次の問題 →'}</button>
    </div>`;
  setBar((idx+1)/order.length*100);
  document.getElementById('nx').onclick=()=>{idx++;renderQ();};
}

function renderResult(){
  const total=order.length;
  if(total===0){
    const allDone=mode==="practice"&&deletedCount()===0;
    document.getElementById('screen').innerHTML=`
      <div class="result">
        <div class="big">🎉</div>
        <div class="msg">${allDone?'今やるべき復習は完了です。<br>箱が進んだ問題は、期限が来たらまた出題されます。':`出題できる問題がありません。${deletedCount()>0?'削除した問題を復元してください。':'カテゴリの選択を見直してください。'}`}</div>
        <div class="actions">
          <button class="next" onclick="mode='all';start()">全問モードで挑戦</button>
          <button class="ghost" onclick="catScreen()">カテゴリを選ぶ</button>
          ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
        </div>
      </div>`;
    return;
  }
  const pct=Math.round(score/total*100);
  let msg;
  if(pct===100)msg="完璧。パターン認識が完全に身についています。";
  else if(pct>=70)msg="優秀。実践の判断軸がしっかり定着しています。";
  else if(pct>=40)msg="良い調子。解説を見返してパターンを掴みましょう。";
  else msg="復習のチャンス。状況のタイプ判別から見直しを。";
  const b=getBest();
  let isBest=false;
  if(b.pct==null||pct>b.pct){setBest({pct,score,total});isBest=true;}
  renderBest();
  // 「自信あり×不正解（思い込み）」の件数を集計＝最優先で潰すべきもの
  const confMiss=history.filter(h=>!h.correct&&h.confidence).length;
  const selfSolved=history.filter(h=>h.correct&&!h.usedHint).length;
  const remainDue=dueCount(mode==="practice"?pool:liveQuestions());
  document.getElementById('screen').innerHTML=`
    <div class="result">
      <div class="big">${pct}%</div>
      <div class="of">${score} / ${total} 問正解${isBest?'　🎉 自己ベスト更新':''}</div>
      <div class="msg">${msg}</div>
      <div class="srsstat">
        <span>自力正解 <b>${selfSolved}</b></span>
        <span class="${confMiss>0?'bad':''}">思い込み(自信あり→不正解) <b>${confMiss}</b></span>
        <span>残りの復習 <b>${remainDue}</b></span>
      </div>
      ${confMiss>0?`<div class="quad ng" style="text-align:left">⚠ 「自信があったのに間違えた」問題が${confMiss}件あります。一番危ないので、消えずに何度でも出題されます。</div>`:''}
      <div class="review">
        ${history.map(h=>`<div class="rrow"><span>${esc(h.cat)}</span><span class="ic ${h.correct?'ok':'ng'}">${h.correct?'✓':'✕'}${h.confidence?'（自信あり）':''}</span></div>`).join('')}
      </div>
      <div class="actions">
        <button class="next" onclick="mode='practice';start()">続けて復習する</button>
        <button class="ghost" onclick="catScreen()">カテゴリ/モードを選ぶ</button>
        ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
      </div>
    </div>
    <div class="note">記録（理解度の箱・最終学習日）はこの端末に保存されます。<br>復習モードは「期限が来た問題・苦手な問題」だけを出します。新しい問題はClaudeに「クイズ更新して」と伝えてください。</div>`;
}

function catScreen(){
  const cats=[...new Set(liveQuestions().map(q=>q.cat))];
  if(!activeCats)activeCats=cats.slice();
  else activeCats=activeCats.filter(c=>cats.includes(c));
  const due=dueCount(liveQuestions());
  const s=document.getElementById('screen');
  s.innerHTML=`
    <div style="margin-bottom:12px;font-size:14px;color:var(--txt2);">出題モード</div>
    <div class="pills" id="modes">
      <button class="pill${mode==='practice'?' on':''}" data-m="practice">復習（期限到来・苦手を優先）${due>0?` ・ ${due}問`:''}</button>
      <button class="pill${mode==='all'?' on':''}" data-m="all">全問（カテゴリ内ランダム）</button>
    </div>
    <div style="margin:18px 0 8px;font-size:14px;color:var(--txt2);">カテゴリ（タップで切替）</div>
    <div class="pills" id="pills"></div>
    <div class="actions">
      <button class="next" onclick="start()">スタート</button>
      <button class="ghost" onclick="activeCats=null;start()">全カテゴリで開始</button>
      ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();catScreen()">削除した問題を復元（${deletedCount()}件）</button>`:''}
    </div>`;
  s.querySelectorAll('#modes .pill').forEach(b=>{
    b.onclick=()=>{mode=b.getAttribute('data-m');catScreen();};
  });
  const p=document.getElementById('pills');
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='pill'+(activeCats.includes(c)?' on':'');
    b.textContent=c;
    b.onclick=()=>{
      if(activeCats.includes(c))activeCats=activeCats.filter(x=>x!==c);
      else activeCats.push(c);
      if(activeCats.length===0)activeCats.push(c);
      catScreen();
    };
    p.appendChild(b);
  });
}

initGlossary();
renderBest();
catScreen();
</script>
</body>
</html>
