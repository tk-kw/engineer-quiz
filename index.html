<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 更新を即反映させるためHTMLのキャッシュを抑止（古い版が表示される問題への対策） -->

<title>実践クイズ — 開発の学び復習</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230e1117'/%3E%3Ccircle cx='32' cy='32' r='17' fill='none' stroke='%237c6cff' stroke-width='4'/%3E%3Cpath d='M32 15 L32 49' stroke='%233ad0a8' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M15 32 L49 32' stroke='%233ad0a8' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1117;
    --bg2:#161b25;
    --card:#1c2230;
    --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.16);
    --txt:#e8eaf0;
    --txt2:#9aa3b5;
    --txt3:#646d80;
    --accent:#7c6cff;
    --accent2:#3ad0a8;
    --ok:#3ad08a;
    --okbg:rgba(58,208,138,.12);
    --ng:#ff6b6b;
    --ngbg:rgba(255,107,107,.12);
    --warn:#ffb84d;
    --info:#5aa9ff;
    --font:'Noto Sans JP',-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic',Meiryo,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:var(--font);
    line-height:1.7;
    min-height:100vh;
    background-image:radial-gradient(circle at 15% -10%,rgba(124,108,255,.18),transparent 45%),radial-gradient(circle at 90% 0%,rgba(58,208,168,.12),transparent 40%);
    background-attachment:fixed;
  }
  .wrap{max-width:680px;margin:0 auto;padding:28px 20px 60px;}
  header{margin-bottom:22px;}
  .kicker{font-family:var(--font);font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);font-weight:600;}
  h1{font-size:26px;font-weight:700;margin:4px 0 2px;letter-spacing:.01em;}
  .sub{font-size:13px;color:var(--txt2);}
  .best{font-family:var(--font);font-size:12px;color:var(--txt3);margin-top:8px;}
  .best b{color:var(--accent2);}

  .bar{height:5px;background:var(--bg2);border-radius:99px;overflow:hidden;margin:18px 0;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s cubic-bezier(.2,.8,.2,1);width:0;}

  .toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .cat{font-family:var(--font);font-size:12px;font-weight:600;letter-spacing:.04em;padding:5px 13px;border-radius:99px;background:rgba(124,108,255,.16);color:#b9b0ff;}
  .meta{font-family:var(--font);font-size:12px;color:var(--txt2);}

  .situation{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px;}
  .situation .lbl{font-size:11px;letter-spacing:.1em;color:var(--txt3);font-family:var(--font);text-transform:uppercase;margin-bottom:7px;}
  .situation .body{font-size:15px;color:var(--txt);}
  /* 状況文の自動整形：(1)(2)(3)の箇条を行に分けて読みやすくする */
  .situation .body .lead{display:block;margin-bottom:6px;}
  .situation .body ul.enum{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:8px;}
  .situation .body ul.enum > li{position:relative;padding:9px 12px 9px 40px;background:var(--card);border:1px solid var(--line);border-radius:11px;line-height:1.6;}
  .situation .body ul.enum > li .num{position:absolute;left:11px;top:9px;width:21px;height:21px;border-radius:7px;background:rgba(124,108,255,.2);color:#b9b0ff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;font-family:var(--font);}
  .situation .body ul.enum > li .eq{color:var(--accent2);font-weight:600;}
  .question{font-size:18px;font-weight:700;margin-bottom:14px;}

  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;background:var(--card);border:1.5px solid var(--line);color:var(--txt);
    padding:14px 16px;border-radius:13px;font-family:inherit;font-size:14.5px;line-height:1.55;
    cursor:pointer;transition:all .15s;width:100%;display:flex;gap:11px;align-items:flex-start;
  }
  .opt .mk{flex-shrink:0;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:var(--font);font-size:12px;font-weight:600;color:var(--txt2);margin-top:1px;}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#222a3a;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--ok);background:var(--okbg);}
  .opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#062;}
  .opt.wrong{border-color:var(--ng);background:var(--ngbg);}
  .opt.wrong .mk{background:var(--ng);border-color:var(--ng);color:#600;}

  .fb{margin-top:16px;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .fb .res{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
  .fb .res.ok{color:var(--ok);}
  .fb .res.ng{color:var(--ng);}
  .fb .exp{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 16px;font-size:14px;color:var(--txt2);}
  .fb .exp b{color:var(--txt);font-weight:500;}

  button.next{margin-top:14px;background:linear-gradient(90deg,var(--accent),#9b8fff);color:#fff;border:none;padding:13px 24px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s,filter .12s;}
  button.next:hover{filter:brightness(1.08);}
  button.next:active{transform:scale(.97);}

  .result{text-align:center;padding:10px 0;}
  .result .big{font-family:var(--font);font-size:54px;font-weight:600;line-height:1;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:6px 0;}
  .result .of{color:var(--txt3);font-size:16px;}
  .result .msg{font-size:15px;color:var(--txt2);margin:14px 0 22px;}
  .review{display:flex;flex-direction:column;gap:7px;margin-bottom:24px;text-align:left;}
  .rrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:10px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;}
  .rrow .ic{font-weight:700;}
  .rrow .ic.ok{color:var(--ok);}
  .rrow .ic.ng{color:var(--ng);}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button.ghost{background:var(--card);color:var(--txt);border:1.5px solid var(--line2);padding:12px 22px;border-radius:12px;font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
  button.ghost:hover{border-color:var(--accent);}
  .pills{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .pill{font-family:var(--font);font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--line2);color:var(--txt2);cursor:pointer;background:transparent;transition:all .15s;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .note{font-size:12px;color:var(--txt3);text-align:center;margin-top:30px;line-height:1.6;}

  .term{color:var(--accent2);border-bottom:1px dashed rgba(58,208,168,.45);cursor:help;}
  .term:hover,.term:focus{color:#fff;border-bottom-color:var(--accent2);outline:none;}
  .glosspop{position:absolute;z-index:60;max-width:min(300px,86vw);background:#0b0f16;border:1px solid var(--line2);border-radius:10px;padding:10px 13px;font-size:13px;line-height:1.55;color:var(--txt);box-shadow:0 10px 30px rgba(0,0,0,.55);font-family:var(--font);}
  .glosspop b{color:var(--accent2);font-weight:500;}

  #delrow{margin-top:18px;text-align:center;}
  .delbtn{background:transparent;border:1px solid var(--line);color:var(--txt3);padding:8px 16px;border-radius:10px;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;}
  .delbtn:hover{border-color:var(--ng);color:var(--ng);}

  /* 間隔反復の箱タグ */
  .boxrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .boxtag{font-family:var(--font);font-size:11.5px;font-weight:600;padding:4px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--txt2);}
  .boxtag.box1{color:var(--ng);border-color:rgba(255,107,107,.4);background:var(--ngbg);}
  .boxtag.box2{color:var(--warn);border-color:rgba(255,184,77,.4);background:rgba(255,184,77,.1);}
  .boxtag.box3{color:var(--ok);border-color:rgba(58,208,138,.4);background:var(--okbg);}
  .boxtag.warn{color:var(--warn);border-color:rgba(255,184,77,.5);background:rgba(255,184,77,.12);}

  /* 回答前の自信ヒアリング */
  .conflbl{font-size:15px;font-weight:700;margin:4px 0 12px;}
  .confbtns{display:flex;gap:10px;}
  .confbtn{flex:1;background:linear-gradient(90deg,var(--accent),#9b8fff);color:#fff;border:none;padding:14px;border-radius:12px;font-family:var(--font);font-size:15px;font-weight:700;cursor:pointer;transition:transform .12s,filter .12s;}
  .confbtn:hover{filter:brightness(1.08);}
  .confbtn:active{transform:scale(.97);}
  .confbtn.ghosty{background:var(--card);color:var(--txt);border:1.5px solid var(--line2);}
  .confbtn.ghosty:hover{border-color:var(--accent);filter:none;}
  .conftip{font-size:12px;color:var(--txt3);margin-top:10px;}

  /* ヒント */
  #hintbox{margin-bottom:10px;}
  .hint{background:rgba(90,169,255,.1);border:1px solid rgba(90,169,255,.3);border-radius:11px;padding:10px 14px;font-size:13.5px;color:#bcd9ff;}
  #hintrow{margin-top:12px;}
  .hintbtn{background:transparent;border:1px dashed var(--line2);color:var(--info);padding:9px 16px;border-radius:10px;font-family:var(--font);font-size:13px;cursor:pointer;transition:all .15s;}
  .hintbtn:hover{border-color:var(--info);background:rgba(90,169,255,.08);}
  .hintdone{font-size:12px;color:var(--txt3);}

  /* 採点後の4象限メッセージ・箱の移動 */
  .confchip{font-family:var(--font);font-size:12px;font-weight:500;color:var(--txt2);}
  .quad{border-radius:11px;padding:10px 14px;font-size:13.5px;margin-bottom:10px;}
  .quad.ok{background:var(--okbg);border:1px solid rgba(58,208,138,.35);color:#8ef0c4;}
  .quad.warn{background:rgba(255,184,77,.1);border:1px solid rgba(255,184,77,.35);color:#ffd591;}
  .quad.ng{background:var(--ngbg);border:1px solid rgba(255,107,107,.4);color:#ff9d9d;}
  .srsmove{font-family:var(--font);font-size:12.5px;color:var(--txt3);margin:10px 0 4px;}

  /* 結果のSRSサマリ */
  .srsstat{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:8px 0 16px;font-size:12.5px;color:var(--txt2);font-family:var(--font);}
  .srsstat span{background:var(--bg2);border:1px solid var(--line);border-radius:99px;padding:5px 13px;}
  .srsstat span b{color:var(--txt);font-size:14px;}
  .srsstat span.bad{border-color:rgba(255,107,107,.4);color:#ff9d9d;}
  .srsstat span.bad b{color:var(--ng);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Practice Recall</div>
    <h1>実践クイズ</h1>
    <div class="sub">これまでの開発の学びを、選択式で復習する</div>
    <div class="sub" style="font-size:12px;color:var(--txt3);margin-top:3px;">下線つきの語句はカーソル/タップで意味が見られます</div>
    <div class="best" id="best"></div>
  </header>
  <div id="screen"></div>
</div>

<script>
const QUESTIONS = [
  {cat:"コンフリクト解消",situation:"rbac.md で衝突。HEAD側(PR)は権限を「分離」する方針、develop側は「統合」する方針。説明文に『逆方向で衝突』『設計判断』というキーワードがある。",q:"これは言い換えるとどういう状況？",options:["片方が古い・間違いで、もう片方が正しい『正誤型』の対立","両方とも一部正しく統合すべき『統合型』の対立","両方とも有効な信念で進化した『設計判断型』の対立","PRの主題と無関係な残骸が混ざっただけ"],answer:2,explain:"『逆方向で衝突』『設計判断』は設計判断型のサイン。develop優先が黄金律ではなく、PRの目的(分離)を尊重するのが正解。"},
  {cat:"コンフリクト解消",situation:"上と同じ『設計判断型』の対立で、PR #637 は『権限を分離する』ことが目的のPRだった。",q:"どうすればいい？",options:["develop側が本流なので統合方針に揃え、分離の変更は破棄してPRを作り直す","#637を生かして分離方針を採用する","分離と統合の両方を満たすよう、権限を分離した上でさらに統合ロールも追加する","判断が割れる設計対立なので、レビュアーが決めるまでマージを保留にする"],answer:1,explain:"PRの目的を自分で打ち消すのは本末転倒。分離はドキュメントとも一致し、最小権限のセキュリティ原則にも合致する。"},
  {cat:"Linter / CI",situation:"develop の crud.service.ts は328行、PR head も328行で、どちらもWARN(許容)でCI通過していた。ところがマージしたら342行になりERRORでCIが落ちた(閾値331行)。",q:"これは言い換えるとどういう状況？",options:["マージ時に両ブランチの変更が二重に取り込まれ、同じコードが重複して行数が膨らんだ","個別には範囲内だが、合算すると上限を超えてしまった","マージで閾値設定の行が書き換わり、331行から328行へ厳しくなった","developに未マージのコミットが残っていて、それが合流して行数が増えた"],answer:1,explain:"引っ越しの荷物の例え。328kg+328kgを1台に積むと規定オーバー。それぞれセーフでも合体でアウトになるパターン。"},
  {cat:"セキュリティ",situation:"documents API に Mass Assignment 脆弱性。approval_status を勝手に書き換えられ、他人の workflow_request_id を紐付けられる。既存のフロント実装は壊したくない。",q:"どう修正するのが最小コストで確実？",options:["フロントの送信フォームから approval_status と workflow_request_id の入力欄を外し、画面側で送らせないようにする","入力を制約(値の許可リスト+所有確認+.strict())","approval_status を更新する全APIにレート制限をかけ、不正な連続書き換えを防ぐ","approval_status カラムを暗号化し、復号できない値は更新を拒否する"],answer:1,explain:"多層防御(Defense in Depth)。approval_statusの値制限・所有確認・未知フィールド拒否の3層で、既存フローを壊さず最小コストで塞ぐ。"},
  {cat:"セキュリティ / 仕様",situation:"コードに『viewSubordinates: view === \"manage\" || user.isSuperAdmin』とある。仕様書では『super_adminでも ?view=manage の申請が必要』。しかし実装ではsuper_adminは申請なしで部下全員の日報が見える。",q:"どうすべき？",options:["super_adminは申請なしで見える方が運用上便利なので、仕様書を実装に合わせて書き換える","|| user.isSuperAdmin を削除し仕様に準拠する","super_adminが部下日報を開いた操作をログに残す監査機能を足し、閲覧自体は許可したままにする","viewSubordinates の判定を承認後フラグでガードし、申請レコードは省略したまま閲覧を続けさせる"],answer:1,explain:"仕様と実装の乖離=情報漏洩リスク。破壊的変更にはなるが、仕様準拠でリスクを解消するのが正しい。"},
  {cat:"ブランチ管理",situation:"#503 は doc-drift で出たissueの派生issueから、さらに派生したissueだった。事故はベース(派生元)の選択ミスが疑われる。",q:"なぜこの構造でベース選択ミスが起きやすい？",options:["派生の連鎖でどのブランチをベースにすべきか見失いやすいから","派生を繰り返したissueは元issueの本文を引き継がず、要件が欠落して間違ったベースを選ぶから","派生元のissueがクローズされると、そこから切ったブランチのベースが自動でdevelopに付け替わるから","派生issueはdevelopではなく直前の派生ブランチをベースにする決まりだから"],answer:0,explain:"家系図の枝分かれの例え。祖父→父→孫→ひ孫と派生が続くと『#503のベースはどこ?』が曖昧になり、現在いるブランチからつい派生してしまう典型パターン。"},
  {cat:"用語理解",situation:"「作業ブランチ」「Issue対応ブランチ」「featureブランチ」という言葉が会話に出てくる。",q:"これらの関係は？",options:["作業ブランチはローカル専用、Issue対応ブランチはリモート用と、用途で使い分ける別物","通常は同じものを指す違う呼び方","featureブランチだけが正式名で、他2つは非推奨の俗称","Issueに紐づくときだけIssue対応ブランチ、紐づかないと作業ブランチと別物になる"],answer:1,explain:"通常フローでは『develop から派生して作業中のブランチ』を指す同じものの別名。ブランチは1つ、呼び方が複数あるだけ。"},
  {cat:"PR / ブランチ",situation:"レビュー中、本来の作業(マッピング表の追記)とは別に、古いテーブル board_meeting_transcripts の消し忘れ参照が見つかった。レビュアーから『この PR 内で対応しますか？』と聞かれた。",q:"「この PR 内で対応する」とはどういう意味？",options:["この修正だけを切り出した別ブランチを立て、新しいPRとして並行して出す","今作業しているブランチにコミットを足して、同じPRの中で一緒に直す","現在のPRに修正内容をコメントで書き残し、コード変更は次のPRに回す","レビュアーが指摘箇所を自分のブランチで直し、その差分をこのPRに取り込んでもらう"],answer:1,explain:"PRは『あるブランチの変更をまとめてマージ提案する単位』で、現在のブランチの中身＝そのPRの中身。『このPR内で対応』とは、別PRに分けず今のブランチにコミットを追加して同じPRに含めること。関連が深く小さい修正ならまとめると履歴が追いやすい。無関係・大きい変更なら別PRに分けて1PR=1目的を保つ。"},
  {cat:"PR / ブランチ",situation:"『このPRというのは現在のブランチのことですか？』という疑問。",q:"PRとブランチの関係として正しいものは？",options:["PRはブランチとは独立した差分のスナップショットで、後からブランチを変えても中身は固定される","PRは1つのブランチと結びついており、そのブランチの中身がPRの中身になる","PRはマージ先(develop)のブランチを指し、作業ブランチとは結びつかない","PRを作るたびに新しいブランチが自動生成され、元のブランチとは別物になる"],answer:1,explain:"PR(プルリクエスト)は『このブランチの変更をdevelop等に取り込んでほしい』というマージ提案。PRは作業ブランチ1本と結びつき、そのブランチにコミットを積むとそのままPRの中身になる。だから『このPR≒現在のブランチ』という理解でほぼ正しい。"},
  {cat:"スコープ設計",situation:"Issue全体が『i18nライブラリ導入 + 277件のエラーコード化 + 209個のVueファイル移行』という超大規模。Issue自体も『まず基盤を1本作れば以降は強制できる』『ボーイスカウトルールで段階移行』を前提にしている。これを単一PRでやると数千行になる。",q:"このPRでどこまで対応するのがベスト？",options:["i18nライブラリ導入含め7件すべてを一気に完遂する","共通の仕組み(エラーコード定義・メッセージ集約・再発防止ルール)という基盤を作り、各問題は代表箇所だけ移行する","基盤は後回しにして、まず209ファイルのVue移行だけを機械置換で一括で済ませる","エラーコード化277件を全部終わらせ、ライブラリ導入と移行は別Issueに分ける"],answer:1,explain:"大規模変更の王道は『まず最初の1本(基盤)を切る』こと。土台ができれば残りは同じパターンの繰り返しになり、後続PRで安全に進められる。全件フル対応は数千行・高リスクで非推奨、特定箇所だけだと再発を防ぐ仕組みが残らない。"},
  {cat:"Linter / CI",situation:"『同じミスをもう混入させない』ための ESLint ルールを入れたい。しかし既存コードには違反が大量にある。",q:"このルールのレベルをどう設定するのがベスト？",options:["最初から error にし、既存違反は一括の自動修正(--fix)で同じPR内に全部直してから通す","warn で導入し、ビルドは止めずに新規混入を可視化して段階的に直す","新規ファイルにだけ error を適用し、既存ファイルは対象外にする overrides を書く","ルールは入れず、レビュー時に人手で同じミスを毎回チェックする運用にする"],answer:1,explain:"いきなり error にすると既存の大量違反でCIが即落ちて何も進まない。warn なら今すぐ導入でき、新しく書いたコードの違反は警告として浮かび上がるので新規混入を防げる。既存違反は段階的に解消すればよい。『まず可視化、強制は後で』が安全な第一歩。"},
  {cat:"i18n / 設計",situation:"金額整形の共通関数 formatCurrency を i18n 基盤として導入したい。Intl.NumberFormat で日本円(ja-JP/JPY)を出すと全角『￥』になるが、既存は半角『¥』。特に patents 系の font-mono(等幅)テーブルは桁を縦揃えしており、半角¥→全角￥で桁揃えがズレる視覚的回帰が起きる。表示が変わらない OPaymentStep2Items もある。",q:"通貨記号の統一をどう進めるのがベスト？",options:["全角￥で全面統一する。視覚的回帰は受容してPRに明記する","formatCurrency を半角¥の直書き実装にして既存表示を維持する","関数はIntl(全角￥)のまま導入し、表示が変わる特許表の移行だけ取り消して、表示不変の箇所のみ代表移行する","関数はIntl(全角￥)で全箇所に適用し、特許表だけ font-mono を解除して桁ズレを目立たなくする"],answer:2,explain:"『正しい基盤は入れる／見た目が壊れる箇所はレイアウト対応とセットで別PRに切り出す』が最善。関数はIntlのままで i18n 的に正しく多通貨拡張もしやすい。代表移行は表示不変の箇所だけにすれば視覚的回帰ゼロで安全にマージでき、桁揃えがズレる特許表は別PRで対応する。全面統一は見た目の劣化を出荷してしまい、半角直書きは基盤の正しさを自分で壊す。"},
  {cat:"スコープ設計",situation:"親Issue #685(実装単位ではないまとめ役)の下に4つのサブIssueがある。#684 テスト不足(path traversal未検証・特許route未カバー・E2E不在/副作用が小さく着手しやすい)、#682 型安全(any・手cast・Zod素通り/影響広いが挙動変更少なめ)、#683 i18n文言ハードコード、#680 リファクタ/Dead code(巨大handler・dead file/挙動不変だが影響範囲大)。",q:"どのサブIssueから着手するのがベスト？",options:["#680 リファクタ。dead code を先に消せば後続の差分が小さくなり、テストや型の修正がやりやすくなるから","#684 テスト不足。挙動を変えず最も低リスクで、後続のリファクタや型変更を検証する安全網になるから","#683 i18n。文言のハードコードはユーザーに見える不具合で、優先度が最も高いから","#682 型安全。anyを潰してから着手すれば、テストやリファクタで型エラーに悩まされなくなるから"],answer:1,explain:"『まず安全網(テスト)を張ってから、崩れやすい大工事(リファクタ・型)へ進む』が定石。テスト追加は挙動を変えず最も低リスクで、先に充実させれば後続の#682(型)や#680(リファクタ)を『テストが通るか』で安全に検証できる=残り全部のリスクが下がる。path traversal等のセキュリティ穴も先に押さえられる。親Issueは実装単位ではないので直接の対象にならない。"},
  {cat:"スコープ設計",situation:"#684のテスト整備に5項目ある。(A)vitest混在解消=bun:testに統一・再混入ガード追加(最も独立・低リスク) (B)cron routeテスト=Date.nowスタブで月境界と全件失敗を検証(会計付与のクリティカルパス) (C)Zod文字数境界テスト(一部既存) (D)なんちゃってテスト書換=readFileSync+toContainの21ファイルを実関数呼び出しに書き換え(大規模でレビュー重い)。全部を1PRに詰めると過大でレビュー困難。",q:"このPRに含める項目の選び方としてベストは？",options:["全5項目を1つのPRにまとめて一度に出す","独立・低リスクな A・B・C を入れ、大規模でレビューの重い D(21ファイル書換)は別PRに切り出す","クリティカルパスの B(cron route)と大規模な D を組にし、A・C は別PRに回す","21ファイル書換の D を先に終えてから、A・B・C を後続でまとめて出す"],answer:1,explain:"『1PR=レビュー可能な単位』を守るのが要点。独立性が高く低〜中リスクな3項目はまとまりの良いPRになり、特にcron route(会計のクリティカルパス)は早く守る価値が高い。21ファイル書換は大規模でレビューが重く、混ぜると安全な変更まで巻き込んでレビュー困難になるため別PRに分ける。テスト着手の中でもさらにレビュー可能な単位へ段階的に絞る判断。"},
  {cat:"レビュー / 運用",situation:"書換9ファイルの作業が終わった。各実装エージェントは自己検証済み(全テストpass・eslintクリーン)。だがこのプロジェクトのスキル規定には『review 必須』と明記されている。レビューをスキップしてコミット・PRへ直行すれば速い。",q:"どう進めるのがベスト？",options:["全テストpass・eslintクリーンならレビューと同等の保証があるので、省略してコミット・PRへ直行する","別の review エージェント(または自分とは別の視点)に9ファイルをレビューさせてから進む","まずPRを出してマージしてしまい、レビューはマージ後に別途やる運用にする","レビューは自分でもう一度コードを読み直すことで代替し、別視点は省く"],answer:1,explain:"『自己検証済み＝レビュー不要』ではない。自己検証(テストpass・lintクリーン)は機械的なチェックで、設計や要件適合・見落としは人/別視点のレビューでしか拾えない。しかも規定に『review 必須』とある以上スキップはルール違反。速さよりルールと品質を優先し、書いた本人とは別の視点(reviewエージェント等)で客観的にレビューしてから進むのが正解。"},
  {cat:"スコープ設計",situation:"未対応サブIssueが3つ。#682 型安全(7項目/範囲は限定的・any/手cast/Zod素通りの是正。フロントがundefinedにアクセスする実害寄りのバグを含む・テストも書きやすい)、#680 リファクタ/Dead code(8項目/挙動を変えない整理でリスク低だが影響範囲が広い・回帰テスト要)、#683 i18n(7項目/209ファイルに日本語直書きで最大規模・1PRに収まらず段階導入の設計が必要)。",q:"残り3つのサブIssueのうち、どれから着手するのがベスト？",options:["#683 i18n。209ファイルに渡る最大規模だが、基盤を先に作れば残りは機械的なので最初に着手すべき","#682 型安全。実害があり範囲が限定的でテストで守りやすいから","#680 リファクタ。挙動を変えない整理なのでリスクが最も低く、まず片付けるべきだから","#680 と #682 を1つのPRにまとめ、型安全とリファクタを同時に進める"],answer:1,explain:"『実害がある × 範囲が狭い × 検証しやすい』が揃うものを優先するのが定石。#682はフロントがundefinedを踏む実害寄りのバグを含み、範囲が限定的で効果が明確、型の不整合はテストで守りやすい。#680は影響範囲が広く、#683は最大規模で基盤設計が必要=どちらも土台が整ってから取り組む方が安全。先に1つに絞り、その後さらにスコープ分割を相談する。"},
  {cat:"スコープ設計",situation:"Issue #590 で休憩バグが2件。ケース1=休憩の新規追加ができない(『1 field=1申請』の設計自体がcreate非対応で、申請フォーム・承認反映・UIの設計変更を伴う大規模)。ケース2=過去日のデフォルト休憩を削除できない(バックエンドのdeleteBreakとDELETE APIは対応済みで、フロント詳細画面に削除ボタンが無いだけの小規模)。",q:"今回の作業でどこまで対応するのがベスト？",options:["同じIssue #590 の2件なので、ケース1+ケース2を1つのPRでまとめて直す","ケース2のみ先行対応し、設計変更を伴うケース1は別Issue/別PRに切り出す","影響の大きいケース1の設計変更を先に片付け、軽いケース2は後回しにする","ケース1の設計変更を待つ間、ケース2の削除ボタンは仮実装で先に出してケース1完了時に作り直す"],answer:1,explain:"規模が桁違いの修正を1PRに混ぜないのが要点(1PR=レビュー可能な単位)。ケース2はバックエンド対応済みでフロントにUIを足すだけ=小規模・低リスクで即マージでき、ユーザーをすぐ救える。ケース1は設計そのものの作り直しが必要で設計判断を伴うため、別Issueでじっくり対応すべき大物。バックエンド対応済みの小修正を先行させ、設計変更の大物を分離するのが正しい。"},
  {cat:"設計判断",situation:"休憩の新規追加機能を作る。実現経路の候補は、(1)従業員のセルフサービスとして打刻修正申請に追加=既存のワークフロー承認経路に乗り監査性を保てる(承認待ちのタイムラグはある)、(2)管理者直接編集に break の CRUD を追加=承認不要で即時救済できるが現状breakを扱わない管理者編集に新規UI/ロジックが必要、(3)両方=救済手段は増えるが変更範囲・テストが最大。",q:"新規休憩追加をどこで可能にするのがベスト？",options:["(2)管理者直接編集。承認不要で即時に救済でき、break用の新規UIも管理画面なら作りやすいから","(1)打刻修正申請。既存の承認経路に乗せられ設計の一貫性と監査性を保てるから","(3)両方を一度に整備する。経路ごとに利用者が違うので救済の取りこぼしを防げるから","(2)管理者直接編集をまず作り、監査が必要になったら後から承認フローに付け替えるから"],answer:1,explain:"新機能は既存の正しい仕組み(承認フロー)に乗せるのが定石。打刻修正申請の経路に乗せれば誰がいつ直したかの監査性が保て、設計の一貫性も高い。承認なしの管理者直接編集は楽だが本来の申請→承認の筋を外れ、breakを扱わない管理画面に新規実装も要る。両方は変更範囲・テストが最大で欲張りすぎ。まず筋の通った1本を作るのが正しい。"},
  {cat:"設計判断",situation:"新規breakは break_start と break_end を1承認単位にまとめないと、片方だけ承認/却下で break_end=null の不正レコードが生まれる。既存は『1フィールド=1申請』でattendance_modificationは単一のnew_valueしか持たない。データ設計の候補は、(1)新field_name『break_add』を追加しnullableなbreak_end用カラムを1列足して1レコードに開始/終了を保持・承認時にcreate=最小マイグレーション、(2)old_value/new_valueを流用=マイグレーション不要だがold_value本来の『サーバ側で取り直す旧値・監査ログ』の意味を壊す、(3)breaks配列の子テーブルを新設=拡張性は高いが新テーブル・反映ロジックで規模が最大。",q:"開始+終了を1申請で扱うデータ設計としてベストは？",options:["(2)old_value/new_valueを流用する。既存カラムに収まりマイグレーションが不要で最小変更だから","(1)新field_name+カラムを1列追加する。最小のマイグレーションで不正レコードを防げるから","(3)breaks配列の子テーブルを新設する。将来の拡張に最も強いから","new_value にJSONで開始/終了を詰めて1レコードに保持する。カラム追加なしで両方を持てるから"],answer:1,explain:"『正しさを保ちつつ変更は最小限』が両立する案を選ぶ。新field_name+1カラム追加なら最小のDB変更で開始・終了を1レコードにまとめられ、片方だけ承認の壊れたデータ(break_end=null)を防げる。old_value流用は一見ラクだがold_value本来の意味=既存の不変条件と監査ログを壊すためNG。子テーブル方式は将来拡張には強いが今回必要な範囲に対し作りすぎ(オーバーエンジニアリング)。"},
  {cat:"コードレビュー / 可読性",situation:"レビュー指摘#2は『テスト用mockの is_default: false は冗長(書かなくても同じ)だから消そう』とした。だが調べると、本物のDBにはスキーマの@default(false)があり、is_defaultを省略すると自動でfalseになる。mockの is_default: false はそのDB既定値を意図的に再現したフォールバックで、消して {id, ...data} に変えると将来is_defaultを省略するcreate経路を通したときundefinedになり実DBと乖離する(現状のbreak_add単一呼び出しでは無害)。",q:"この『冗長』に見えるmock処理をどう実装するのがベスト？",options:["レポート通り {id, ...data} にして冗長コードを除去し、DB既定値の再現はテストでは不要と割り切る","is_default: false を残し『DBの@default(false)を意図的に再現したフォールバック』とコメントで明示する","mockをやめて実DBに接続する統合テストに置き換え、@default(false)の挙動をそのまま検証する","is_default を必須引数にして呼び出し側に常に渡させ、省略時のフォールバック自体を無くす"],answer:1,explain:"『冗長に見えるコードが実は意図的』なら、消さずに意図をコメントで明示するのが最善。レポートが冗長と誤解したのは意図が書かれていなかったから=コメントを足せば『なぜ二重?』の混乱が再発しない。消すと将来is_default省略時にundefinedとなり実DBと乖離する地雷を埋め込む(今は無害でも後で静かにバグる)。won't-fixも動作は同じだが、コードのそばに理由が残らず次に読む人に伝わらない。指摘を鵜呑みにせず正しい理由をコメントで見える化するのが正解。"},
  {cat:"デバッグ / 環境",situation:"新フィールド対応のコードを修正してバックエンドを何度も再起動したのに、ブラウザで提出すると毎回500のまま画面が変わらない。後で分かったのは、フロント(Nuxt)が見ているのはDockerコンテナ上のバックエンド(ポート8080)で、自分が再起動していた host の bun run dev(ポート8081)は誰も使っていなかった。",q:"この状況の真因を一言でいうと？",options:["新フィールド対応のコードに、500を返す未修正のバグが残っていた","直していたバックエンドと、フロントが実際に通信しているバックエンドが別物だった","再起動時にDBマイグレーションが失敗し、新フィールドのカラムが作られていなかった","フロントが古いビルドをキャッシュし、修正後のリクエストを送っていなかった"],answer:1,explain:"『直しても変わらない』ときの典型は、自分が触っているプロセスと実際に動いているプロセスがズレていること。フロントは /api/** を API_BASE_URL=http://localhost:8080 にプロキシするので全リクエストは8080のDockerコンテナに飛ぶ。修正・再起動していた8081は誰も叩いていないため、いくら直しても画面は1ミリも変わらない。まず『今この画面が実際に通信している先はどこか』を確かめるのがデバッグの出発点。"},
  {cat:"デバッグ / 環境",situation:"ローカル開発で同じバックエンドを host の bun run dev(8081)と Docker コンテナ(8080)の二重で起動できる状態だった。フロントの設定は API_BASE_URL=http://localhost:8080。",q:"フロントから出した API リクエストはどちらに届く？",options:["後から再起動して最新になっている方(8081のhost)に届く","8080のDockerコンテナに届く(プロキシ先がそこだから)","8080が処理しきれない分だけ8081に振り分けられる","8081のhostプロセスに届く(bun run dev が開発用の既定だから)"],answer:1,explain:"リクエストの宛先を決めるのは『起動した順』でも『最後に再起動した方』でもなく、フロントのプロキシ設定(API_BASE_URL)。ここが http://localhost:8080 を指す限り、API は全部8080のコンテナに飛ぶ。8081を何度再起動しても無関係。複数の同等プロセスを上げているときは『設定上どこを向いているか』を必ず確認する。"},
  {cat:"Prisma / ORM",situation:"Dockerコンテナは ./backend/src と prisma をマウントし --watch で動かしているのでコードは常に最新(新フィールド break_add 対応済み)。しかし bunx prisma generate はコンテナ起動時に1回だけ実行されるため、生成済みの Prisma client は5日前の古いまま(新カラム new_value_end を認識しない)。その結果 new_value_end 付きの INSERT で『未知フィールド』例外が出る。",q:"コードは最新なのに動かない。原因はどれ？",options:["--watch がschema.prismaを監視対象から外しており、スキーマの変更が反映されていない","生成済みの Prisma client が古く、スキーマの新カラムを認識していない","マイグレーション未適用で、DBに new_value_end カラムがまだ無いから INSERT が失敗する","コンテナ内の Bun のバージョンが古く、新カラム向けの構文を解釈できていない"],answer:1,explain:"Prismaはschema.prismaから『client(型付きのDBアクセスコード)』をprisma generateで生成する。ソースを--watchで最新にしても、生成済みclientは別物で、generateを再実行しない限り古いまま=新カラムを知らない。だからコード上は break_add 対応済みでも、古いclientが new_value_end を『未知のフィールド』として弾く。スキーマ(schema.prisma)を変えたら必ず prisma generate をやり直す、が鉄則。"},
  {cat:"エラーハンドリング",situation:"APIは入力検証(Zod)に失敗したときは適切に400などを返す作りになっている。だが今回は『古いPrisma clientが new_value_end を未知フィールドとして弾く例外』が発生し、これは ZodError ではないため想定外の例外として 500 になった。",q:"なぜ 400 ではなく 500 になった？",options:["new_value_end の値がZodの検証ルールに違反していたが、丸めの都合で500として返されたから","ZodErrorではない想定外の例外で、ハンドリングされず内部エラー(500)になったから","リクエストの内容が大きすぎてサーバーのタイムアウトに達したから","フロントが送ったトークンが期限切れで、認可レイヤーが500を返したから"],answer:1,explain:"400系(クライアント起因)と500系(サーバ起因)の切り分けがポイント。入力検証(Zod)で弾けるものは『あなたの入力が悪い』=400として丁寧に返せる。しかし今回はZodの守備範囲外で起きた例外(古いclientの未知フィールド拒否)なので、想定外=サーバ側の問題として500になった。500を見たら『入力ミス』ではなく『サーバ内部の想定外』を疑い、環境やライブラリの不整合を探す。"},
  {cat:"Prisma / ORM",situation:"ローカルDBに新カラムを適用し、Dockerバックエンドの古い Prisma client を最新化したい。コンテナの起動コマンドには bunx prisma generate が含まれている。",q:"古い client を作り直す最も手早い方法は？",options:["schema.prisma を一度保存し直して --watch にホットリロードさせ、client を再生成させる","docker compose restart backend で再起動し、起動時の prisma generate を再実行させる","host側の bun run dev を再起動して、そのプロセスの client を最新化する","コンテナ内に入り node_modules を削除して bun install からやり直す"],answer:1,explain:"client が古い原因は『generateが起動時に1回しか走っていない』こと。ならば backend コンテナを restart すれば起動コマンドの prisma generate が再実行され、最新スキーマ対応のclientに入れ替わる。全削除は重すぎ、host(8081)の再起動は誰も使っていないので無意味、ハードリロードはフロントのキャッシュ対策であってバックエンドのclientには無関係。原因(generateが古い)に最短で効く操作を選ぶ。"},
  {cat:"基礎 / Git",situation:"2人が同じファイルの同じ行を、別々の内容に書き換えてからマージしようとした。",q:"なぜコンフリクト(衝突)が起きる？",options:["後からマージした側の変更で先の変更が消えるのをGitが事前に防ぐから","同じ箇所が別々に変更され、どちらを採用すべきかGitが自動判断できないから","2人が同時刻にコミットしたためGitが前後関係を時刻順で決められないから","同じファイルを複数人が編集すること自体がGitのロックに反する操作だから"],answer:1,explain:"Gitは行単位で変更を統合する。違う場所への変更なら自動でまとめられるが、『同じ行を両者が別内容に変えた』場合はどちらが正しいかをGitは決められない=人間に判断を委ねる。これがコンフリクト。だからコンフリクト解消とは『どちらの意図を生かすか(または両方をどう統合するか)』を人が決める作業であり、機械的な正解は無い。設計判断型の衝突(既存の#1問)が難しいのはこのため。"},
  {cat:"基礎 / Git",situation:"『マージ』という言葉が頻繁に出てくるが、具体的に何をしているのか曖昧。",q:"マージとは何をする操作？",options:["作業ブランチを本流のコピーで上書きして最新状態に揃えること","別々に進めた2本のブランチの変更を1つに統合すること","複数のコミットを1つにまとめて履歴を圧縮すること","本流から新しい作業ブランチを枝分かれさせること"],answer:1,explain:"ブランチは本流を壊さず作業を枝分かれさせる仕組み。マージはその枝分かれした変更を本流(developなど)へ統合して1本に戻す操作。両者が違う箇所を変えていれば自動で統合でき、同じ箇所がぶつかればコンフリクトになる。『PRをマージする』とは、PRに紐づくブランチの変更を本流へ取り込むこと。"},
  {cat:"基礎 / 可読性",situation:"linterに『1関数◯◯行まで』という行数の上限がある。なぜそんな制限があるのか疑問。",q:"関数の行数に上限を設ける主な狙いは？",options:["1ファイルあたりの関数の数を増やしてモジュール分割を促すため","関数が長すぎると読みにくく・テストしにくく・バグが入りやすくなるのを防ぐため","長い関数はメモリを多く消費するので実行効率を上げるため","関数を短くすると呼び出し回数が増えてカバレッジが上がるため"],answer:1,explain:"長い関数は『一度に把握すべきこと』が多すぎて、読む人の頭に入らず、責務も混ざりやすい=バグの温床。短く分割すれば各関数の役割が明確になり、個別にテストもしやすい。行数制限は『関数を小さく保て』という設計圧をかける仕組み。容量や速度のためではなく可読性・保守性のための制約。"},
  {cat:"基礎 / セキュリティ",situation:"approval_status のような項目を外部入力から受け取るとき、『許可リスト(値の列挙)』で守る方式がある。",q:"許可リスト方式の考え方として正しいのは？",options:["既知の危険な値を列挙して禁止し、それ以外は通す(拒否リスト)","受け入れてよい値だけを列挙し、それ以外は全部弾く","受け取った値をエスケープして安全な文字列に変換してから通す","受け取った値をいったん保存し、後段の処理で正しいか判定する"],answer:1,explain:"許可リスト(ホワイトリスト)は『OKなものだけ通す』方式。拒否リスト(ブラックリスト)は『NGなものを列挙して弾く』が、想定外の悪い値を見落とすと素通りしてしまう。許可リストは『列挙した以外は全部拒否』なので、未知の攻撃値も自動的に弾ける=より安全。approval_statusなら取りうる正しい値だけを許可する。"},
  {cat:"基礎 / セキュリティ",situation:"Mass Assignment対策の一つに『所有確認』がある。他人の workflow_request_id を勝手に紐付けられないようにしたい。",q:"所有確認は何をチェックしている？",options:["指定されたIDがDB上に実在するレコードを指しているか","操作しようとしている対象が、その操作者本人のものか(権限があるか)","入力されたIDの形式やフォーマットが正しいか","リクエスト元が正しくログイン済み(認証済み)か"],answer:1,explain:"値が正しい形でも、『それがあなたのものか』は別問題。他人のIDを指定して他人のデータを書き換える攻撃は、形式チェックだけでは防げない。所有確認は『この操作者は、この対象を操作してよい立場か』を確かめる認可の一種。値の検証(バリデーション)と所有・権限の検証(認可)は別レイヤーで、両方必要。"},
  {cat:"基礎 / セキュリティ",situation:"Zodの .strict() を付けると、定義していないフィールドが入力に混ざっていたら検証を失敗させられる。",q:".strict()(未知フィールド拒否)が防ぐのは？",options:["必須項目が欠けたまま不完全なデータが保存されること","定義外の余計な項目を紛れ込ませて、本来書き換えさせたくない値を更新される攻撃","定義した項目の値が型や範囲の制約を外れていること","同じリクエストが重複して二重に処理されること"],answer:1,explain:".strict()は『定義した項目以外が来たら拒否』する設定。これが無いと、攻撃者が approval_status のような余計な項目をリクエストに足し、まとめ保存処理(Mass Assignment)経由で書き換える余地が残る。許可リスト(値の制限)・所有確認・未知フィールド拒否の3つを重ねるのが多層防御。それぞれ守る角度が違うので、1つでは不十分。"},
  {cat:"基礎 / 仕様",situation:"実装が仕様書と食い違っていた(例: super_adminが申請なしで部下日報を閲覧できる)。実装の方が便利でもある。",q:"原則としてどちらを正とすべき？",options:["原則は実装。すでに動いて使われている挙動を壊さない方が安全だから","原則は仕様。乖離はリスクなので、まず仕様に合わせ、仕様自体が間違いなら仕様を直してから実装を追従させる","コミット日時が新しい方を正とし、古い記述を上書きする","利用者にとって便利な挙動を残す方を都度選んで合わせる"],answer:1,explain:"仕様は『こう動くべき』という合意であり、セキュリティや要件の根拠になる。実装が勝手に外れている状態=情報漏洩などのリスクであり、便利さは正しさの理由にならない。原則は仕様準拠。ただし仕様が実態に合わず誤りなら、議論して仕様を更新し、その上で実装をそろえる。どちらにせよ『暗黙にズレたまま』が一番危ない。"},
  {cat:"基礎 / 設計",situation:"新機能(休憩追加)を既存の『申請→承認』フローに乗せると監査性が保てる、という判断があった。",q:"『監査性が保てる』とはどういうこと？",options:["承認者のチェックが入る分だけ反映が速くなること","誰が・いつ・何を変えたかの記録が残り、後から追跡・検証できること","承認フローを通すことでバリデーションが自動で強化されること","フローに乗せることで権限の少ない人でも変更できるようになること"],answer:1,explain:"監査性とは『後から、誰がいつ何をしたか追える』性質。申請→承認フローに乗せれば各変更が申請レコードとして残り、不正や誤りがあっても追跡できる。承認なしの直接編集は速いが記録が残らず、後で『誰が変えた?』を辿れない。だから新機能は既存の正しい仕組み(承認経路)に乗せる方が、一貫性も監査性も保てる。"},
  {cat:"基礎 / DB",situation:"休憩レコードで break_start はあるのに break_end が null のものを『不正レコード』と呼んでいた。",q:"なぜ break_end=null は『壊れたデータ』になりうる？",options:["時刻カラムにnullを入れること自体がDBの型制約違反になるから","『開始と終了は必ずペアで揃う』という業務上の不変条件を破っているから","break_endがnullだと休憩時間の集計でエラーになり画面が落ちるから","nullのレコードはインデックスに乗らず検索から漏れてしまうから"],answer:1,explain:"データには『常に成り立っていてほしい条件(不変条件)』がある。休憩なら『開始があるなら終了もある』。片方だけ承認されて break_end が欠けたレコードは、この条件を破った=業務的に意味をなさない壊れたデータ。だから開始+終了を1承認単位にまとめ、片方だけ通る経路を作らない設計(既存#19問)が必要。nullそのものが悪いのではなく、不変条件を破るnullが問題。"},
  {cat:"基礎 / DB",situation:"migration(マイグレーション)は『順番に適用・管理する』と説明される。",q:"なぜ順番が重要？",options:["作成日時の新しいものから適用した方が最新状態に速く追いつけるから","各変更は前の状態を前提に積み上がるので、順番が狂うと整合性が崩れるから","適用順とファイル名の連番を一致させないとPrismaが起動できないから","本番では順番を入れ替えてまとめて適用した方が安全だから"],answer:1,explain:"マイグレーションは『現在の構造に、この変更を加える』を積み重ねる仕組み。例えば『カラム追加→そのカラムに制約追加』は順番が逆だと成立しない。だから適用順を記録・固定し、どの環境でも同じ順で再現する。チーム全員のDBや本番が同じ構造になる(冪等・再現性)のはこの仕組みのおかげ。"},
  {cat:"基礎 / Web",situation:"APIの応答に 200 / 400 / 500 などの番号(HTTPステータスコード)が返る。",q:"このコード体系の大きな区分として正しいのは？",options:["数字が大きいほど深刻で、500は400より重大な障害を表す","2xx=成功、4xx=要求側(クライアント)の問題、5xx=サーバー側の問題","2xx=成功、4xx=サーバー側の問題、5xx=要求側(クライアント)の問題","先頭の桁は通信プロトコルのバージョンを表し、エラー種別とは無関係"],answer:1,explain:"先頭の桁で大きく意味が分かれる。2xx=成功、4xx=リクエストした側に原因(不正な入力・権限なし等)、5xx=サーバー側で想定外が起きた。だから400を見たら『入力やリクエストを直す』、500を見たら『サーバー内部・環境を疑う』と切り分けられる。既存問題で『ZodErrorは400相当だが想定外例外は500になった』のはこの区分のため。"},
  {cat:"基礎 / 環境",situation:"接続先のバックエンドURLを API_BASE_URL のような環境変数で外から渡す作りになっている。",q:"接続先をコードに直書きせず環境変数にする利点は？",options:["環境変数に入れた値はビルド時に最適化され実行が速くなるから","ローカル・ステージング・本番など環境ごとに接続先を切り替えられ、コードを変えずに済むから","環境変数は暗号化されて保存されるため接続先が外部から隠せるから","直書きするとURL変更のたびに再コンパイルが必要でビルドが重くなるから"],answer:1,explain:"接続先や鍵など『環境によって変わる値』をコードに直書きすると、環境ごとにコードを書き換える羽目になる。環境変数で外から渡せば、同じコードのまま接続先だけ差し替えられる。今回の事故も『フロントがどのURLを向いているか=環境変数の値』を確認することが、通信先の特定に直結した。"},
  {cat:"基礎 / PR",situation:"『1PR=1目的(レビュー可能な単位)』という原則が繰り返し出てくる。",q:"なぜ1つのPRを小さく1目的に保つのがよい？",options:["PRが大きいとCIの実行時間が長くなりマージが遅れるから","レビューしやすく、問題があったとき切り戻し(revert)も追跡もしやすいから","小さいPRに分けるとコンフリクトが構造上発生しなくなるから","1PRにまとめると関連する変更がレビュアーに一度に伝わり把握しやすいから"],answer:1,explain:"大量の変更を1PRに詰めると、レビュアーが全体を把握しきれず見落としが増え、どの変更が何のためか追えなくなる。小さく1目的なら、レビューが的確になり、不具合時もそのPRだけ戻せる。規模が桁違いの修正を混ぜない(既存#16問)・大規模書換は別PR(既存#14問)が良いのはこの原則の現れ。"},
  {cat:"基礎 / TypeScript",situation:"any を避ける・手castを減らす、という型安全の改善が出てくる。型(TypeScript)は何のためにあるのか。",q:"型が主に防いでくれるのは？",options:["実行時に値の範囲外アクセスを検出して例外として安全に止めること","『文字列が来るはずの所に数値』のような不整合を、動かす前(コンパイル時)に検出すること","ネットワーク経由で受け取ったデータの欠損や破損を自動で補正すること","DBに保存する値が制約に合っているかを保存時にチェックすること"],answer:1,explain:"型は『この値は文字列』『これは数値』と種類を宣言し、矛盾した使い方をコードを動かす前に弾く仕組み。フロントが undefined を踏むようなバグ(既存#17問)も、型がきちんと付いていれば事前に気づける。any は『どんな型でもOK』でこのチェックを無効化するため、多用すると型の恩恵を失う。"},
  {cat:"基礎 / テスト",situation:"『まず安全網としてテストを張ってからリファクタや型変更に進む』という判断が出てくる(既存#12問)。",q:"テストが『安全網』と呼ばれるのはなぜ？",options:["テストが通っていれば設計や要件の正しさまで保証されるから","変更後に『前と同じ正しい動きか』を機械的に再確認でき、壊したらすぐ気づけるから","テストを先に書くと実装の自由度が下がりバグを書きにくくなるから","テストがあれば本番で例外が出ても自動でリカバリされるから"],answer:1,explain:"テストは『期待する動き』を記録したもの。これがあれば、リファクタや型変更で挙動を壊しても、テストが落ちて即座に気づける=落下を受け止める網。だから挙動を変えない作業(リファクタ)ほど、先にテストを充実させてから着手すると安全。ただし機械的チェックなので、設計や要件適合はレビューで別途見る必要がある(テスト≠レビュー)。"},
  {cat:"基礎 / セキュリティ",situation:"『認証(Authentication)』と『認可(Authorization)』は別物として使い分けられている。",q:"両者の違いとして正しいのは？",options:["認証=ログインのこと、認可=ログアウトのことで一連の流れの裏表","認証=相手が誰かを確かめる、認可=その人に操作・閲覧の権限があるか判定する","認証=権限があるかの判定、認可=本人確認で、認可が先に来る","認証=人間向けのログイン、認可=システム間のAPIキー認証を指す"],answer:1,explain:"認証は『あなたは誰か(本人確認・ログイン)』、認可は『あなたにこれをする権限があるか』。ログインできても(認証OK)、他人の日報を見る権限はない(認可NG)ことがある。super_admin乗っ取り問題やMass Assignmentの所有確認は、認証の先にある『認可』の話。順番は認証→認可。"},
  {cat:"基礎 / Git",situation:"作業のたびに develop から新しいブランチを切って、そこで変更する運用になっている。",q:"なぜ本流(develop)で直接作業せず、わざわざブランチを切る？",options:["developは保護設定で直接コミットが必ず禁止されているから","本流を壊さずに変更を試せ、複数人の作業が互いに干渉しないから","ブランチを分けるとコンフリクトが原理的に発生しなくなるから","作業ブランチで進めるとCIが走らず手元で速く試せるから"],answer:1,explain:"本流で直接いじると、未完成や壊れた変更がそのまま全員に影響する。ブランチを切れば、自分の作業を隔離して試行・レビューでき、問題なければマージで本流に取り込む。複数人が同時に別ブランチで進めれば衝突も最小化できる。『本流は常に動く状態に保つ』ための仕組み。"},
  {cat:"基礎 / Git",situation:"1つのコミットに大量の無関係な変更をまとめるか、意味のある単位で小さく区切るか迷う。",q:"コミットの粒度として推奨されるのは？",options:["作業の節目ごとに1日1回、その日の変更を全部まとめてコミットする","『1つの意味のある変更』ごとに区切る","変更したファイル1個につき必ず1コミットを対応させる","コミットは履歴が増えると追いにくいので極力少なくまとめる"],answer:1,explain:"コミットは履歴を読む・戻す単位。『バグ修正』『機能追加』など意味のある塊で区切ると、後から履歴を追いやすく、問題のあるコミットだけをrevertできる。無関係な変更を混ぜると『この修正どこ?』が探しにくく、一部だけ戻すこともできない。PRを1目的に保つのと同じ発想を、コミット単位でも行う。"},
  {cat:"基礎 / DB",situation:"DBの値に NULL がある。break_end が NULL だと不正、という話も出てきた。",q:"NULL とは何を表す？",options:["数値の0と同じ意味で、計算では0として扱われる値","長さ0の空文字と同じで、表示すると何も出ない値","『値が無い・未設定』という状態。0や空文字とは区別される","デフォルト値が未設定のときに自動で入る初期値の総称"],answer:2,explain:"NULLは『値が存在しない/まだ無い』を表す特別な状態で、0(数値)や''(空文字)とは別物。0は『ゼロという値がある』、NULLは『値そのものが無い』。だから break_end=NULL は『終了時刻が入っていない』=休憩が閉じていない状態を意味し、業務の不変条件(開始と終了は揃う)を破る。NULLを許すか(nullable)許さないか(NOT NULL)はデータ設計の重要な判断。"},
  {cat:"基礎 / 環境",situation:"『ローカル』『ステージング』『本番』という環境が出てくる。同じアプリなのに複数ある。",q:"環境を分ける主な理由は？",options:["環境ごとに負荷を分散させてサーバー全体の処理を速くするため","本番(実ユーザーが使う)に影響を与えずに、開発・検証を安全に行うため","環境ごとに別々のコードを書き分け、機能差を出すため","本番とローカルでGitのブランチ運用を分けるため"],answer:1,explain:"本番は実ユーザーの本物のデータが動く場所。ここでいきなり試すと事故が即被害になる。ローカル(自分のPC)で作り、ステージング(本番そっくりの検証環境)で確認し、問題なければ本番へ。段階を踏むことでリスクを下げる。接続先を環境変数で切り替えるのは、同じコードをこれら複数環境で使い回すため。"},
  {cat:"基礎 / 設計",situation:"承認フローに乗せると『承認待ちのタイムラグ』が生じる、という話があった。即時に反映される処理と、そうでない処理がある。",q:"『申請→承認』のような非同期な処理の特徴は？",options:["承認を挟むぶん処理は重いが、その場で必ず結果が返る","要求してすぐ完了せず、別の人/処理を挟んで後から確定する","途中で承認者がチェックするため失敗や中断が起きない","複数の申請を裏で並列処理するので全体の所要時間が短い"],answer:1,explain:"同期的な処理は『要求したらその場で結果が返る』。承認フローは申請者が出した後、承認者の操作を待って初めて確定する=非同期で、タイムラグがある。その代わり第三者のチェックと記録(監査性)が入る。即時の管理者直接編集は速いがチェックが無い。速さと安全・監査性のトレードオフを理解した上で経路を選ぶ。"},
  {cat:"基礎 / Web",situation:"フロントエンド(画面側)とバックエンド(サーバー側)が分かれていて、APIでやり取りしている。",q:"この役割分担として正しいのは？",options:["フロントが認証情報を使ってDBに直接接続し、バックは集計だけ担当","フロントは表示・操作を担当し、データ処理やDB操作はバックがAPI経由で担当","同じ検証を両者で二重に持ち、片方が落ちても動くよう冗長化している","ビジネスルールはフロントに置き、バックは受け取った結果を保存するだけ"],answer:1,explain:"フロント(ブラウザで動く)は見た目とユーザー操作を担当。データの保存・検索・権限判定などはバックエンドが担い、フロントはAPI(窓口)経由で依頼する。DBの認証情報やビジネスルールをフロントに置くと誰でも見えてしまうため、重要な処理はバック側に置く。今回の事故は『フロントがどのバックと話しているか』の取り違えだった。"},
  {cat:"基礎 / Web",situation:"コードを直したのに古い表示のままで、ハードリロード(Cmd+Shift+R)で直ることがある。",q:"なぜキャッシュで古い表示が残る？",options:["サーバー側のビルドが古いまま配信されており、配信元が更新されていないから","一度取得したファイルをブラウザが保存(キャッシュ)して再利用し、新しい版を取りに行かないことがあるから","JavaScriptの実行が一度キャッシュされると変更しても再評価されないから","DNSが古いIPを保持していて別のサーバーを見続けているから"],answer:1,explain:"キャッシュは『一度取った物を保存して使い回す』高速化の仕組み。便利だが、サーバー側が新しくなってもブラウザが古い保存版を使い続け、変更が見えないことがある。ハードリロードはキャッシュを無視して取り直す操作。ただしこれはフロント側の話で、今回のようにバックエンドのclientが古い場合はリロードでは直らない。どの層が古いのかの切り分けが大事。"},
  {cat:"基礎 / 心構え",situation:"『実装の方が便利だから実装を正とする』『動いているから正しい』といった判断が誤りだとされた。",q:"『動いている＝正しい』と言えない理由は？",options:["テストが通っていれば動作の正しさは保証されるので、動く=正しいで問題ない","たまたま今は動いていても、仕様違反・セキュリティ穴・想定外の入力で壊れる可能性が隠れているから","動いていてもリファクタしない限り将来必ず壊れると決まっているから","コードの正しさは実行速度で測るべきで、動作の有無は無関係だから"],answer:1,explain:"『動く』は『今・この条件で・エラーが出ていない』にすぎない。仕様に違反していれば情報漏洩リスクを抱え、想定外の入力やデータでは壊れるかもしれない。正しさは『仕様・要件・安全性を満たすこと』で、現在の動作だけでは保証されない。だから便利さや動作を理由に仕様やレビューを軽視しないのが原則。"},
  {cat:"基礎 / 設計",situation:"break_add の設計で、将来に強い子テーブル方式は『作りすぎ(オーバーエンジニアリング)』として見送られた。",q:"オーバーエンジニアリングとは？",options:["今の要件に足りない機能を削りすぎて、後で作り直すことになる過小設計のこと","今必要な範囲に対して、過剰に複雑・高機能な設計をしてしまうこと","動作速度を上げるために必要以上にコードを最適化しすぎること","将来の拡張に備えて設計ドキュメントを丁寧に書きすぎること"],answer:1,explain:"将来を見越した拡張性は良いことだが、今要らない複雑さを先回りで入れると、実装・テスト・保守の負担が増え、かえってリスクになる。『最小のマイグレーションで不変条件を守る』案が選ばれたのは、必要十分だから。複雑さは『リスクを下げる/重複を消す』など明確な理由があるときだけ足す、が原則(YAGNI: You Aren't Gonna Need It)。"},
  {cat:"基礎 / 心構え",situation:"dead codeの除去やボーイスカウトルールでの段階改善が話に出る。放置すると溜まっていく『負債』の概念がある。",q:"『技術的負債』とは何のたとえ？",options:["有料ツールやライブラリの導入で発生する、開発にかかる金銭的なコストのたとえ","目先の速さのために妥協した設計・コードが、後で利息のように保守コストを増やすこと","新機能を追加するために、あえて先に大量のコードを書いておく前払い投資のたとえ","リファクタリングを進めるほど積み上がっていく、改善作業そのものの累積コストのたとえ"],answer:1,explain:"技術的負債は『今ラクをした分、後で余計に払う』を借金にたとえた言葉。雑な設計やdead code、未解消の不整合は、放っておくと理解・修正のコスト(利息)が積もる。だからボーイスカウトルール(触ったついでに少し改善)や段階的な解消で、負債を増やさず減らしていく。完全返済を一度に狙わず、こまめに返すのが現実的。"},
  {cat:"基礎 / エラー",situation:"今回の500は『例外(exception)が想定外でハンドリングされなかった』結果だった。",q:"プログラムにおける『例外』とは？",options:["通常のルールに当てはまらない特殊なデータパターンを表す印のこと","処理の途中で起きた異常を知らせて、通常の流れを中断する仕組み","エラーが起きても無視して処理を続行させるための設定のこと","発生しても自動的に握りつぶされ、呼び出し元には伝わらない内部ログのこと"],answer:1,explain:"例外は『この先続けられない異常が起きた』ことを呼び出し元へ知らせ、通常処理を中断する仕組み。捕まえて(catch)適切に対応すれば回復や丁寧なエラー応答(400など)ができるが、想定せず捕まえ損ねると最上位まで突き抜けて500になる。だから『どの例外を想定し、どう扱うか(ハンドリング)』を設計することが、堅牢なエラー処理の核心。"},
  {cat:"基礎 / i18n",situation:"日本円で全角『￥』と半角『¥』が混在し、桁揃えがズレる問題があった(既存#11問)。同じ『円記号』なのに見た目も扱いも違う。",q:"なぜ同じ意味の記号で全角・半角の差が生まれる？",options:["特定のフォントが半角と全角の描画を取り違えて表示してしまう不具合のため","文字コード上は別々の文字として定義されており、ロケールやAPIによってどちらを出すかが変わるから","半角¥は旧規格で既に廃止され、今は全角￥に統一する移行期だから","ブラウザが表示幅に合わせて半角と全角を自動で切り替えて出し分けているから"],answer:1,explain:"全角￥と半角¥はコンピュータ上では別の文字(別のコード)として扱われる。Intl.NumberFormatのようなAPIはロケール(ja-JP)に応じて全角￥を出すことがあり、既存の半角¥と混ざる。等幅フォントの表では字幅が違うので桁がズレる。『見た目が同じ＝同じ文字』ではない、という文字コードの基礎が背景にある。"},
  {cat:"基礎 / DB",situation:"DBへの操作で『INSERT』『SELECT』といった命令が出てくる。これらは SQL という言語の一部。",q:"SQL とは何のための言語？",options:["Webページの見た目やレイアウトを定義し、画面を装飾するための言語","データベースに対してデータの取得・追加・更新・削除を指示するための言語","サーバーを起動し、APIのエンドポイントを定義するための言語","通信内容を暗号化して安全にデータをやり取りするための言語"],answer:1,explain:"SQLはリレーショナルDBを操作する専用言語。代表的な命令は SELECT(取得)・INSERT(追加)・UPDATE(更新)・DELETE(削除)の4つ(まとめてCRUD)。Prismaのような ORM は、このSQLを直接書かずにコードからDB操作できるようにする層。だからORMが生成するclientが古いと、新カラム向けの正しいSQLを組み立てられず失敗する。"},
  {cat:"基礎 / DB",situation:"データ操作の基本動作を『CRUD』とまとめて呼ぶ場面がある(管理者編集に break の CRUD を追加、など)。",q:"CRUD が指す4つの操作は？",options:["Copy(複製) / Read(読取) / Undo(取消) / Delete(削除)","Create(作成) / Read(読取) / Update(更新) / Delete(削除)","Connect(接続) / Request(要求) / Update(更新) / Disconnect(切断)","Compile(構築) / Run(実行) / Upload(送信) / Deploy(配備)"],answer:1,explain:"CRUDはデータ操作の基本4種=Create・Read・Update・Delete の頭文字。SQLのINSERT/SELECT/UPDATE/DELETEに対応する。『breakのCRUDを追加』とは休憩データの作成・参照・更新・削除を一通り扱えるようにすること。多くのアプリ機能はこの4操作の組み合わせでできている。"},
  {cat:"基礎 / Web",situation:"APIに対して GET / POST などの『HTTPメソッド』を使い分ける。DELETE API という言葉も出てきた。",q:"GET と POST のおおまかな使い分けは？",options:["GET=データの作成・送信、POST=データの取得という、状態変更の向きが逆の使い分け","GET=データの取得(状態を変えない)、POST=データの送信・作成(状態を変える)","GET=小さいデータの送信、POST=大きいデータの送信という、サイズによる使い分け","GET=認証なしのAPI、POST=認証ありのAPIという、ログイン要否による使い分け"],answer:1,explain:"HTTPメソッドは『その操作の意図』を表す。GETは取得で副作用が無い(何度呼んでも状態は変わらない)。POSTは作成・送信で状態を変える。ほかにUPDATE的なPUT/PATCH、削除のDELETEがある。CRUDと対応づくことが多く(Read=GET, Create=POST, Delete=DELETE)、意図に合ったメソッドを選ぶのが設計の基本。"},
  {cat:"基礎 / Web",situation:"GET は『何度呼んでも状態が変わらない』、DELETE も『同じものを2回消しても結果は同じ』という性質を持つ。マイグレーションの冪等な再適用でも同じ概念が出た。",q:"この『冪等』という性質の意味は？",options:["一度実行したら二度目以降はエラーになり、実行を拒否する性質のこと","同じ操作を何回繰り返しても、結果(状態)が同じになること","途中で失敗しても自動でリトライされ、最終的に必ず成功する性質のこと","複数の処理をまとめて、全部成功か全部失敗のどちらかにする性質のこと"],answer:1,explain:"冪等とは『繰り返しても結果が変わらない』性質。例えば『この行を削除』は2回実行しても最終状態(その行が無い)は同じ=冪等。逆に『残高に+100する』は呼ぶたび増えるので冪等でない。冪等な操作はリトライや再適用が安全(二重実行で壊れない)。冪等なマイグレーションが重要なのは、誤って再適用しても壊れないため。"},
  {cat:"基礎 / Git",situation:"変更を記録するとき git add してから git commit する。間に『ステージング(ステージ)』という段階がある。",q:"git add(ステージング)は何をしている？",options:["手元の変更をリモート(GitHub)に送って共有可能な状態にしている","次のコミットに含める変更を選んで準備している","直前のコミットを取り消して、変更を作業前の状態に戻している","変更内容を一時退避(stash)して、作業ツリーをきれいにしている"],answer:1,explain:"Gitは『作業中の変更→ステージ(コミット予定)→コミット(記録)』の3段階。git add は『この変更を次のコミットに入れる』と選ぶ操作=ステージング。これにより、たくさんの変更のうち関連するものだけを選んで1コミットにまとめられる(粒度の調整)。commitで初めて履歴に記録され、pushでリモートに送られる。"},
  {cat:"基礎 / Git",situation:"作業した変更はまずローカルにコミットされ、その後 push で初めてGitHubに反映される。",q:"ローカルとリモートの関係として正しいのは？",options:["コミットした瞬間にリモート(GitHub)にも自動で反映され、即座に共有される","コミットは手元(ローカル)の記録で、pushして初めてリモート(GitHub)に送られる","コミットせず保存しただけでも、リモートには変更が反映され他人から見える","一定時間ごとにローカルとリモートが自動で双方向同期され、手動操作は不要"],answer:1,explain:"Gitは分散型で、手元に履歴の完全なコピーを持つ。commitはローカルの履歴に記録するだけで、この時点では自分しか見えない。pushでリモート(GitHub)へ送って初めて共有される。逆にpullで他人の変更を取り込む。『コミットしたのに反映されない』は、push忘れが定番の原因。"},
  {cat:"基礎 / Web",situation:"フロントとバックは『JSON』という形式でデータをやり取りすることが多い。APIの応答もJSONが一般的。",q:"JSON とは？",options:["写真や図を効率よく圧縮して保存する、画像専用のバイナリ形式","キーと値で構造化データを表す軽量なテキスト形式。プログラム間のデータ交換に広く使う","大量のデータを高速に検索・保存できる、データベース製品の一種","通信内容を第三者に読まれないよう変換する、データの暗号化方式の一種"],answer:1,explain:"JSONは {\"key\": \"value\"} のように、キーと値でデータを表すテキスト形式。人にも読めて、多くの言語で簡単に変換できるため、API のリクエスト/レスポンスの定番。フロントが送る入力もJSON、バックが返す結果もJSON。Zodはこの受け取ったJSONが期待した形か検証する役割を担う。"},
  {cat:"基礎 / 設計",situation:"approval_status のような項目に『取りうる値が決まっている』ものがある。enum(列挙型)やErrorCodeのコード化もこの考え方。",q:"値を『決まった集合』に限定すると何が良い？",options:["取りうる値を少数に絞ることで、保存に必要なメモリ容量を大幅に削減できるから","取りうる値が明確になり、想定外の値の混入や打ち間違いを型・検証で防げるから","値が限定される分だけ通信で送るデータ量が減り、APIの応答が速くなるから","条件分岐を減らせるので、書くコードの行数が短くなり実装が早く終わるから"],answer:1,explain:"『この項目はこの数種類しか取らない』と定義(enum)すれば、それ以外の値はそもそも入れられなくなり、タイプミスや不正値を事前に弾ける。エラーコードを文言でなくコード(enum)で管理するのも同じ狙いで、表記揺れを防ぎ多言語化もしやすい。許可リストで approval_status を制限するのも、値を決まった集合に閉じ込める発想。"},
  {cat:"基礎 / 心構え",situation:"レビュー指摘や自動レポートの提案(『この冗長コードを消そう』等)が、調べると誤りだったことがあった(既存#20問)。",q:"指摘・提案への向き合い方として適切なのは？",options:["レビュアーや自動ツールは自分より知見が豊富なので、前提を確かめず無条件に従う","指摘の前提が正しいかを自分で確かめ、誤りなら理由を添えて従わない判断もする","自分が書いた意図を一番分かっているので、外部からの指摘は基本的に受け流す","指摘されたコードは疑わしいので、まとめて削除して書き直すのが安全策"],answer:1,explain:"レビューや自動ツールの指摘は有用だが、前提を誤ることもある(冗長に見えたコードが実は意図的だった等)。鵜呑みも全拒否もせず、『なぜそう言えるか』を確かめて判断するのが正しい。従わない場合は理由を残し(コメントやIssue)、次に読む人にも伝わるようにする。指摘は『考えるきっかけ』であって絶対の命令ではない。"},
  {cat:"基礎 / セキュリティ",situation:"フロント側でも入力チェックはするが、バック側でも必ず検証(Zod等)する二重構造になっている。",q:"なぜフロントだけでなくバックでも検証する？",options:["本来はフロントだけで十分で、バック側の検証は念のための冗長な二重化にすぎない","フロントの検証は迂回・改ざんできるため、最後の砦としてバック側の検証が必須だから","サーバー側の方が処理が高速なので、重い検証はバックに寄せた方が効率的だから","フロントは表示専用でロジックを持てず、入力チェック自体が技術的に書けないから"],answer:1,explain:"フロントの入力チェックは『親切なUI』のためで、ブラウザの開発者ツールや直接APIを叩けば簡単に迂回できる。だから信頼できる検証はサーバー側に必ず置く=最後の砦。Mass Assignment対策や .strict() がバック側にあるのはこのため。『フロントの入力は信用しない』がセキュリティの基本姿勢。"},
  {cat:"基礎 / 環境",situation:"古いPrisma clientの問題は『5日前に生成されたまま依存が古い』ことが原因だった。ライブラリやツールには版(バージョン)がある。",q:"『生成物や依存が古い』ことが問題になるのはなぜ？",options:["古い生成物や依存はコードからそもそも読み込めず、起動すらできなくなるから","コード(新しい前提)と、それが使う生成物/依存(古いまま)の間にズレが生じ、想定外の不整合や不具合が起きるから","古いバージョンはリリース後にサポートが切れ、自動的に使用不可になるから","古い実装は最適化が進んでおらず、新しい版に比べて常に動作が遅くなるから"],answer:1,explain:"コードは『新しいスキーマ/APIがある前提』で書かれるのに、それを支える生成物(Prisma client)や依存ライブラリが古いままだと、両者の期待がズレる=新カラムを知らない、関数が無い等の不整合が起きる。だからスキーマや依存を更新したら、生成物の再生成(generate)やインストールを揃える必要がある。『コードだけ新しくしても土台が古い』が今回の罠だった。"},
  {cat:"基礎 / Git UI",situation:"VS Code 左下のステータスバーに、ブランチ名と並んで『39↓ 0↑』のような数字が出ている。",q:"この『↓』と『↑』の数字は何を表す？",options:["↓=現在のエラー(Problems)の件数、↑=現在の警告(Warning)の件数","↓=リモートから取り込んでいない(pullすべき)コミット数、↑=まだ送っていない(pushすべき)コミット数","↓=直近の変更で削除した行数、↑=直近の変更で追加した行数","↓=ローカルにあるブランチの総数、↑=リモートにあるブランチの総数"],answer:1,explain:"↓は『リモートにあって手元に無い＝pullで取り込む分』、↑は『手元でコミット済みだがまだ送っていない＝pushする分』。中央の↻はSync(pull→pushをまとめて実行)ボタン。⊗0 ⚠0 は別物でProblemsのエラー/警告数(Gitとは無関係)。ブランチ名末尾の*は『未コミットの変更が手元にある』印。"},
  {cat:"基礎 / Git UI",situation:"いま作業ブランチ feature-x を開いていて、ステータスバーは『39↓ 0↑』。この↓↑が何と何を比べた数字なのかを確認したい。",q:"この↓↑が比較しているのは？",options:["主軸ブランチである develop と、その追跡先 origin/develop を常に比べた数字","いまチェックアウト中のブランチ(feature-x) と その追跡先リモートブランチ","ローカルにある全ブランチを集計して、合計の遅れ・進みを表した数字","リリース対象の main と開発用の develop を比べた、ブランチ間の差分の数字"],answer:1,explain:"ステータスバーの↓↑は常に『今チェックアウト中のブランチ vs その upstream(追跡先)』を比べる。だから feature-x を開いている間は develop の状態は表示されない。develop の↓↑を見たければ develop にチェックアウトし直す必要がある。『この数字＝developの状態』と思い込むのが誤解の元。"},
  {cat:"基礎 / Git",situation:"develop を主軸に開発している。『develop の push/pull が 0 なら、自分の作業は問題ないか？』という疑問。",q:"これだけで『問題なし』と言える？",options:["言える。developが最新なら、そこから派生した作業ブランチも自動で最新化される","言えない。それはdevelopがリモートと一致しているだけで、自分の作業ブランチがdevelopの最新を取り込めているかは別問題","言える。push/pullが0という表示は、ローカルの全ブランチが同期済みである証拠だから","developだけ最新なら良く、作業ブランチの遅れは後でマージ時に自動解消されるので確認不要"],answer:1,explain:"develop が 0↓0↑ なのは『手元のdevelopがリモートのdevelopと同じ最新』という意味にすぎない。本当に注意すべきは『develop は進んだのに、派生した作業ブランチがその進んだ分を取り込めていない』状態で、これはdevelopの↓↑を見てもわからない。git fetch して『作業ブランチ..origin/develop』の差分を確認し、遅れていれば定期的にdevelopをmerge/rebaseで取り込むのが安全。"},
  {cat:"基礎 / Git",situation:"作業ブランチ audit-704 は develop から派生し、PRで既に develop にマージ済み。だがそのブランチに居残っていると『39↓』と表示される。",q:"このマージ済みブランチの『39↓』をどう扱う？",options:["遅れは危険なので、39コミットをこのブランチに取り込んで develop と同じ状態に最新化する","追従不要。これは『このブランチはもう古い・用済み』のサイン。develop に戻って pull し、用済みブランチは削除する","マージが正しく反映されていない疑いがあるので、同じ内容でPRをもう一度作り直す","developが39コミット進みすぎているので、developを39コミット分巻き戻して揃える"],answer:1,explain:"PRがマージ済みなら作業内容は既にdevelopに入っており、やり残しは無い。マージ後にdevelopが他の人の変更で進むため、古いブランチに居残ると『追跡先より39遅れている』と出るだけ=用済みのサイン。最新化する意味は無く、正しい後始末は『develop に checkout → pull で最新化 → 用済みブランチを削除 → 最新developから次の新ブランチを切る』。古い派生元で作業し続ける事故を防げる。"},
  {cat:"基礎 / Git",situation:"作業ブランチがマージ済みかを念のため確かめたい。",q:"確実な確認方法として適切なのは？",options:["ステータスバーの↓の数字が大きいほどマージ済みなので、その数字が増えているか確認する","PR画面のMerged表示を見る、または git fetch 後に『git branch --merged origin/develop』で対象ブランチが出るか確認する","マージ完了時にブランチ名へ自動で付く『merged』の接尾辞が付いているかを確認する","作業ブランチとdevelopのコミット数が一致していればマージ済みなので、両者の数を数えて比べる"],answer:1,explain:"↓の数字が大きいことはマージ済みの証拠にはならない(単に遅れているだけかも)。確実なのはPRがMergedになっているかを見るか、git branch --merged origin/develop で『developに完全に取り込まれたブランチ』の一覧に出るかを確認すること。出れば取り込み済みの確証。出ない場合はマージ後に追加コミットした等の可能性があり、その差分だけ確認すればよい。"},
  {cat:"基礎 / Git",situation:"作業ブランチに未コミットの変更(ブランチ名末尾の*)がある状態で、リモートの最新を取り込みたい(pull したい)。",q:"安全な進め方は？",options:["そのまま pull する。Gitが未コミットの変更を保護しつつ自動でうまくマージしてくれる","先に変更をコミット(または stash で退避)してから pull する","未コミットの変更を全部破棄して作業ツリーをきれいにしてから pull する","競合を避けるため pull はせず、未コミットのまま手元で作業を続ける"],answer:1,explain:"未コミットの変更があるままpullすると、取り込む変更とぶつかって競合・予期せぬ上書きが起きることがある。まず自分の変更を『コミットして区切る』か『stashで一時退避』してからpullすると安全。破棄は変更を失うので最終手段、放置は遅れが溜まって後のマージが大変になる。『手元を一旦きれいな状態にしてから取り込む』が基本。"},
  {cat:"設計判断",situation:"会社ごとに休日が違うバグを直したい。データに『どの会社か(company_id)』を持たせる設計案がある。Issueの推奨は案B(NOT NULL=会社IDを必須化)。だが調査で判明した制約: 認証コンテキストにcompany_idが無い・営業日判定が会社情報なしで呼ばれている・会社選択UIが存在しない・既存は全社共通設計。これは小さなbug-fixのはず。",q:"採用する設計案としてベストは？",options:["案B(NOT NULL必須)。Issueの推奨どおり値が必須でデータの意味が明確になり、一番きれいだから","案A(NULL許容)。NULL=全社共通/値あり=会社固有とし、既存を壊さず最小修正で段階移行できるから","案C(現状維持)。今は影響が読み切れないので設計は変えず、再現条件をIssueに追記してクローズする","会社選択UI・認証へのcompany_id追加まで含め、この機会に正しい形へ一気に作り直す"],answer:1,explain:"案B(必須化)を完全採用すると『その必須のcompany_idをどこから取るか』が問題になり、認証へのcompany_id追加→営業日判定の引数追加→呼び出し元すべての改修→会社選択UI、と芋づる式に大工事化してbug-fixの範囲を大きく超える。案A(NULL許容)なら既存の全社共通データを壊さず、必要な所だけ会社固有の休日を足せて段階移行でき、現状アーキとの相性も高い。『正しさは保ちつつ変更は最小限』を満たす案を選ぶ(=既存の最小マイグレーション・新機能を既存フローに乗せる判断と同根)。案Bが本筋になるのは会社選択UIや認証整備まで含む別の大きなIssueとして扱う場合。"},
  {cat:"設計判断",situation:"上と同じ件。Issueには『推奨は案B』と書かれていたが、着手後の調査で『認証にcompany_idが無い/会社選択UIが無い』など、案Bを重くする制約が新たに判明した。",q:"Issueの推奨と、調査で判明した制約が食い違うときどうする？",options:["Issueの推奨は起票者が決めた方針なので、制約があっても必ず案Bのまま進める","調査で分かった制約を踏まえて方針を見直し、必要なら推奨と違う案(A)を理由とともに提案・確認する","判明した制約はいったん脇に置き、まず案Bで動くものを作ってから後で考える","推奨と現実が食い違って判断できない状態なので、対応不能としてIssueをクローズする"],answer:1,explain:"Issueの推奨は『その時点の情報による暫定方針』であって絶対の命令ではない。着手後の調査で前提を覆す制約(認証にID無し・UI無し等)が分かったら、それを踏まえて方針を見直すのが正しい。鵜呑みにせず、なぜ推奨と違う案が適切かを理由とともに示して確認する。これは『指摘・提案の前提を自分で確かめる』姿勢と同じで、新事実が出たら判断を更新するのが妥当。"},
  {cat:"設計判断",situation:"設計でNULLの扱いを決める。案Aは『company_id が NULL=全社共通、値あり=その会社固有』とNULLに意味を持たせる。一方でNULLは『未設定・値なし』を表す状態でもある。",q:"このようにNULLに意味を持たせる設計の注意点は？",options:["NULLに業務的な意味を持たせること自体が規約違反であり、設計として許されない","『NULL=全社共通』という約束をコード全体で一貫させ、ドキュメント化しないと『未設定なのか全社共通なのか』が曖昧になり誤読・バグを生む","NULLに意味を持たせれば値の解釈が一意に決まるので、特に注意すべき点はない","NULLは比較や集計の対象外になるため、全社共通データが検索で必ず除外されてしまう"],answer:1,explain:"NULLは本来『値なし』を表すため、そこに『全社共通』という業務的な意味を乗せると、読み手が『単に入れ忘れたのか/意図的な全社共通なのか』を区別できなくなる危険がある。だから採用するなら『NULL=全社共通』という約束を全コードで一貫させ、コメントや仕様に明記して誤読を防ぐ必要がある。これを徹底できれば既存を壊さず段階移行できる有効な手だが、約束が曖昧だと静かなバグの温床になる(意図はコメントで見える化する、と同じ考え)。"},
  {cat:"デバッグ / 環境",situation:"以前にも『コードは正しいのに古いPrisma clientで500』という事故があった。今回また別の機能(会社休日追加)で、稼働中の backend コンテナ(起動から3時間)の Prisma client が company_id 列を追加する前に生成されたままで、Unknown argument company_id の Prisma 層エラーが起きた。コード・schema.prisma は正しい。",q:"同じ症状が再発した。これをどう捉えるべき？",options:["毎回たまたま運が悪いだけなので、その都度コードを疑って調べ直す","スキーマ変更後にPrisma clientの再生成が漏れると起きる『恒常的な落とし穴』。スキーマを変えたら docker compose restart で client 再生成、を手順として定着させる","コンテナの起動時間が3時間を超えると client が壊れるバグなので、定期的に再起動する運用にする","Prisma をやめれば再発しないので、別のORMへ移行する"],answer:1,explain:"同じ原因(スキーマ変更→client再生成漏れ→Unknown argument→500)で二度起きたなら、それは偶然ではなく『この開発環境の構造的な落とし穴』。一度きりの対処で終わらせず、『スキーマを変えたら client を再生成(docker compose restart backend)する』を手順・チェックリストとして定着させ、再発を仕組みで防ぐのが正しい。起動3時間や時間経過は無関係(原因はあくまで生成タイミング)、ORM乗り換えは過剰反応。"},
  {cat:"テスト / スコープ",situation:"今回の500は環境起因(古いclient)で、コードや schema は変更していない。調べると既存の integration テスト business-day.integration.test.ts が、company_id 付きの create 経路(全社共通=null / 会社固有=UUID)を既にカバーしていた。",q:"このバグ対応で回帰テストをどうする？",options:["バグが出た以上、必ず新しい回帰テストを1本追加しなければならない","コード変更が無く、該当経路は既存の integration テストがカバー済みなので、新規テスト追加は不要と判断する","既存テストは信用できないので、同じ内容のテストをもう1本書いて二重化する","テストは関係ないので何も確認しない"],answer:1,explain:"回帰テストの目的は『同じ壊れ方を二度させない』こと。今回はコードもschemaも変えておらず、壊れたのは環境(client生成漏れ)。そして company_id 付き create 経路は既存の integration テストが既に通している=その経路の回帰防止はすでに存在する。だから新規テストは不要と判断できる。『バグ＝必ずテスト追加』ではなく、何が原因で・既存テストが何を守っているかを見て要否を決める。コード修正を伴う場合は当然テストを足すが、今回は環境対応のみ。"},
  {cat:"設計判断",situation:"会社休日テーブルで company_id を null許容にした。全社共通の休日は company_id=null、特定会社の休日は company_id=その会社のUUID で保存する。同じ日付でも『全社共通の1件』と『A社固有の1件』が両立できる必要がある。",q:"同じ日付で全社共通と会社固有が併存でき、409(重複)にならないのはなぜ？",options:["日付だけで重複判定しており、後から入れた方が自動で弾かれるから","一意制約を『日付』ではなく『日付＋company_id』の組で張っているため、company_idが違えば別レコードとして共存できるから","null は何個でも重複してよい特別扱いなので、全社共通だけが無制限に作れるから","会社固有の休日は別テーブルに保存されるので、そもそも衝突しないから"],answer:1,explain:"『同じ日付でも会社ごとに別の休日を持てる』を実現する鍵は、一意制約をどの単位で張るか。日付単体でユニークにすると2件目で409(重複)になるが、『日付＋company_id』の複合キーでユニークにすれば、company_idが null(全社共通)とUUID(A社)で異なるので別レコードとして共存できる。NULL許容設計(company_id=null=全社共通)と複合一意制約がセットで、段階移行と重複防止を両立している。"},
  {cat:"設計判断",situation:"PIN認証のPRを実装中。認証成功後、『認証済み社員』を次画面(打刻実行)に引き渡したいが、引き渡しを受ける側の画面(#102)と端末Cookie(#170)はまだ未実装。このPRはPIN検証・ロック・認証画面に集中する方針。",q:"引き渡しの設計をどうするのがベスト？",options:["未実装でも将来必要になるので、このPRで引き渡し方式まで完全に作り込んでおく","このPRはPIN検証・ロック・画面に集中し、成功時は次画面ルートへ遷移させるに留め、引き渡し方式の確定は担当issue(#102/#170)に委ねる","引き渡し先が無いので、認証機能自体の実装を引き渡し先が出来るまで止める","引き渡しは諦め、毎回PIN認証をやり直す仕様にする"],answer:1,explain:"引き渡しを受ける側(#102/#170)が未実装の段階で、引き渡し方式を今のPRで確定・作り込むと、後で受け側の都合に合わず手戻りになる(先取りの作り込み=スコープ膨張)。このPRの主題はPIN検証・ロック・画面なので、そこに集中し、遷移は最小限(次画面ルートへ)に留め、引き渡し方式の確定は担当issueに委ねるのが筋。1PR=1目的・未実装の隣接機能を先取りしない、というスコープ判断。"},
  {cat:"セキュリティ",situation:"PIN認証成功後の社員引き渡し方式の案として『署名なしで employee_id を query や hidden フィールドにそのまま入れて次画面へ渡す』というものがある。実装は最小で済む。",q:"この案の問題点は？",options:["実装が最小なので問題はなく、これを採用すべき","query/hiddenの値はユーザーが自由に書き換えられるため、認証を経ずに任意の employee_id を打刻できる『なりすまし』を許してしまう","query は文字数制限があるので長い employee_id が途切れるという問題","hidden フィールドは古いブラウザで表示されてしまう"],answer:1,explain:"フロントから送られる query や hidden の値は、ブラウザの開発者ツールやURL編集で簡単に改ざんできる(信用できない入力)。署名なしで employee_id を渡すと、攻撃者が他人のIDに書き換えて『認証を経ずに任意の社員として打刻』できてしまう=なりすまし。だから署名付き短命トークン等で『認証済みであること』を検証可能にする必要がある。『フロントからの値は信用しない/最後の砦はサーバー』の原則そのもの。"},
  {cat:"セキュリティ",situation:"PINロックの仕様を決める。5回失敗で10分ロック。このロック回数を『その端末ごと』に持つか『社員ごと(端末跨ぎ)』に持つかで迷う。仕様は社員単位(端末跨ぎ)と確定した。",q:"なぜロックを端末単位でなく社員単位にする？",options:["端末ごとの方が実装が複雑になるから、単に楽な方を選んだ","端末単位だと、攻撃者が端末を変えるだけでロックを回避して同じ社員のPINを試し続けられるため、社員単位にして総当たりを実質的に防ぐ","社員単位の方がロックが早く解除されて利用者に親切だから","端末単位ではロック時間を10分に設定できないから"],answer:1,explain:"ロックの目的はPINの総当たり(ブルートフォース)を止めること。端末単位でカウントすると、攻撃者は別の端末・別ブラウザに変えるだけで失敗回数がリセットされ、同じ社員のPINを延々と試せてしまう。社員単位(その社員への失敗を端末を跨いで合算)にすれば、どの端末から試しても5回でロックされ、総当たりを実質的に防げる。『何を守りたいか(その社員のPIN)』を軸にカウント単位を決める。"},
  {cat:"セキュリティ",situation:"PINをDBに保存する。テーブルには pin_hash という列があり、bcrypt でハッシュ化して格納している。平文(そのままのPIN)では保存していない。",q:"PINを平文でなくハッシュで保存する理由は？",options:["ハッシュにすると保存容量が小さくなるから","DBが漏洩しても元のPINが直ちには分からないようにするため。ハッシュは元に戻せず、照合は入力をハッシュ化して比較する","ハッシュ化するとPIN認証の処理が速くなるから","平文だと文字数制限に引っかかるから"],answer:1,explain:"パスワードやPINを平文で保存すると、DBが漏洩した瞬間に全員の認証情報がそのまま盗まれる。bcrypt等のハッシュは『元に戻せない一方向変換』なので、漏れてもすぐには元のPINが分からない。認証時は『入力されたPINを同じ方式でハッシュ化し、保存済みハッシュと一致するか』で照合する(元に戻す必要がない)。bcryptはさらに総当たりを遅くする仕組みも持つ。容量や速度のためではなく、漏洩時の被害を抑える対策。"}
];

const GLOSS_TERMS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GLOSS_RE=new RegExp(GLOSS_TERMS.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'g');
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// テキストをエスケープしつつ、用語にハイライト用spanを付与する（同一テキスト内では各用語を1回だけ）
function gloss(text){
  const seen=new Set();
  return esc(text).replace(GLOSS_RE,(m,offset,full)=>{
    if(seen.has(m))return m;
    if(/^[\x20-\x7e]+$/.test(m)){ // 英数字の用語は、より長い単語の一部なら除外
      const b=full[offset-1],a=full[offset+m.length];
      if(b&&/[A-Za-z0-9]/.test(b))return m;
      if(a&&/[A-Za-z0-9]/.test(a))return m;
    }
    seen.add(m);
    return `<span class="term" tabindex="0" data-def="${escAttr(GLOSSARY[m])}">${m}</span>`;
  });
}

function formatSituation(rawText){

  const numRe=/[（(]\s*([1-9１-９])\s*[）)]/g;

  // gloss(HTML化)はタグ内に = や ( を含むため、整形は生テキスト上で行ってから最後にglossする。
  const firstIdx=nums[0].index;
  const lead=rawText.slice(0,firstIdx).trim();
  const items=[];
  for(let i=0;i<nums.length;i++){
    const start=nums[i].index+nums[i][0].length;
    const end=(i+1<nums.length)?nums[i+1].index:rawText.length;
    let seg=rawText.slice(start,end).trim();

    items.push({n:nums[i][1],seg});

    const seg=it.seg.replace(/\s*=\s*/,EQ);
    let g=gloss(seg).replace(EQ,' <span class="eq">→</span> ');
    return `<li><span class="num">${it.n}</span>${g}</li>`;
  }).join('');
  return `${lead?`<span class="lead">${gloss(lead)}</span>`:''}<ul class="enum">${lis}</ul>`;
}
function initGlossary(){
  const pop=document.createElement('div');
  pop.className='glosspop';pop.style.display='none';
  document.body.appendChild(pop);
  let pinned=null,timer=null;
  function show(el){
    pop.textContent=el.getAttribute('data-def');
    pop.style.display='block';pop.style.left='0px';pop.style.top='0px';
    const r=el.getBoundingClientRect();
    const pw=pop.offsetWidth,ph=pop.offsetHeight,vw=document.documentElement.clientWidth;
    let left=window.scrollX+r.left+r.width/2-pw/2;
    left=Math.max(window.scrollX+8,Math.min(left,window.scrollX+vw-pw-8));
    let top=window.scrollY+r.top-ph-10;
    if(top<window.scrollY+4)top=window.scrollY+r.bottom+10;
    pop.style.left=left+'px';pop.style.top=top+'px';
  }
  function hide(){pop.style.display='none';}
  document.addEventListener('mouseover',e=>{const t=e.target.closest&&e.target.closest('.term');if(t){clearTimeout(timer);if(!pinned)show(t);}});
  document.addEventListener('mouseout',e=>{const t=e.target.closest&&e.target.closest('.term');if(t&&!pinned)timer=setTimeout(hide,140);});
  document.addEventListener('click',e=>{
    if(e.target.closest('.glosspop'))return;
    const t=e.target.closest('.term');
    if(t){e.stopPropagation();if(pinned===t){pinned=null;hide();}else{pinned=t;show(t);}return;}
    if(pinned){pinned=null;hide();}
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){pinned=null;hide();return;}
    const ae=document.activeElement;
    if((e.key==='Enter'||e.key===' ')&&ae&&ae.classList&&ae.classList.contains('term')){
      e.preventDefault();if(pinned===ae){pinned=null;hide();}else{pinned=ae;show(ae);}
    }
  });
  window.addEventListener('scroll',()=>{if(pinned)show(pinned);else hide();},true);
  window.addEventListener('resize',()=>{if(pinned)show(pinned);else hide();});
}

const LS_BEST="learnquiz_best_v1";
const LS_DELETED="learnquiz_deleted_v1";
const LS_SRS="learnquiz_srs_v1";
let pool=QUESTIONS.slice();
let activeCats=null;
let mode="practice"; // "practice"=苦手・期限到来を優先 / "all"=カテゴリ内ランダム
let order=[],idx=0,score=0,answered=false,history=[];
// 1問内の回答状態（自信ヒアリング・段階ヒント・分かったつもり対策）
let confidence=null,hintLevel=0,picked=false;
// 選択肢の表示順（元indexの配列）。正解が常にBに来る偏りを消すため出題ごとにシャッフルする。
let viewOrder=[];

function getBest(){try{return JSON.parse(localStorage.getItem(LS_BEST))||{};}catch(e){return {};}}
function setBest(b){try{localStorage.setItem(LS_BEST,JSON.stringify(b));}catch(e){}}

/* ── 間隔反復（Leitnerの箱）──────────────────────────────
  スライドの方針に従い「数値の状態は持たず、理解度ラベル(box)＋最終学習日(last)だけ」で判定する最小構成。
  box1=△まだ自信なし(約1〜2日) / box2=○なんとなく(約7日) / box3=◎説明できる(約30日)。
  答え方で箱を動かす：自力で正解→1つ上げる / ヒントあり正解→据え置き / 間違い→box1へ戻す。 */
const BOX_DAYS={1:1,2:7,3:30};
const BOX_LABEL={1:"△ まだ自信なし",2:"○ なんとなく",3:"◎ 説明できる"};
function getSrs(){try{return JSON.parse(localStorage.getItem(LS_SRS))||{};}catch(e){return {};}}
function setSrs(s){try{localStorage.setItem(LS_SRS,JSON.stringify(s));}catch(e){}}
function srsOf(q){const s=getSrs();return s[qkey(q)]||{box:1,last:null,miss:0};}
// 期限到来か：未学習はすぐ出す。box段階に応じた日数が経過していたら出題対象。
function isDue(q){
  const r=srsOf(q);
  if(!r.last)return true;
  const days=(Date.now()-new Date(r.last).getTime())/86400000;
  return days>=(BOX_DAYS[r.box]||1);
}
function dueCount(list){return list.filter(isDue).length;}
// 回答結果を箱へ反映。selfSolved=ヒント無しで自力正解、hinted=ヒント使って正解、wrongHadConfidence=自信ありで間違えた(最優先で再出題)
function recordResult(q,{correct,selfSolved,hinted,wrongHadConfidence}){
  const s=getSrs();const k=qkey(q);const r=s[k]||{box:1,last:null,miss:0};
  if(correct&&selfSolved)r.box=Math.min(3,r.box+1);   // 自力正解→1段上げる
  else if(correct&&hinted){/* ヒントあり正解→据え置き */}
  else{r.box=1;r.miss=(r.miss||0)+1;}                  // 間違い→box1へ戻す
  r.wasConfidentMiss=!!wrongHadConfidence;             // 「自信あり×不正解」は思い込み。直しても消さず何度でも出す
  r.last=new Date().toISOString();
  s[k]=r;setSrs(s);
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 削除した問題はこの端末に記録し、以後出題しない（問題文＋カテゴリで識別。復元も可能）
function qkey(q){return q.cat+'|'+q.q;}
function getDeleted(){try{return JSON.parse(localStorage.getItem(LS_DELETED))||{};}catch(e){return {};}}
function setDeleted(d){try{localStorage.setItem(LS_DELETED,JSON.stringify(d));}catch(e){}}
function liveQuestions(){const d=getDeleted();return QUESTIONS.filter(q=>!d[qkey(q)]);}
function deletedCount(){return Object.keys(getDeleted()).length;}
function restoreDeleted(){setDeleted({});}
function deleteCurrent(){
  if(answered)return;
  const q=pool[order[idx]];
  if(!confirm('この問題を削除しますか？\nこの端末では今後出題されなくなります（復元も可能）。'))return;
  const d=getDeleted();d[qkey(q)]=1;setDeleted(d);
  order.splice(idx,1);
  if(idx>=order.length)renderResult();else renderQ();
}

function renderBest(){
  const b=getBest();
  const el=document.getElementById('best');
  if(b.pct!=null){el.innerHTML=`ベスト記録 <b>${b.pct}%</b>（${b.score}/${b.total}）`;}
  else{el.textContent="";}
}

function setBar(p){const el=document.getElementById('bar');if(el)el.querySelector('i').style.width=p+'%';}

function start(){
  const base=liveQuestions();
  pool=activeCats?base.filter(q=>activeCats.includes(q.cat)):base.slice();
  if(mode==="practice"){
    // 期限到来分だけを出題。「自信あり×不正解(思い込み)」→未学習/期限到来 の順で優先。
    const idxs=pool.map((_,i)=>i).filter(i=>isDue(pool[i]));
    const rank=i=>{const r=srsOf(pool[i]);return r.wasConfidentMiss?0:(r.last?2:1);};
    shuffle(idxs);
    idxs.sort((a,b)=>rank(a)-rank(b));
    order=idxs;
  }else{
    order=shuffle(pool.map((_,i)=>i));
  }
  idx=0;score=0;answered=false;history=[];
  if(order.length===0)return renderResult();
  renderQ();
}

const marks=['A','B','C','D','E','F'];
// 各問のヒントは持たないので、選択肢から段階的に作る（白紙→比喩/カテゴリ→絞り込み→2択）。
// hideSet: 非表示にする「元index」の集合。レベルが上がるほど誤答を消して2択に近づける。
// 正解(q.answer)は決して隠さない。
function hintHideSet(q,level){
  const wrong=q.options.map((_,i)=>i).filter(i=>i!==q.answer);
  shuffle(wrong);
  const total=q.options.length;
  if(level<=1)return new Set();              // レベル0(白紙)・1(比喩)は全選択肢を見せる
  if(level===2)return new Set(wrong.slice(0,Math.max(0,total-3))); // 3択程度まで
  return new Set(wrong.slice(0,Math.max(0,total-2)));              // レベル3=2択(最後の救済)
}
const HINT_TEXT=[
  null,
  q=>`ヒント①：このカテゴリは「${q.cat}」。状況の中の太字キーワードや『つまり何型か』に注目。`,
  q=>`ヒント②：明らかに筋の悪い選択肢を消して、残りを絞り込みました。`,
  q=>`ヒント③（最後の救済）：2択まで絞りました。状況の目的に立ち返って選ぶ。`
];

function renderQ(){
  const s=document.getElementById('screen');
  if(idx>=order.length)return renderResult();
  const q=pool[order[idx]];
  answered=false;confidence=null;hintLevel=0;picked=false;
  viewOrder=shuffle(q.options.map((_,i)=>i)); // 選択肢の並びを毎回シャッフル（正解位置の偏りを解消）
  const r=srsOf(q);
  s.innerHTML=`
    <div class="bar" id="bar"><i></i></div>
    <div class="toprow">
      <span class="cat">${esc(q.cat)}</span>
      <span class="meta">問題 ${idx+1} / ${order.length}　スコア ${score}</span>
    </div>
    <div class="boxrow"><span class="boxtag box${r.box}">${BOX_LABEL[r.box]}</span>${r.wasConfidentMiss?'<span class="boxtag warn">⚠ 要注意（前回 自信あり→不正解）</span>':''}</div>
    <div class="situation"><div class="lbl">状況</div><div class="body">${formatSituation(q.situation)}</div></div>
    <div class="question">${gloss(q.q)}</div>
    <div id="confbox"></div>
    <div id="optwrap" style="display:none">
      <div id="hintbox"></div>
      <div class="opts" id="opts"></div>
      <div id="hintrow"></div>
    </div>
    <div id="fb"></div>
    <div id="delrow"><button class="delbtn" id="delq">🗑 この問題を削除</button></div>`;
  setBar(idx/order.length*100);
  renderConfidence();
  document.getElementById('delq').onclick=deleteCurrent;
}

// 回答前に自信を聞く（分かったつもり対策）。選んでから選択肢を表示する。
function renderConfidence(){
  const cb=document.getElementById('confbox');
  cb.innerHTML=`
    <div class="conflbl">答える前に——いまの自信は？</div>
    <div class="confbtns">
      <button class="confbtn" data-c="1">自信あり</button>
      <button class="confbtn ghosty" data-c="0">自信なし</button>
    </div>
    <div class="conftip">※ 自信を先に決めることで「分かったつもり」を見つけやすくなります。</div>`;
  cb.querySelectorAll('.confbtn').forEach(b=>{
    b.onclick=()=>{confidence=b.getAttribute('data-c')==='1';revealOptions();};
  });
}

function revealOptions(){
  document.getElementById('confbox').style.display='none';
  document.getElementById('optwrap').style.display='block';
  renderOptions();
  renderHintRow();
}

function renderOptions(){
  const q=pool[order[idx]];
  const hide=hintHideSet(q,hintLevel);      // 隠す「元index」の集合
  const hb=document.getElementById('hintbox');
  hb.innerHTML=(hintLevel>0&&HINT_TEXT[hintLevel])?`<div class="hint">${gloss(HINT_TEXT[hintLevel](q))}</div>`:'';
  const opts=document.getElementById('opts');
  opts.innerHTML='';
  // 表示順(viewOrder)で並べ、ラベルA/B/C/Dは表示位置に振る。判定は元index(oi)で行う。
  let pos=0;
  viewOrder.forEach(oi=>{
    if(hide.has(oi))return;
    const b=document.createElement('button');
    b.className='opt';
    b.dataset.oi=oi;
    b.innerHTML=`<span class="mk">${marks[pos]}</span><span>${gloss(q.options[oi])}</span>`;
    b.onclick=(e)=>{if(e.target.closest('.term'))return;pick(oi);};
    opts.appendChild(b);
    pos++;
  });
}

function renderHintRow(){
  const q=pool[order[idx]];
  const hr=document.getElementById('hintrow');
  if(answered){hr.innerHTML='';return;}
  // ヒントは最大3段階（白紙の次から）。2択まで出したら打ち止め。
  if(hintLevel>=3){hr.innerHTML='<div class="hintdone">これ以上のヒントはありません。状況の目的に立ち返って選びましょう。</div>';return;}
  hr.innerHTML=`<button class="hintbtn" id="hintbtn">💡 ヒントを1段もらう（${hintLevel}/3）</button>`;
  document.getElementById('hintbtn').onclick=()=>{hintLevel++;renderOptions();renderHintRow();};
}

function pick(i){
  if(answered)return;answered=true;picked=true;
  const dr=document.getElementById('delrow');if(dr)dr.style.display='none';
  const hr=document.getElementById('hintrow');if(hr)hr.innerHTML='';
  const q=pool[order[idx]];
  const correct=i===q.answer;
  const usedHint=hintLevel>0;
  const selfSolved=correct&&!usedHint;          // 自力で正解（ヒント未使用）
  const hinted=correct&&usedHint;               // ヒントありで正解
  const wrongHadConfidence=!correct&&confidence; // 自信あり×不正解＝思い込み（最優先で再出題）
  if(correct)score++;
  history.push({cat:q.cat,correct,confidence,usedHint});
  recordResult(q,{correct,selfSolved,hinted,wrongHadConfidence});
  const opts=document.getElementById('opts').children;
  for(let k=0;k<opts.length;k++){
    opts[k].disabled=true;
    const oi=Number(opts[k].dataset.oi);
    if(oi===q.answer)opts[k].classList.add('correct');
    else if(oi===i)opts[k].classList.add('wrong');
  }
  // 自信×正誤の4象限メッセージ（分かったつもり対策）
  let quad,quadCls;
  if(correct&&confidence){quad="本物か確認：なぜ正しいかを言えれば◎へ昇格の候補。";quadCls="ok";}
  else if(correct&&!confidence){quad="まぐれ確認：理由を言えなければ据え置き。解説で裏取りを。";quadCls="warn";}
  else if(!correct&&confidence){quad="⚠ 最優先で訂正：思い込みです。直しても消さず、何度でも出題します。";quadCls="ng";}
  else{quad="想定内：基礎から学び直し。box1に戻してすぐまた出します。";quadCls="warn";}
  const r=srsOf(q);
  const moveTxt=selfSolved?`自力正解 → ${BOX_LABEL[r.box]} に昇格（次は約${BOX_DAYS[r.box]}日後）`
    :hinted?`ヒントあり正解 → 据え置き（${BOX_LABEL[r.box]}）`
    :`box1へ → すぐまた出題`;
  const last=idx+1>=order.length;
  document.getElementById('fb').innerHTML=`
    <div class="fb">
      <div class="res ${correct?'ok':'ng'}">${correct?'✓ 正解':'✕ 不正解'}　<span class="confchip">${confidence?'自信あり':'自信なし'}${usedHint?' / ヒント使用':''}</span></div>
      <div class="quad ${quadCls}">${quad}</div>
      <div class="exp"><b>解説：</b>${gloss(q.explain)}</div>
      <div class="srsmove">${moveTxt}</div>
      <button class="next" id="nx">${last?'結果を見る':'次の問題 →'}</button>
    </div>`;
  setBar((idx+1)/order.length*100);
  document.getElementById('nx').onclick=()=>{idx++;renderQ();};
}

function renderResult(){
  const total=order.length;
  if(total===0){
    const allDone=mode==="practice"&&deletedCount()===0;
    document.getElementById('screen').innerHTML=`
      <div class="result">
        <div class="big">🎉</div>
        <div class="msg">${allDone?'今やるべき復習は完了です。<br>箱が進んだ問題は、期限が来たらまた出題されます。':`出題できる問題がありません。${deletedCount()>0?'削除した問題を復元してください。':'カテゴリの選択を見直してください。'}`}</div>
        <div class="actions">
          <button class="next" onclick="mode='all';start()">全問モードで挑戦</button>
          <button class="ghost" onclick="catScreen()">カテゴリを選ぶ</button>
          ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
        </div>
      </div>`;
    return;
  }
  const pct=Math.round(score/total*100);
  let msg;
  if(pct===100)msg="完璧。パターン認識が完全に身についています。";
  else if(pct>=70)msg="優秀。実践の判断軸がしっかり定着しています。";
  else if(pct>=40)msg="良い調子。解説を見返してパターンを掴みましょう。";
  else msg="復習のチャンス。状況のタイプ判別から見直しを。";
  const b=getBest();
  let isBest=false;
  if(b.pct==null||pct>b.pct){setBest({pct,score,total});isBest=true;}
  renderBest();
  // 「自信あり×不正解（思い込み）」の件数を集計＝最優先で潰すべきもの
  const confMiss=history.filter(h=>!h.correct&&h.confidence).length;
  const selfSolved=history.filter(h=>h.correct&&!h.usedHint).length;
  const remainDue=dueCount(mode==="practice"?pool:liveQuestions());
  document.getElementById('screen').innerHTML=`
    <div class="result">
      <div class="big">${pct}%</div>
      <div class="of">${score} / ${total} 問正解${isBest?'　🎉 自己ベスト更新':''}</div>
      <div class="msg">${msg}</div>
      <div class="srsstat">
        <span>自力正解 <b>${selfSolved}</b></span>
        <span class="${confMiss>0?'bad':''}">思い込み(自信あり→不正解) <b>${confMiss}</b></span>
        <span>残りの復習 <b>${remainDue}</b></span>
      </div>
      ${confMiss>0?`<div class="quad ng" style="text-align:left">⚠ 「自信があったのに間違えた」問題が${confMiss}件あります。一番危ないので、消えずに何度でも出題されます。</div>`:''}
      <div class="review">
        ${history.map(h=>`<div class="rrow"><span>${esc(h.cat)}</span><span class="ic ${h.correct?'ok':'ng'}">${h.correct?'✓':'✕'}${h.confidence?'（自信あり）':''}</span></div>`).join('')}
      </div>
      <div class="actions">
        <button class="next" onclick="mode='practice';start()">続けて復習する</button>
        <button class="ghost" onclick="catScreen()">カテゴリ/モードを選ぶ</button>
        ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
      </div>
    </div>
    <div class="note">記録（理解度の箱・最終学習日）はこの端末に保存されます。<br>復習モードは「期限が来た問題・苦手な問題」だけを出します。新しい問題はClaudeに「クイズ更新して」と伝えてください。</div>`;
}

function catScreen(){
  const cats=[...new Set(liveQuestions().map(q=>q.cat))];
  if(!activeCats)activeCats=cats.slice();
  else activeCats=activeCats.filter(c=>cats.includes(c));
  const due=dueCount(liveQuestions());
  const s=document.getElementById('screen');
  s.innerHTML=`
    <div style="margin-bottom:12px;font-size:14px;color:var(--txt2);">出題モード</div>
    <div class="pills" id="modes">
      <button class="pill${mode==='practice'?' on':''}" data-m="practice">復習（期限到来・苦手を優先）${due>0?` ・ ${due}問`:''}</button>
      <button class="pill${mode==='all'?' on':''}" data-m="all">全問（カテゴリ内ランダム）</button>
    </div>
    <div style="margin:18px 0 8px;font-size:14px;color:var(--txt2);">カテゴリ（タップで切替）</div>
    <div class="pills" id="pills"></div>
    <div class="actions">
      <button class="next" onclick="start()">スタート</button>
      <button class="ghost" onclick="activeCats=null;start()">全カテゴリで開始</button>
      ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();catScreen()">削除した問題を復元（${deletedCount()}件）</button>`:''}
    </div>`;
  s.querySelectorAll('#modes .pill').forEach(b=>{
    b.onclick=()=>{mode=b.getAttribute('data-m');catScreen();};
  });
  const p=document.getElementById('pills');
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='pill'+(activeCats.includes(c)?' on':'');
    b.textContent=c;
    b.onclick=()=>{
      if(activeCats.includes(c))activeCats=activeCats.filter(x=>x!==c);
      else activeCats.push(c);
      if(activeCats.length===0)activeCats.push(c);
      catScreen();
    };
    p.appendChild(b);
  });
}

initGlossary();
renderBest();
catScreen();
</script>
