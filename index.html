<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実践クイズ — 開発の学び復習</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230e1117'/%3E%3Ccircle cx='32' cy='32' r='17' fill='none' stroke='%237c6cff' stroke-width='4'/%3E%3Cpath d='M32 15 L32 49' stroke='%233ad0a8' stroke-width='4' stroke-linecap='round'/%3E%3Cpath d='M15 32 L49 32' stroke='%233ad0a8' stroke-width='4' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1117;
    --bg2:#161b25;
    --card:#1c2230;
    --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.16);
    --txt:#e8eaf0;
    --txt2:#9aa3b5;
    --txt3:#646d80;
    --accent:#7c6cff;
    --accent2:#3ad0a8;
    --ok:#3ad08a;
    --okbg:rgba(58,208,138,.12);
    --ng:#ff6b6b;
    --ngbg:rgba(255,107,107,.12);
    --warn:#ffb84d;
    --info:#5aa9ff;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{
    background:var(--bg);
    color:var(--txt);
    font-family:'Zen Maru Gothic','Outfit',sans-serif;
    line-height:1.7;
    min-height:100vh;
    background-image:radial-gradient(circle at 15% -10%,rgba(124,108,255,.18),transparent 45%),radial-gradient(circle at 90% 0%,rgba(58,208,168,.12),transparent 40%);
    background-attachment:fixed;
  }
  .wrap{max-width:680px;margin:0 auto;padding:28px 20px 60px;}
  header{margin-bottom:22px;}
  .kicker{font-family:'Outfit',sans-serif;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent2);font-weight:600;}
  h1{font-size:26px;font-weight:700;margin:4px 0 2px;letter-spacing:.01em;}
  .sub{font-size:13px;color:var(--txt2);}
  .best{font-family:'Outfit',sans-serif;font-size:12px;color:var(--txt3);margin-top:8px;}
  .best b{color:var(--accent2);}

  .bar{height:5px;background:var(--bg2);border-radius:99px;overflow:hidden;margin:18px 0;}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s cubic-bezier(.2,.8,.2,1);width:0;}

  .toprow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .cat{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;letter-spacing:.04em;padding:5px 13px;border-radius:99px;background:rgba(124,108,255,.16);color:#b9b0ff;}
  .meta{font-family:'Outfit',sans-serif;font-size:12px;color:var(--txt2);}

  .situation{background:var(--bg2);border:1px solid var(--line);border-radius:16px;padding:16px 18px;margin-bottom:16px;}
  .situation .lbl{font-size:11px;letter-spacing:.1em;color:var(--txt3);font-family:'Outfit',sans-serif;text-transform:uppercase;margin-bottom:7px;}
  .situation .body{font-size:15px;color:var(--txt);}
  .question{font-size:18px;font-weight:700;margin-bottom:14px;}

  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{
    text-align:left;background:var(--card);border:1.5px solid var(--line);color:var(--txt);
    padding:14px 16px;border-radius:13px;font-family:inherit;font-size:14.5px;line-height:1.55;
    cursor:pointer;transition:all .15s;width:100%;display:flex;gap:11px;align-items:flex-start;
  }
  .opt .mk{flex-shrink:0;width:22px;height:22px;border-radius:7px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;color:var(--txt2);margin-top:1px;}
  .opt:hover:not(:disabled){border-color:var(--accent);background:#222a3a;}
  .opt:disabled{cursor:default;}
  .opt.correct{border-color:var(--ok);background:var(--okbg);}
  .opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#062;}
  .opt.wrong{border-color:var(--ng);background:var(--ngbg);}
  .opt.wrong .mk{background:var(--ng);border-color:var(--ng);color:#600;}

  .fb{margin-top:16px;animation:rise .3s ease;}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .fb .res{font-weight:700;font-size:15px;margin-bottom:6px;display:flex;align-items:center;gap:7px;}
  .fb .res.ok{color:var(--ok);}
  .fb .res.ng{color:var(--ng);}
  .fb .exp{background:var(--card);border:1px solid var(--line);border-radius:13px;padding:13px 16px;font-size:14px;color:var(--txt2);}
  .fb .exp b{color:var(--txt);font-weight:500;}

  button.next{margin-top:14px;background:linear-gradient(90deg,var(--accent),#9b8fff);color:#fff;border:none;padding:13px 24px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:transform .12s,filter .12s;}
  button.next:hover{filter:brightness(1.08);}
  button.next:active{transform:scale(.97);}

  .result{text-align:center;padding:10px 0;}
  .result .big{font-family:'Outfit',sans-serif;font-size:54px;font-weight:600;line-height:1;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:6px 0;}
  .result .of{color:var(--txt3);font-size:16px;}
  .result .msg{font-size:15px;color:var(--txt2);margin:14px 0 22px;}
  .review{display:flex;flex-direction:column;gap:7px;margin-bottom:24px;text-align:left;}
  .rrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:10px 14px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;}
  .rrow .ic{font-weight:700;}
  .rrow .ic.ok{color:var(--ok);}
  .rrow .ic.ng{color:var(--ng);}
  .actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
  button.ghost{background:var(--card);color:var(--txt);border:1.5px solid var(--line2);padding:12px 22px;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
  button.ghost:hover{border-color:var(--accent);}
  .pills{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:20px;}
  .pill{font-family:'Outfit',sans-serif;font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--line2);color:var(--txt2);cursor:pointer;background:transparent;transition:all .15s;}
  .pill.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .note{font-size:12px;color:var(--txt3);text-align:center;margin-top:30px;line-height:1.6;}

  .term{color:var(--accent2);border-bottom:1px dashed rgba(58,208,168,.45);cursor:help;}
  .term:hover,.term:focus{color:#fff;border-bottom-color:var(--accent2);outline:none;}
  .glosspop{position:absolute;z-index:60;max-width:min(300px,86vw);background:#0b0f16;border:1px solid var(--line2);border-radius:10px;padding:10px 13px;font-size:13px;line-height:1.55;color:var(--txt);box-shadow:0 10px 30px rgba(0,0,0,.55);font-family:'Zen Maru Gothic','Outfit',sans-serif;}
  .glosspop b{color:var(--accent2);font-weight:500;}

  #delrow{margin-top:18px;text-align:center;}
  .delbtn{background:transparent;border:1px solid var(--line);color:var(--txt3);padding:8px 16px;border-radius:10px;font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;transition:all .15s;}
  .delbtn:hover{border-color:var(--ng);color:var(--ng);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">Practice Recall</div>
    <h1>実践クイズ</h1>
    <div class="sub">これまでの開発の学びを、選択式で復習する</div>
    <div class="sub" style="font-size:12px;color:var(--txt3);margin-top:3px;">下線つきの語句はカーソル/タップで意味が見られます</div>
    <div class="best" id="best"></div>
  </header>
  <div id="screen"></div>
</div>

<script>
const QUESTIONS = [
  {cat:"コンフリクト解消",situation:"rbac.md で衝突。HEAD側(PR)は権限を「分離」する方針、develop側は「統合」する方針。説明文に『逆方向で衝突』『設計判断』というキーワードがある。",q:"これは言い換えるとどういう状況？",options:["片方が古い・間違いで、もう片方が正しい『正誤型』の対立","両方とも一部正しく統合すべき『統合型』の対立","両方とも有効な信念で進化した『設計判断型』の対立","PRの主題と無関係な残骸が混ざっただけ"],answer:2,explain:"『逆方向で衝突』『設計判断』は設計判断型のサイン。develop優先が黄金律ではなく、PRの目的(分離)を尊重するのが正解。"},
  {cat:"コンフリクト解消",situation:"上と同じ『設計判断型』の対立で、PR #637 は『権限を分離する』ことが目的のPRだった。",q:"どうすればいい？",options:["develop(統合)に揃える。作業量が少ないから","#637を生かして分離方針を採用する","両方削除して一から書き直す","判断できないので一旦放置する"],answer:1,explain:"PRの目的を自分で打ち消すのは本末転倒。分離はドキュメントとも一致し、最小権限のセキュリティ原則にも合致する。"},
  {cat:"Linter / CI",situation:"develop の crud.service.ts は328行、PR head も328行で、どちらもWARN(許容)でCI通過していた。ところがマージしたら342行になりERRORでCIが落ちた(閾値331行)。",q:"これは言い換えるとどういう状況？",options:["片方のブランチに重大なバグが混入した","個別には範囲内だが、合算すると上限を超えてしまった","linterの設定ファイルが壊れている","developが間違って巻き戻された"],answer:1,explain:"引っ越しの荷物の例え。328kg+328kgを1台に積むと規定オーバー。それぞれセーフでも合体でアウトになるパターン。"},
  {cat:"セキュリティ",situation:"documents API に Mass Assignment 脆弱性。approval_status を勝手に書き換えられ、他人の workflow_request_id を紐付けられる。既存のフロント実装は壊したくない。",q:"どう修正するのが最小コストで確実？",options:["APIをまるごと作り直す","入力を制約(値の許可リスト+所有確認+.strict())","認証を全面的に作り替える","一旦そのAPIを停止する"],answer:1,explain:"多層防御(Defense in Depth)。approval_statusの値制限・所有確認・未知フィールド拒否の3層で、既存フローを壊さず最小コストで塞ぐ。"},
  {cat:"セキュリティ / 仕様",situation:"コードに『viewSubordinates: view === \"manage\" || user.isSuperAdmin』とある。仕様書では『super_adminでも ?view=manage の申請が必要』。しかし実装ではsuper_adminは申請なしで部下全員の日報が見える。",q:"どうすべき？",options:["実装が便利なので仕様書を変える","|| user.isSuperAdmin を削除し仕様に準拠する","そのまま放置する(便利だから)","super_adminアカウント自体を削除する"],answer:1,explain:"仕様と実装の乖離=情報漏洩リスク。破壊的変更にはなるが、仕様準拠でリスクを解消するのが正しい。"},
  {cat:"ブランチ管理",situation:"#503 は doc-drift で出たissueの派生issueから、さらに派生したissueだった。事故はベース(派生元)の選択ミスが疑われる。",q:"なぜこの構造でベース選択ミスが起きやすい？",options:["派生の連鎖でどのブランチをベースにすべきか見失いやすいから","派生issueは必ずバグを含むから","古いissueは自動的に削除されるから","developが派生を禁止しているから"],answer:0,explain:"家系図の枝分かれの例え。祖父→父→孫→ひ孫と派生が続くと『#503のベースはどこ?』が曖昧になり、現在いるブランチからつい派生してしまう典型パターン。"},
  {cat:"用語理解",situation:"「作業ブランチ」「Issue対応ブランチ」「featureブランチ」という言葉が会話に出てくる。",q:"これらの関係は？",options:["それぞれ別々のブランチを指す","通常は同じものを指す違う呼び方","作業ブランチだけが本物で他は誤り","developの別名"],answer:1,explain:"通常フローでは『develop から派生して作業中のブランチ』を指す同じものの別名。ブランチは1つ、呼び方が複数あるだけ。"},
  {cat:"PR / ブランチ",situation:"レビュー中、本来の作業(マッピング表の追記)とは別に、古いテーブル board_meeting_transcripts の消し忘れ参照が見つかった。レビュアーから『この PR 内で対応しますか？』と聞かれた。",q:"「この PR 内で対応する」とはどういう意味？",options:["別の新しいPR(ブランチ)を立てて、そちらで直す","今作業しているブランチにコミットを足して、同じPRの中で一緒に直す","developブランチを直接編集して直す","レビューを無視して修正せず放置する"],answer:1,explain:"PRは『あるブランチの変更をまとめてマージ提案する単位』で、現在のブランチの中身＝そのPRの中身。『このPR内で対応』とは、別PRに分けず今のブランチにコミットを追加して同じPRに含めること。関連が深く小さい修正ならまとめると履歴が追いやすい。無関係・大きい変更なら別PRに分けて1PR=1目的を保つ。"},
  {cat:"PR / ブランチ",situation:"『このPRというのは現在のブランチのことですか？』という疑問。",q:"PRとブランチの関係として正しいものは？",options:["PRとブランチは全く無関係な別物","PRは1つのブランチと結びついており、そのブランチの中身がPRの中身になる","PRはdevelopブランチそのものを指す","1つのブランチに必ず複数のPRがぶら下がる"],answer:1,explain:"PR(プルリクエスト)は『このブランチの変更をdevelop等に取り込んでほしい』というマージ提案。PRは作業ブランチ1本と結びつき、そのブランチにコミットを積むとそのままPRの中身になる。だから『このPR≒現在のブランチ』という理解でほぼ正しい。"},
  {cat:"スコープ設計",situation:"Issue全体が『i18nライブラリ導入 + 277件のエラーコード化 + 209個のVueファイル移行』という超大規模。Issue自体も『まず基盤を1本作れば以降は強制できる』『ボーイスカウトルールで段階移行』を前提にしている。これを単一PRでやると数千行になる。",q:"このPRでどこまで対応するのがベスト？",options:["i18nライブラリ導入含め7件すべてを一気に完遂する","共通の仕組み(エラーコード定義・メッセージ集約・再発防止ルール)という基盤を作り、各問題は代表箇所だけ移行する","土台は作らず、目についた特定の箇所だけその場で直す","スコープが大きすぎるので何も着手しない"],answer:1,explain:"大規模変更の王道は『まず最初の1本(基盤)を切る』こと。土台ができれば残りは同じパターンの繰り返しになり、後続PRで安全に進められる。全件フル対応は数千行・高リスクで非推奨、特定箇所だけだと再発を防ぐ仕組みが残らない。"},
  {cat:"Linter / CI",situation:"『同じミスをもう混入させない』ための ESLint ルールを入れたい。しかし既存コードには違反が大量にある。",q:"このルールのレベルをどう設定するのがベスト？",options:["error にして、違反があればCIを落とす","warn で導入し、ビルドは止めずに新規混入を可視化して段階的に直す","ルール自体を入れない","既存ファイルを全部 eslint-disable で無効化してから error にする"],answer:1,explain:"いきなり error にすると既存の大量違反でCIが即落ちて何も進まない。warn なら今すぐ導入でき、新しく書いたコードの違反は警告として浮かび上がるので新規混入を防げる。既存違反は段階的に解消すればよい。『まず可視化、強制は後で』が安全な第一歩。"},
  {cat:"i18n / 設計",situation:"金額整形の共通関数 formatCurrency を i18n 基盤として導入したい。Intl.NumberFormat で日本円(ja-JP/JPY)を出すと全角『￥』になるが、既存は半角『¥』。特に patents 系の font-mono(等幅)テーブルは桁を縦揃えしており、半角¥→全角￥で桁揃えがズレる視覚的回帰が起きる。表示が変わらない OPaymentStep2Items もある。",q:"通貨記号の統一をどう進めるのがベスト？",options:["全角￥で全面統一する。視覚的回帰は受容してPRに明記する","formatCurrency を半角¥の直書き実装にして既存表示を維持する","関数はIntl(全角￥)のまま導入し、表示が変わる特許表の移行だけ取り消して、表示不変の箇所のみ代表移行する","通貨記号の統一はやめて現状維持にする"],answer:2,explain:"『正しい基盤は入れる／見た目が壊れる箇所はレイアウト対応とセットで別PRに切り出す』が最善。関数はIntlのままで i18n 的に正しく多通貨拡張もしやすい。代表移行は表示不変の箇所だけにすれば視覚的回帰ゼロで安全にマージでき、桁揃えがズレる特許表は別PRで対応する。全面統一は見た目の劣化を出荷してしまい、半角直書きは基盤の正しさを自分で壊す。"},
  {cat:"スコープ設計",situation:"親Issue #685(実装単位ではないまとめ役)の下に4つのサブIssueがある。#684 テスト不足(path traversal未検証・特許route未カバー・E2E不在/副作用が小さく着手しやすい)、#682 型安全(any・手cast・Zod素通り/影響広いが挙動変更少なめ)、#683 i18n文言ハードコード、#680 リファクタ/Dead code(巨大handler・dead file/挙動不変だが影響範囲大)。",q:"どのサブIssueから着手するのがベスト？",options:["#680 リファクタ。影響範囲が大きく一気に片付けると効率的だから","#684 テスト不足。挙動を変えず最も低リスクで、後続のリファクタや型変更を検証する安全網になるから","#683 i18n。文言が一番目につくから","親Issue #685 をそのまま実装する"],answer:1,explain:"『まず安全網(テスト)を張ってから、崩れやすい大工事(リファクタ・型)へ進む』が定石。テスト追加は挙動を変えず最も低リスクで、先に充実させれば後続の#682(型)や#680(リファクタ)を『テストが通るか』で安全に検証できる=残り全部のリスクが下がる。path traversal等のセキュリティ穴も先に押さえられる。親Issueは実装単位ではないので直接の対象にならない。"},
  {cat:"スコープ設計",situation:"#684のテスト整備に5項目ある。(A)vitest混在解消=bun:testに統一・再混入ガード追加(最も独立・低リスク) (B)cron routeテスト=Date.nowスタブで月境界と全件失敗を検証(会計付与のクリティカルパス) (C)Zod文字数境界テスト(一部既存) (D)なんちゃってテスト書換=readFileSync+toContainの21ファイルを実関数呼び出しに書き換え(大規模でレビュー重い)。全部を1PRに詰めると過大でレビュー困難。",q:"このPRに含める項目の選び方としてベストは？",options:["全5項目を1つのPRにまとめて一度に出す","独立・低リスクな A・B・C を入れ、大規模でレビューの重い D(21ファイル書換)は別PRに切り出す","レビューが重い D だけを先に1PRで出す","どれも入れず様子を見る"],answer:1,explain:"『1PR=レビュー可能な単位』を守るのが要点。独立性が高く低〜中リスクな3項目はまとまりの良いPRになり、特にcron route(会計のクリティカルパス)は早く守る価値が高い。21ファイル書換は大規模でレビューが重く、混ぜると安全な変更まで巻き込んでレビュー困難になるため別PRに分ける。テスト着手の中でもさらにレビュー可能な単位へ段階的に絞る判断。"},
  {cat:"レビュー / 運用",situation:"書換9ファイルの作業が終わった。各実装エージェントは自己検証済み(全テストpass・eslintクリーン)。だがこのプロジェクトのスキル規定には『review 必須』と明記されている。レビューをスキップしてコミット・PRへ直行すれば速い。",q:"どう進めるのがベスト？",options:["自己検証で全部passしているのだからレビューは省略してコミット・PRへ直行する","別の review エージェント(または自分とは別の視点)に9ファイルをレビューさせてから進む","ファイルが多いので半分だけレビューして残りはスキップする","レビューが面倒なのでこの作業自体を取りやめる"],answer:1,explain:"『自己検証済み＝レビュー不要』ではない。自己検証(テストpass・lintクリーン)は機械的なチェックで、設計や要件適合・見落としは人/別視点のレビューでしか拾えない。しかも規定に『review 必須』とある以上スキップはルール違反。速さよりルールと品質を優先し、書いた本人とは別の視点(reviewエージェント等)で客観的にレビューしてから進むのが正解。"},
  {cat:"スコープ設計",situation:"未対応サブIssueが3つ。#682 型安全(7項目/範囲は限定的・any/手cast/Zod素通りの是正。フロントがundefinedにアクセスする実害寄りのバグを含む・テストも書きやすい)、#680 リファクタ/Dead code(8項目/挙動を変えない整理でリスク低だが影響範囲が広い・回帰テスト要)、#683 i18n(7項目/209ファイルに日本語直書きで最大規模・1PRに収まらず段階導入の設計が必要)。",q:"残り3つのサブIssueのうち、どれから着手するのがベスト？",options:["#683 i18n。一番規模が大きく目立つから先に片付ける","#682 型安全。実害があり範囲が限定的でテストで守りやすいから","#680 リファクタ。影響範囲が広く一気に整理すると効率的だから","3つを1つのPRでまとめて対応する"],answer:1,explain:"『実害がある × 範囲が狭い × 検証しやすい』が揃うものを優先するのが定石。#682はフロントがundefinedを踏む実害寄りのバグを含み、範囲が限定的で効果が明確、型の不整合はテストで守りやすい。#680は影響範囲が広く、#683は最大規模で基盤設計が必要=どちらも土台が整ってから取り組む方が安全。先に1つに絞り、その後さらにスコープ分割を相談する。"},
  {cat:"スコープ設計",situation:"Issue #590 で休憩バグが2件。ケース1=休憩の新規追加ができない(『1 field=1申請』の設計自体がcreate非対応で、申請フォーム・承認反映・UIの設計変更を伴う大規模)。ケース2=過去日のデフォルト休憩を削除できない(バックエンドのdeleteBreakとDELETE APIは対応済みで、フロント詳細画面に削除ボタンが無いだけの小規模)。",q:"今回の作業でどこまで対応するのがベスト？",options:["ケース1+ケース2の両方を1つのPRで対応する","ケース2のみ先行対応し、設計変更を伴うケース1は別Issue/別PRに切り出す","ケース1のみ対応し、ケース2は後回しにする","規模が違いすぎるので両方とも着手しない"],answer:1,explain:"規模が桁違いの修正を1PRに混ぜないのが要点(1PR=レビュー可能な単位)。ケース2はバックエンド対応済みでフロントにUIを足すだけ=小規模・低リスクで即マージでき、ユーザーをすぐ救える。ケース1は設計そのものの作り直しが必要で設計判断を伴うため、別Issueでじっくり対応すべき大物。バックエンド対応済みの小修正を先行させ、設計変更の大物を分離するのが正しい。"},
  {cat:"設計判断",situation:"休憩の新規追加機能を作る。実現経路の候補は、(1)従業員のセルフサービスとして打刻修正申請に追加=既存のワークフロー承認経路に乗り監査性を保てる(承認待ちのタイムラグはある)、(2)管理者直接編集に break の CRUD を追加=承認不要で即時救済できるが現状breakを扱わない管理者編集に新規UI/ロジックが必要、(3)両方=救済手段は増えるが変更範囲・テストが最大。",q:"新規休憩追加をどこで可能にするのがベスト？",options:["(2)管理者直接編集。承認不要で即時に救済できて速いから","(1)打刻修正申請。既存の承認経路に乗せられ設計の一貫性と監査性を保てるから","(3)両方を一度に整備する。救済手段が多いほどよいから","どれも筋が悪いので機能自体を見送る"],answer:1,explain:"新機能は既存の正しい仕組み(承認フロー)に乗せるのが定石。打刻修正申請の経路に乗せれば誰がいつ直したかの監査性が保て、設計の一貫性も高い。承認なしの管理者直接編集は楽だが本来の申請→承認の筋を外れ、breakを扱わない管理画面に新規実装も要る。両方は変更範囲・テストが最大で欲張りすぎ。まず筋の通った1本を作るのが正しい。"},
  {cat:"設計判断",situation:"新規breakは break_start と break_end を1承認単位にまとめないと、片方だけ承認/却下で break_end=null の不正レコードが生まれる。既存は『1フィールド=1申請』でattendance_modificationは単一のnew_valueしか持たない。データ設計の候補は、(1)新field_name『break_add』を追加しnullableなbreak_end用カラムを1列足して1レコードに開始/終了を保持・承認時にcreate=最小マイグレーション、(2)old_value/new_valueを流用=マイグレーション不要だがold_value本来の『サーバ側で取り直す旧値・監査ログ』の意味を壊す、(3)breaks配列の子テーブルを新設=拡張性は高いが新テーブル・反映ロジックで規模が最大。",q:"開始+終了を1申請で扱うデータ設計としてベストは？",options:["(2)old_value/new_valueを流用する。DB変更が不要で一番ラクだから","(1)新field_name+カラムを1列追加する。最小のマイグレーションで不正レコードを防げるから","(3)breaks配列の子テーブルを新設する。将来の拡張に最も強いから","設計は決めずまず動くものを作って後で直す"],answer:1,explain:"『正しさを保ちつつ変更は最小限』が両立する案を選ぶ。新field_name+1カラム追加なら最小のDB変更で開始・終了を1レコードにまとめられ、片方だけ承認の壊れたデータ(break_end=null)を防げる。old_value流用は一見ラクだがold_value本来の意味=既存の不変条件と監査ログを壊すためNG。子テーブル方式は将来拡張には強いが今回必要な範囲に対し作りすぎ(オーバーエンジニアリング)。"},
  {cat:"コードレビュー / 可読性",situation:"レビュー指摘#2は『テスト用mockの is_default: false は冗長(書かなくても同じ)だから消そう』とした。だが調べると、本物のDBにはスキーマの@default(false)があり、is_defaultを省略すると自動でfalseになる。mockの is_default: false はそのDB既定値を意図的に再現したフォールバックで、消して {id, ...data} に変えると将来is_defaultを省略するcreate経路を通したときundefinedになり実DBと乖離する(現状のbreak_add単一呼び出しでは無害)。",q:"この『冗長』に見えるmock処理をどう実装するのがベスト？",options:["レポート通り {id, ...data} にして冗長コードを除去する","is_default: false を残し『DBの@default(false)を意図的に再現したフォールバック』とコメントで明示する","#2の前提が誤りなので何もせず(won't-fix)、Issueに理由をコメントしてクローズする","mock自体を削除してテストを簡素化する"],answer:1,explain:"『冗長に見えるコードが実は意図的』なら、消さずに意図をコメントで明示するのが最善。レポートが冗長と誤解したのは意図が書かれていなかったから=コメントを足せば『なぜ二重?』の混乱が再発しない。消すと将来is_default省略時にundefinedとなり実DBと乖離する地雷を埋め込む(今は無害でも後で静かにバグる)。won't-fixも動作は同じだが、コードのそばに理由が残らず次に読む人に伝わらない。指摘を鵜呑みにせず正しい理由をコメントで見える化するのが正解。"},
  {cat:"デバッグ / 環境",situation:"新フィールド対応のコードを修正してバックエンドを何度も再起動したのに、ブラウザで提出すると毎回500のまま画面が変わらない。後で分かったのは、フロント(Nuxt)が見ているのはDockerコンテナ上のバックエンド(ポート8080)で、自分が再起動していた host の bun run dev(ポート8081)は誰も使っていなかった。",q:"この状況の真因を一言でいうと？",options:["コードのロジックにバグが残っていた","直していたバックエンドと、フロントが実際に通信しているバックエンドが別物だった","DBのデータが壊れていた","ブラウザのキャッシュが原因のすべてだった"],answer:1,explain:"『直しても変わらない』ときの典型は、自分が触っているプロセスと実際に動いているプロセスがズレていること。フロントは /api/** を API_BASE_URL=http://localhost:8080 にプロキシするので全リクエストは8080のDockerコンテナに飛ぶ。修正・再起動していた8081は誰も叩いていないため、いくら直しても画面は1ミリも変わらない。まず『今この画面が実際に通信している先はどこか』を確かめるのがデバッグの出発点。"},
  {cat:"デバッグ / 環境",situation:"ローカル開発で同じバックエンドを host の bun run dev(8081)と Docker コンテナ(8080)の二重で起動できる状態だった。フロントの設定は API_BASE_URL=http://localhost:8080。",q:"フロントから出した API リクエストはどちらに届く？",options:["先に起動した方に届く","8080のDockerコンテナに届く(プロキシ先がそこだから)","両方に同時に届く","8081のhostプロセスに届く"],answer:1,explain:"リクエストの宛先を決めるのは『起動した順』でも『最後に再起動した方』でもなく、フロントのプロキシ設定(API_BASE_URL)。ここが http://localhost:8080 を指す限り、API は全部8080のコンテナに飛ぶ。8081を何度再起動しても無関係。複数の同等プロセスを上げているときは『設定上どこを向いているか』を必ず確認する。"},
  {cat:"Prisma / ORM",situation:"Dockerコンテナは ./backend/src と prisma をマウントし --watch で動かしているのでコードは常に最新(新フィールド break_add 対応済み)。しかし bunx prisma generate はコンテナ起動時に1回だけ実行されるため、生成済みの Prisma client は5日前の古いまま(新カラム new_value_end を認識しない)。その結果 new_value_end 付きの INSERT で『未知フィールド』例外が出る。",q:"コードは最新なのに動かない。原因はどれ？",options:["ソースコードのマウントが効いていない","生成済みの Prisma client が古く、スキーマの新カラムを認識していない","DBに new_value_end カラムが無い","TypeScriptのビルドが失敗している"],answer:1,explain:"Prismaはschema.prismaから『client(型付きのDBアクセスコード)』をprisma generateで生成する。ソースを--watchで最新にしても、生成済みclientは別物で、generateを再実行しない限り古いまま=新カラムを知らない。だからコード上は break_add 対応済みでも、古いclientが new_value_end を『未知のフィールド』として弾く。スキーマ(schema.prisma)を変えたら必ず prisma generate をやり直す、が鉄則。"},
  {cat:"エラーハンドリング",situation:"APIは入力検証(Zod)に失敗したときは適切に400などを返す作りになっている。だが今回は『古いPrisma clientが new_value_end を未知フィールドとして弾く例外』が発生し、これは ZodError ではないため想定外の例外として 500 になった。",q:"なぜ 400 ではなく 500 になった？",options:["入力値が不正だったから","ZodErrorではない想定外の例外で、ハンドリングされず内部エラー(500)になったから","DBが停止していたから","認証に失敗したから"],answer:1,explain:"400系(クライアント起因)と500系(サーバ起因)の切り分けがポイント。入力検証(Zod)で弾けるものは『あなたの入力が悪い』=400として丁寧に返せる。しかし今回はZodの守備範囲外で起きた例外(古いclientの未知フィールド拒否)なので、想定外=サーバ側の問題として500になった。500を見たら『入力ミス』ではなく『サーバ内部の想定外』を疑い、環境やライブラリの不整合を探す。"},
  {cat:"Prisma / ORM",situation:"ローカルDBに新カラムを適用し、Dockerバックエンドの古い Prisma client を最新化したい。コンテナの起動コマンドには bunx prisma generate が含まれている。",q:"古い client を作り直す最も手早い方法は？",options:["コンテナを削除して全部作り直す","docker compose restart backend で再起動し、起動時の prisma generate を再実行させる","host側の bun run dev を再起動する","ブラウザをハードリロードする"],answer:1,explain:"client が古い原因は『generateが起動時に1回しか走っていない』こと。ならば backend コンテナを restart すれば起動コマンドの prisma generate が再実行され、最新スキーマ対応のclientに入れ替わる。全削除は重すぎ、host(8081)の再起動は誰も使っていないので無意味、ハードリロードはフロントのキャッシュ対策であってバックエンドのclientには無関係。原因(generateが古い)に最短で効く操作を選ぶ。"},
  {cat:"基礎 / Git",situation:"2人が同じファイルの同じ行を、別々の内容に書き換えてからマージしようとした。",q:"なぜコンフリクト(衝突)が起きる？",options:["Gitが壊れているから","同じ箇所が別々に変更され、どちらを採用すべきかGitが自動判断できないから","ファイルが大きすぎるから","ブランチが多すぎるから"],answer:1,explain:"Gitは行単位で変更を統合する。違う場所への変更なら自動でまとめられるが、『同じ行を両者が別内容に変えた』場合はどちらが正しいかをGitは決められない=人間に判断を委ねる。これがコンフリクト。だからコンフリクト解消とは『どちらの意図を生かすか(または両方をどう統合するか)』を人が決める作業であり、機械的な正解は無い。設計判断型の衝突(既存の#1問)が難しいのはこのため。"},
  {cat:"基礎 / Git",situation:"『マージ』という言葉が頻繁に出てくるが、具体的に何をしているのか曖昧。",q:"マージとは何をする操作？",options:["古いブランチを削除すること","別々に進めた2本のブランチの変更を1つに統合すること","コードを圧縮すること","コミットを取り消すこと"],answer:1,explain:"ブランチは本流を壊さず作業を枝分かれさせる仕組み。マージはその枝分かれした変更を本流(developなど)へ統合して1本に戻す操作。両者が違う箇所を変えていれば自動で統合でき、同じ箇所がぶつかればコンフリクトになる。『PRをマージする』とは、PRに紐づくブランチの変更を本流へ取り込むこと。"},
  {cat:"基礎 / 可読性",situation:"linterに『1関数◯◯行まで』という行数の上限がある。なぜそんな制限があるのか疑問。",q:"関数の行数に上限を設ける主な狙いは？",options:["ファイル容量を節約するため","関数が長すぎると読みにくく・テストしにくく・バグが入りやすくなるのを防ぐため","タイピング量を減らすため","Gitの履歴を軽くするため","CIを速くするため"],answer:1,explain:"長い関数は『一度に把握すべきこと』が多すぎて、読む人の頭に入らず、責務も混ざりやすい=バグの温床。短く分割すれば各関数の役割が明確になり、個別にテストもしやすい。行数制限は『関数を小さく保て』という設計圧をかける仕組み。容量や速度のためではなく可読性・保守性のための制約。"},
  {cat:"基礎 / セキュリティ",situation:"approval_status のような項目を外部入力から受け取るとき、『許可リスト(値の列挙)』で守る方式がある。",q:"許可リスト方式の考え方として正しいのは？",options:["危険な値を1つずつ列挙して禁止する(拒否リスト)","受け入れてよい値だけを列挙し、それ以外は全部弾く","入力は全部受け入れて後で直す","入力値の長さだけチェックする"],answer:1,explain:"許可リスト(ホワイトリスト)は『OKなものだけ通す』方式。拒否リスト(ブラックリスト)は『NGなものを列挙して弾く』が、想定外の悪い値を見落とすと素通りしてしまう。許可リストは『列挙した以外は全部拒否』なので、未知の攻撃値も自動的に弾ける=より安全。approval_statusなら取りうる正しい値だけを許可する。"},
  {cat:"基礎 / セキュリティ",situation:"Mass Assignment対策の一つに『所有確認』がある。他人の workflow_request_id を勝手に紐付けられないようにしたい。",q:"所有確認は何をチェックしている？",options:["値の形式が正しいか","操作しようとしている対象が、その操作者本人のものか(権限があるか)","入力が短すぎないか","DBが空いているか"],answer:1,explain:"値が正しい形でも、『それがあなたのものか』は別問題。他人のIDを指定して他人のデータを書き換える攻撃は、形式チェックだけでは防げない。所有確認は『この操作者は、この対象を操作してよい立場か』を確かめる認可の一種。値の検証(バリデーション)と所有・権限の検証(認可)は別レイヤーで、両方必要。"},
  {cat:"基礎 / セキュリティ",situation:"Zodの .strict() を付けると、定義していないフィールドが入力に混ざっていたら検証を失敗させられる。",q:".strict()(未知フィールド拒否)が防ぐのは？",options:["入力が短すぎること","定義外の余計な項目を紛れ込ませて、本来書き換えさせたくない値を更新される攻撃","DBの停止","通信の暗号化漏れ"],answer:1,explain:".strict()は『定義した項目以外が来たら拒否』する設定。これが無いと、攻撃者が approval_status のような余計な項目をリクエストに足し、まとめ保存処理(Mass Assignment)経由で書き換える余地が残る。許可リスト(値の制限)・所有確認・未知フィールド拒否の3つを重ねるのが多層防御。それぞれ守る角度が違うので、1つでは不十分。"},
  {cat:"基礎 / 仕様",situation:"実装が仕様書と食い違っていた(例: super_adminが申請なしで部下日報を閲覧できる)。実装の方が便利でもある。",q:"原則としてどちらを正とすべき？",options:["常に実装。動いている方が現実だから","原則は仕様。乖離はリスクなので、まず仕様に合わせ、仕様自体が間違いなら仕様を直してから実装を追従させる","常に新しく書かれた方","その時の気分で決める"],answer:1,explain:"仕様は『こう動くべき』という合意であり、セキュリティや要件の根拠になる。実装が勝手に外れている状態=情報漏洩などのリスクであり、便利さは正しさの理由にならない。原則は仕様準拠。ただし仕様が実態に合わず誤りなら、議論して仕様を更新し、その上で実装をそろえる。どちらにせよ『暗黙にズレたまま』が一番危ない。"},
  {cat:"基礎 / 設計",situation:"新機能(休憩追加)を既存の『申請→承認』フローに乗せると監査性が保てる、という判断があった。",q:"『監査性が保てる』とはどういうこと？",options:["処理が速くなること","誰が・いつ・何を変えたかの記録が残り、後から追跡・検証できること","コードが短くなること","承認が不要になること","エラーが減ること"],answer:1,explain:"監査性とは『後から、誰がいつ何をしたか追える』性質。申請→承認フローに乗せれば各変更が申請レコードとして残り、不正や誤りがあっても追跡できる。承認なしの直接編集は速いが記録が残らず、後で『誰が変えた?』を辿れない。だから新機能は既存の正しい仕組み(承認経路)に乗せる方が、一貫性も監査性も保てる。"},
  {cat:"基礎 / DB",situation:"休憩レコードで break_start はあるのに break_end が null のものを『不正レコード』と呼んでいた。",q:"なぜ break_end=null は『壊れたデータ』になりうる？",options:["nullは常に禁止だから","『開始と終了は必ずペアで揃う』という業務上の不変条件を破っているから","nullは容量を食うから","DBがnullを保存できないから"],answer:1,explain:"データには『常に成り立っていてほしい条件(不変条件)』がある。休憩なら『開始があるなら終了もある』。片方だけ承認されて break_end が欠けたレコードは、この条件を破った=業務的に意味をなさない壊れたデータ。だから開始+終了を1承認単位にまとめ、片方だけ通る経路を作らない設計(既存#19問)が必要。nullそのものが悪いのではなく、不変条件を破るnullが問題。"},
  {cat:"基礎 / DB",situation:"migration(マイグレーション)は『順番に適用・管理する』と説明される。",q:"なぜ順番が重要？",options:["アルファベット順が美しいから","各変更は前の状態を前提に積み上がるので、順番が狂うと整合性が崩れるから","新しいものから適用すると速いから","順番はどうでもよい"],answer:1,explain:"マイグレーションは『現在の構造に、この変更を加える』を積み重ねる仕組み。例えば『カラム追加→そのカラムに制約追加』は順番が逆だと成立しない。だから適用順を記録・固定し、どの環境でも同じ順で再現する。チーム全員のDBや本番が同じ構造になる(冪等・再現性)のはこの仕組みのおかげ。"},
  {cat:"基礎 / Web",situation:"APIの応答に 200 / 400 / 500 などの番号(HTTPステータスコード)が返る。",q:"このコード体系の大きな区分として正しいのは？",options:["数字が大きいほど重大なエラー","2xx=成功、4xx=要求側(クライアント)の問題、5xx=サーバー側の問題","全部エラーを表す","2xxはサーバー、4xxは通信、5xxはDB"],answer:1,explain:"先頭の桁で大きく意味が分かれる。2xx=成功、4xx=リクエストした側に原因(不正な入力・権限なし等)、5xx=サーバー側で想定外が起きた。だから400を見たら『入力やリクエストを直す』、500を見たら『サーバー内部・環境を疑う』と切り分けられる。既存問題で『ZodErrorは400相当だが想定外例外は500になった』のはこの区分のため。"},
  {cat:"基礎 / 環境",situation:"接続先のバックエンドURLを API_BASE_URL のような環境変数で外から渡す作りになっている。",q:"接続先をコードに直書きせず環境変数にする利点は？",options:["コードが短くなるから","ローカル・ステージング・本番など環境ごとに接続先を切り替えられ、コードを変えずに済むから","通信が速くなるから","セキュリティが自動で上がるから"],answer:1,explain:"接続先や鍵など『環境によって変わる値』をコードに直書きすると、環境ごとにコードを書き換える羽目になる。環境変数で外から渡せば、同じコードのまま接続先だけ差し替えられる。今回の事故も『フロントがどのURLを向いているか=環境変数の値』を確認することが、通信先の特定に直結した。"},
  {cat:"基礎 / PR",situation:"『1PR=1目的(レビュー可能な単位)』という原則が繰り返し出てくる。",q:"なぜ1つのPRを小さく1目的に保つのがよい？",options:["GitHubの容量制限のため","レビューしやすく、問題があったとき切り戻し(revert)も追跡もしやすいから","コミット数を減らすため","CIを動かさないため"],answer:1,explain:"大量の変更を1PRに詰めると、レビュアーが全体を把握しきれず見落としが増え、どの変更が何のためか追えなくなる。小さく1目的なら、レビューが的確になり、不具合時もそのPRだけ戻せる。規模が桁違いの修正を混ぜない(既存#16問)・大規模書換は別PR(既存#14問)が良いのはこの原則の現れ。"},
  {cat:"基礎 / TypeScript",situation:"any を避ける・手castを減らす、という型安全の改善が出てくる。型(TypeScript)は何のためにあるのか。",q:"型が主に防いでくれるのは？",options:["実行速度の低下","『文字列が来るはずの所に数値』のような不整合を、動かす前(コンパイル時)に検出すること","通信エラー","DBの不整合"],answer:1,explain:"型は『この値は文字列』『これは数値』と種類を宣言し、矛盾した使い方をコードを動かす前に弾く仕組み。フロントが undefined を踏むようなバグ(既存#17問)も、型がきちんと付いていれば事前に気づける。any は『どんな型でもOK』でこのチェックを無効化するため、多用すると型の恩恵を失う。"},
  {cat:"基礎 / テスト",situation:"『まず安全網としてテストを張ってからリファクタや型変更に進む』という判断が出てくる(既存#12問)。",q:"テストが『安全網』と呼ばれるのはなぜ？",options:["テストを書くと自動でバグが消えるから","変更後に『前と同じ正しい動きか』を機械的に再確認でき、壊したらすぐ気づけるから","テストがあるとレビューが不要になるから","テストはコードを速くするから"],answer:1,explain:"テストは『期待する動き』を記録したもの。これがあれば、リファクタや型変更で挙動を壊しても、テストが落ちて即座に気づける=落下を受け止める網。だから挙動を変えない作業(リファクタ)ほど、先にテストを充実させてから着手すると安全。ただし機械的チェックなので、設計や要件適合はレビューで別途見る必要がある(テスト≠レビュー)。"},
  {cat:"基礎 / セキュリティ",situation:"『認証(Authentication)』と『認可(Authorization)』は別物として使い分けられている。",q:"両者の違いとして正しいのは？",options:["同じ意味で言い換えただけ","認証=相手が誰かを確かめる、認可=その人に操作・閲覧の権限があるか判定する","認証=パスワード、認可=ID","認証はフロント、認可はバックの用語"],answer:1,explain:"認証は『あなたは誰か(本人確認・ログイン)』、認可は『あなたにこれをする権限があるか』。ログインできても(認証OK)、他人の日報を見る権限はない(認可NG)ことがある。super_admin乗っ取り問題やMass Assignmentの所有確認は、認証の先にある『認可』の話。順番は認証→認可。"},
  {cat:"基礎 / Git",situation:"作業のたびに develop から新しいブランチを切って、そこで変更する運用になっている。",q:"なぜ本流(develop)で直接作業せず、わざわざブランチを切る？",options:["Gitの仕様で直接編集できないから","本流を壊さずに変更を試せ、複数人の作業が互いに干渉しないから","ブランチが多い方が速いから","コミットが不要になるから"],answer:1,explain:"本流で直接いじると、未完成や壊れた変更がそのまま全員に影響する。ブランチを切れば、自分の作業を隔離して試行・レビューでき、問題なければマージで本流に取り込む。複数人が同時に別ブランチで進めれば衝突も最小化できる。『本流は常に動く状態に保つ』ための仕組み。"},
  {cat:"基礎 / Git",situation:"1つのコミットに大量の無関係な変更をまとめるか、意味のある単位で小さく区切るか迷う。",q:"コミットの粒度として推奨されるのは？",options:["1日1回、その日の変更を全部まとめる","『1つの意味のある変更』ごとに区切る","ファイル1個につき必ず1コミット","コミットは少ないほどよい"],answer:1,explain:"コミットは履歴を読む・戻す単位。『バグ修正』『機能追加』など意味のある塊で区切ると、後から履歴を追いやすく、問題のあるコミットだけをrevertできる。無関係な変更を混ぜると『この修正どこ?』が探しにくく、一部だけ戻すこともできない。PRを1目的に保つのと同じ発想を、コミット単位でも行う。"},
  {cat:"基礎 / DB",situation:"DBの値に NULL がある。break_end が NULL だと不正、という話も出てきた。",q:"NULL とは何を表す？",options:["数値のゼロ","空文字","『値が無い・未設定』という状態。0や空文字とは区別される","エラーの一種"],answer:2,explain:"NULLは『値が存在しない/まだ無い』を表す特別な状態で、0(数値)や''(空文字)とは別物。0は『ゼロという値がある』、NULLは『値そのものが無い』。だから break_end=NULL は『終了時刻が入っていない』=休憩が閉じていない状態を意味し、業務の不変条件(開始と終了は揃う)を破る。NULLを許すか(nullable)許さないか(NOT NULL)はデータ設計の重要な判断。"},
  {cat:"基礎 / 環境",situation:"『ローカル』『ステージング』『本番』という環境が出てくる。同じアプリなのに複数ある。",q:"環境を分ける主な理由は？",options:["サーバー代を節約するため","本番(実ユーザーが使う)に影響を与えずに、開発・検証を安全に行うため","コードを別々に書くため","Gitの都合"],answer:1,explain:"本番は実ユーザーの本物のデータが動く場所。ここでいきなり試すと事故が即被害になる。ローカル(自分のPC)で作り、ステージング(本番そっくりの検証環境)で確認し、問題なければ本番へ。段階を踏むことでリスクを下げる。接続先を環境変数で切り替えるのは、同じコードをこれら複数環境で使い回すため。"},
  {cat:"基礎 / 設計",situation:"承認フローに乗せると『承認待ちのタイムラグ』が生じる、という話があった。即時に反映される処理と、そうでない処理がある。",q:"『申請→承認』のような非同期な処理の特徴は？",options:["必ず処理が速い","要求してすぐ完了せず、別の人/処理を挟んで後から確定する","エラーが起きない","承認者が不要"],answer:1,explain:"同期的な処理は『要求したらその場で結果が返る』。承認フローは申請者が出した後、承認者の操作を待って初めて確定する=非同期で、タイムラグがある。その代わり第三者のチェックと記録(監査性)が入る。即時の管理者直接編集は速いがチェックが無い。速さと安全・監査性のトレードオフを理解した上で経路を選ぶ。"},
  {cat:"基礎 / Web",situation:"フロントエンド(画面側)とバックエンド(サーバー側)が分かれていて、APIでやり取りしている。",q:"この役割分担として正しいのは？",options:["フロントがDBを直接操作し、バックは表示だけ担当","フロントは表示・操作を担当し、データ処理やDB操作はバックがAPI経由で担当","両者は同じことを二重にやっている","バックは無くてもよい"],answer:1,explain:"フロント(ブラウザで動く)は見た目とユーザー操作を担当。データの保存・検索・権限判定などはバックエンドが担い、フロントはAPI(窓口)経由で依頼する。DBの認証情報やビジネスルールをフロントに置くと誰でも見えてしまうため、重要な処理はバック側に置く。今回の事故は『フロントがどのバックと話しているか』の取り違えだった。"},
  {cat:"基礎 / Web",situation:"コードを直したのに古い表示のままで、ハードリロード(Cmd+Shift+R)で直ることがある。",q:"なぜキャッシュで古い表示が残る？",options:["サーバーが壊れているから","一度取得したファイルをブラウザが保存(キャッシュ)して再利用し、新しい版を取りに行かないことがあるから","コードが間違っているから","通信が暗号化されているから"],answer:1,explain:"キャッシュは『一度取った物を保存して使い回す』高速化の仕組み。便利だが、サーバー側が新しくなってもブラウザが古い保存版を使い続け、変更が見えないことがある。ハードリロードはキャッシュを無視して取り直す操作。ただしこれはフロント側の話で、今回のようにバックエンドのclientが古い場合はリロードでは直らない。どの層が古いのかの切り分けが大事。"},
  {cat:"基礎 / 心構え",situation:"『実装の方が便利だから実装を正とする』『動いているから正しい』といった判断が誤りだとされた。",q:"『動いている＝正しい』と言えない理由は？",options:["動くコードは存在しないから","たまたま今は動いていても、仕様違反・セキュリティ穴・想定外の入力で壊れる可能性が隠れているから","動くなら常に正しいので、これは誤りではない","速度が出ていないから"],answer:1,explain:"『動く』は『今・この条件で・エラーが出ていない』にすぎない。仕様に違反していれば情報漏洩リスクを抱え、想定外の入力やデータでは壊れるかもしれない。正しさは『仕様・要件・安全性を満たすこと』で、現在の動作だけでは保証されない。だから便利さや動作を理由に仕様やレビューを軽視しないのが原則。"},
  {cat:"基礎 / 設計",situation:"break_add の設計で、将来に強い子テーブル方式は『作りすぎ(オーバーエンジニアリング)』として見送られた。",q:"オーバーエンジニアリングとは？",options:["コードを書くのが遅いこと","今必要な範囲に対して、過剰に複雑・高機能な設計をしてしまうこと","テストを書きすぎること","コメントが多すぎること"],answer:1,explain:"将来を見越した拡張性は良いことだが、今要らない複雑さを先回りで入れると、実装・テスト・保守の負担が増え、かえってリスクになる。『最小のマイグレーションで不変条件を守る』案が選ばれたのは、必要十分だから。複雑さは『リスクを下げる/重複を消す』など明確な理由があるときだけ足す、が原則(YAGNI: You Aren't Gonna Need It)。"},
  {cat:"基礎 / 心構え",situation:"dead codeの除去やボーイスカウトルールでの段階改善が話に出る。放置すると溜まっていく『負債』の概念がある。",q:"『技術的負債』とは何のたとえ？",options:["お金を借りてツールを買うこと","目先の速さのために妥協した設計・コードが、後で利息のように保守コストを増やすこと","コードの行数のこと","サーバー利用料"],answer:1,explain:"技術的負債は『今ラクをした分、後で余計に払う』を借金にたとえた言葉。雑な設計やdead code、未解消の不整合は、放っておくと理解・修正のコスト(利息)が積もる。だからボーイスカウトルール(触ったついでに少し改善)や段階的な解消で、負債を増やさず減らしていく。完全返済を一度に狙わず、こまめに返すのが現実的。"},
  {cat:"基礎 / エラー",situation:"今回の500は『例外(exception)が想定外でハンドリングされなかった』結果だった。",q:"プログラムにおける『例外』とは？",options:["珍しいデータのこと","処理の途中で起きた異常を知らせて、通常の流れを中断する仕組み","コメントの一種","必ずプログラムを終了させるもの"],answer:1,explain:"例外は『この先続けられない異常が起きた』ことを呼び出し元へ知らせ、通常処理を中断する仕組み。捕まえて(catch)適切に対応すれば回復や丁寧なエラー応答(400など)ができるが、想定せず捕まえ損ねると最上位まで突き抜けて500になる。だから『どの例外を想定し、どう扱うか(ハンドリング)』を設計することが、堅牢なエラー処理の核心。"},
  {cat:"基礎 / i18n",situation:"日本円で全角『￥』と半角『¥』が混在し、桁揃えがズレる問題があった(既存#11問)。同じ『円記号』なのに見た目も扱いも違う。",q:"なぜ同じ意味の記号で全角・半角の差が生まれる？",options:["フォントのバグ","文字コード上は別々の文字として定義されており、ロケールやAPIによってどちらを出すかが変わるから","半角は古い規格で消えたから","ランダムに決まるから"],answer:1,explain:"全角￥と半角¥はコンピュータ上では別の文字(別のコード)として扱われる。Intl.NumberFormatのようなAPIはロケール(ja-JP)に応じて全角￥を出すことがあり、既存の半角¥と混ざる。等幅フォントの表では字幅が違うので桁がズレる。『見た目が同じ＝同じ文字』ではない、という文字コードの基礎が背景にある。"},
  {cat:"基礎 / DB",situation:"DBへの操作で『INSERT』『SELECT』といった命令が出てくる。これらは SQL という言語の一部。",q:"SQL とは何のための言語？",options:["画面を装飾するための言語","データベースに対してデータの取得・追加・更新・削除を指示するための言語","サーバーを起動する言語","通信を暗号化する言語"],answer:1,explain:"SQLはリレーショナルDBを操作する専用言語。代表的な命令は SELECT(取得)・INSERT(追加)・UPDATE(更新)・DELETE(削除)の4つ(まとめてCRUD)。Prismaのような ORM は、このSQLを直接書かずにコードからDB操作できるようにする層。だからORMが生成するclientが古いと、新カラム向けの正しいSQLを組み立てられず失敗する。"},
  {cat:"基礎 / DB",situation:"データ操作の基本動作を『CRUD』とまとめて呼ぶ場面がある(管理者編集に break の CRUD を追加、など)。",q:"CRUD が指す4つの操作は？",options:["Copy / Run / Update / Delete","Create(作成) / Read(読取) / Update(更新) / Delete(削除)","Commit / Review / Undo / Deploy","Cache / Render / Upload / Download"],answer:1,explain:"CRUDはデータ操作の基本4種=Create・Read・Update・Delete の頭文字。SQLのINSERT/SELECT/UPDATE/DELETEに対応する。『breakのCRUDを追加』とは休憩データの作成・参照・更新・削除を一通り扱えるようにすること。多くのアプリ機能はこの4操作の組み合わせでできている。"},
  {cat:"基礎 / Web",situation:"APIに対して GET / POST などの『HTTPメソッド』を使い分ける。DELETE API という言葉も出てきた。",q:"GET と POST のおおまかな使い分けは？",options:["GETもPOSTも同じで好みで選ぶ","GET=データの取得(状態を変えない)、POST=データの送信・作成(状態を変える)","GETは速く、POSTは遅いだけの違い","GETはフロント、POSTはバック専用"],answer:1,explain:"HTTPメソッドは『その操作の意図』を表す。GETは取得で副作用が無い(何度呼んでも状態は変わらない)。POSTは作成・送信で状態を変える。ほかにUPDATE的なPUT/PATCH、削除のDELETEがある。CRUDと対応づくことが多く(Read=GET, Create=POST, Delete=DELETE)、意図に合ったメソッドを選ぶのが設計の基本。"},
  {cat:"基礎 / Web",situation:"GET は『何度呼んでも状態が変わらない』、DELETE も『同じものを2回消しても結果は同じ』という性質を持つ。マイグレーションの冪等な再適用でも同じ概念が出た。",q:"この『冪等』という性質の意味は？",options:["1回しか実行できないこと","同じ操作を何回繰り返しても、結果(状態)が同じになること","必ず成功すること","処理が速いこと"],answer:1,explain:"冪等とは『繰り返しても結果が変わらない』性質。例えば『この行を削除』は2回実行しても最終状態(その行が無い)は同じ=冪等。逆に『残高に+100する』は呼ぶたび増えるので冪等でない。冪等な操作はリトライや再適用が安全(二重実行で壊れない)。冪等なマイグレーションが重要なのは、誤って再適用しても壊れないため。"},
  {cat:"基礎 / Git",situation:"変更を記録するとき git add してから git commit する。間に『ステージング(ステージ)』という段階がある。",q:"git add(ステージング)は何をしている？",options:["変更をリモートに送っている","次のコミットに含める変更を選んで準備している","変更を取り消している","ブランチを作っている"],answer:1,explain:"Gitは『作業中の変更→ステージ(コミット予定)→コミット(記録)』の3段階。git add は『この変更を次のコミットに入れる』と選ぶ操作=ステージング。これにより、たくさんの変更のうち関連するものだけを選んで1コミットにまとめられる(粒度の調整)。commitで初めて履歴に記録され、pushでリモートに送られる。"},
  {cat:"基礎 / Git",situation:"作業した変更はまずローカルにコミットされ、その後 push で初めてGitHubに反映される。",q:"ローカルとリモートの関係として正しいのは？",options:["コミットした瞬間にGitHubにも反映される","コミットは手元(ローカル)の記録で、pushして初めてリモート(GitHub)に送られる","pushしなくても他人から見える","ローカルとリモートは常に自動同期する"],answer:1,explain:"Gitは分散型で、手元に履歴の完全なコピーを持つ。commitはローカルの履歴に記録するだけで、この時点では自分しか見えない。pushでリモート(GitHub)へ送って初めて共有される。逆にpullで他人の変更を取り込む。『コミットしたのに反映されない』は、push忘れが定番の原因。"},
  {cat:"基礎 / Web",situation:"フロントとバックは『JSON』という形式でデータをやり取りすることが多い。APIの応答もJSONが一般的。",q:"JSON とは？",options:["画像の圧縮形式","キーと値で構造化データを表す軽量なテキスト形式。プログラム間のデータ交換に広く使う","データベースの一種","暗号化方式"],answer:1,explain:"JSONは {\"key\": \"value\"} のように、キーと値でデータを表すテキスト形式。人にも読めて、多くの言語で簡単に変換できるため、API のリクエスト/レスポンスの定番。フロントが送る入力もJSON、バックが返す結果もJSON。Zodはこの受け取ったJSONが期待した形か検証する役割を担う。"},
  {cat:"基礎 / 設計",situation:"approval_status のような項目に『取りうる値が決まっている』ものがある。enum(列挙型)やErrorCodeのコード化もこの考え方。",q:"値を『決まった集合』に限定すると何が良い？",options:["メモリを節約できる","取りうる値が明確になり、想定外の値の混入や打ち間違いを型・検証で防げるから","通信が速くなるから","コードが短くなるだけ"],answer:1,explain:"『この項目はこの数種類しか取らない』と定義(enum)すれば、それ以外の値はそもそも入れられなくなり、タイプミスや不正値を事前に弾ける。エラーコードを文言でなくコード(enum)で管理するのも同じ狙いで、表記揺れを防ぎ多言語化もしやすい。許可リストで approval_status を制限するのも、値を決まった集合に閉じ込める発想。"},
  {cat:"基礎 / 心構え",situation:"レビュー指摘や自動レポートの提案(『この冗長コードを消そう』等)が、調べると誤りだったことがあった(既存#20問)。",q:"指摘・提案への向き合い方として適切なのは？",options:["指摘は常に正しいので無条件に従う","指摘の前提が正しいかを自分で確かめ、誤りなら理由を添えて従わない判断もする","指摘は全部無視して自分の考えを通す","面倒なので指摘されたら全部消す"],answer:1,explain:"レビューや自動ツールの指摘は有用だが、前提を誤ることもある(冗長に見えたコードが実は意図的だった等)。鵜呑みも全拒否もせず、『なぜそう言えるか』を確かめて判断するのが正しい。従わない場合は理由を残し(コメントやIssue)、次に読む人にも伝わるようにする。指摘は『考えるきっかけ』であって絶対の命令ではない。"},
  {cat:"基礎 / セキュリティ",situation:"フロント側でも入力チェックはするが、バック側でも必ず検証(Zod等)する二重構造になっている。",q:"なぜフロントだけでなくバックでも検証する？",options:["念のための無駄な二重化","フロントの検証は迂回・改ざんできるため、最後の砦としてバック側の検証が必須だから","バックの方が速いから","フロントは検証できないから"],answer:1,explain:"フロントの入力チェックは『親切なUI』のためで、ブラウザの開発者ツールや直接APIを叩けば簡単に迂回できる。だから信頼できる検証はサーバー側に必ず置く=最後の砦。Mass Assignment対策や .strict() がバック側にあるのはこのため。『フロントの入力は信用しない』がセキュリティの基本姿勢。"},
  {cat:"基礎 / 環境",situation:"古いPrisma clientの問題は『5日前に生成されたまま依存が古い』ことが原因だった。ライブラリやツールには版(バージョン)がある。",q:"『生成物や依存が古い』ことが問題になるのはなぜ？",options:["古いと必ず動かないから","コード(新しい前提)と、それが使う生成物/依存(古いまま)の間にズレが生じ、想定外の不整合や不具合が起きるから","古いものは存在できないから","新しい方が常に遅いから"],answer:1,explain:"コードは『新しいスキーマ/APIがある前提』で書かれるのに、それを支える生成物(Prisma client)や依存ライブラリが古いままだと、両者の期待がズレる=新カラムを知らない、関数が無い等の不整合が起きる。だからスキーマや依存を更新したら、生成物の再生成(generate)やインストールを揃える必要がある。『コードだけ新しくしても土台が古い』が今回の罠だった。"},
  {cat:"基礎 / Git UI",situation:"VS Code 左下のステータスバーに、ブランチ名と並んで『39↓ 0↑』のような数字が出ている。",q:"この『↓』と『↑』の数字は何を表す？",options:["↓=エラー数、↑=警告数","↓=リモートから取り込んでいない(pullすべき)コミット数、↑=まだ送っていない(pushすべき)コミット数","↓=削除した行、↑=追加した行","↓=ブランチ数、↑=タグ数"],answer:1,explain:"↓は『リモートにあって手元に無い＝pullで取り込む分』、↑は『手元でコミット済みだがまだ送っていない＝pushする分』。中央の↻はSync(pull→pushをまとめて実行)ボタン。⊗0 ⚠0 は別物でProblemsのエラー/警告数(Gitとは無関係)。ブランチ名末尾の*は『未コミットの変更が手元にある』印。"},
  {cat:"基礎 / Git UI",situation:"いま作業ブランチ feature-x を開いていて、ステータスバーは『39↓ 0↑』。この↓↑が何と何を比べた数字なのかを確認したい。",q:"この↓↑が比較しているのは？",options:["develop と origin/develop","いまチェックアウト中のブランチ(feature-x) と その追跡先リモートブランチ","ローカルの全ブランチ同士","main と develop"],answer:1,explain:"ステータスバーの↓↑は常に『今チェックアウト中のブランチ vs その upstream(追跡先)』を比べる。だから feature-x を開いている間は develop の状態は表示されない。develop の↓↑を見たければ develop にチェックアウトし直す必要がある。『この数字＝developの状態』と思い込むのが誤解の元。"},
  {cat:"基礎 / Git",situation:"develop を主軸に開発している。『develop の push/pull が 0 なら、自分の作業は問題ないか？』という疑問。",q:"これだけで『問題なし』と言える？",options:["言える。developが最新なら全て安全","言えない。それはdevelopがリモートと一致しているだけで、自分の作業ブランチがdevelopの最新を取り込めているかは別問題","言える。push/pullが0なら全ブランチが同期している","develop以外は確認不要"],answer:1,explain:"develop が 0↓0↑ なのは『手元のdevelopがリモートのdevelopと同じ最新』という意味にすぎない。本当に注意すべきは『develop は進んだのに、派生した作業ブランチがその進んだ分を取り込めていない』状態で、これはdevelopの↓↑を見てもわからない。git fetch して『作業ブランチ..origin/develop』の差分を確認し、遅れていれば定期的にdevelopをmerge/rebaseで取り込むのが安全。"},
  {cat:"基礎 / Git",situation:"作業ブランチ audit-704 は develop から派生し、PRで既に develop にマージ済み。だがそのブランチに居残っていると『39↓』と表示される。",q:"このマージ済みブランチの『39↓』をどう扱う？",options:["危険なので39コミットをこのブランチに取り込んで最新化する","追従不要。これは『このブランチはもう古い・用済み』のサイン。develop に戻って pull し、用済みブランチは削除する","PRをもう一度作り直す","developを39コミット巻き戻す"],answer:1,explain:"PRがマージ済みなら作業内容は既にdevelopに入っており、やり残しは無い。マージ後にdevelopが他の人の変更で進むため、古いブランチに居残ると『追跡先より39遅れている』と出るだけ=用済みのサイン。最新化する意味は無く、正しい後始末は『develop に checkout → pull で最新化 → 用済みブランチを削除 → 最新developから次の新ブランチを切る』。古い派生元で作業し続ける事故を防げる。"},
  {cat:"基礎 / Git",situation:"作業ブランチがマージ済みかを念のため確かめたい。",q:"確実な確認方法として適切なのは？",options:["ステータスバーの↓の数字が大きいことを確認する","PR画面のMerged表示を見る、または git fetch 後に『git branch --merged origin/develop』で対象ブランチが出るか確認する","ブランチ名に merged と付いているか見る","コミット数を数える"],answer:1,explain:"↓の数字が大きいことはマージ済みの証拠にはならない(単に遅れているだけかも)。確実なのはPRがMergedになっているかを見るか、git branch --merged origin/develop で『developに完全に取り込まれたブランチ』の一覧に出るかを確認すること。出れば取り込み済みの確証。出ない場合はマージ後に追加コミットした等の可能性があり、その差分だけ確認すればよい。"},
  {cat:"基礎 / Git",situation:"作業ブランチに未コミットの変更(ブランチ名末尾の*)がある状態で、リモートの最新を取り込みたい(pull したい)。",q:"安全な進め方は？",options:["そのまま pull する。Gitが自動で全部うまくやる","先に変更をコミット(または stash で退避)してから pull する","未コミットの変更を全部破棄してから pull する","pull せずに作業を続ける"],answer:1,explain:"未コミットの変更があるままpullすると、取り込む変更とぶつかって競合・予期せぬ上書きが起きることがある。まず自分の変更を『コミットして区切る』か『stashで一時退避』してからpullすると安全。破棄は変更を失うので最終手段、放置は遅れが溜まって後のマージが大変になる。『手元を一旦きれいな状態にしてから取り込む』が基本。"},
  {cat:"設計判断",situation:"会社ごとに休日が違うバグを直したい。データに『どの会社か(company_id)』を持たせる設計案がある。Issueの推奨は案B(NOT NULL=会社IDを必須化)。だが調査で判明した制約: 認証コンテキストにcompany_idが無い・営業日判定が会社情報なしで呼ばれている・会社選択UIが存在しない・既存は全社共通設計。これは小さなbug-fixのはず。",q:"採用する設計案としてベストは？",options:["案B(NOT NULL必須)。データの意味が明確で一番きれいだから","案A(NULL許容)。NULL=全社共通/値あり=会社固有とし、既存を壊さず最小修正で段階移行できるから","案C(現状維持)。設計を変えずIssueをクローズする","会社選択UI・認証改修まで含め一気に作り直す"],answer:1,explain:"案B(必須化)を完全採用すると『その必須のcompany_idをどこから取るか』が問題になり、認証へのcompany_id追加→営業日判定の引数追加→呼び出し元すべての改修→会社選択UI、と芋づる式に大工事化してbug-fixの範囲を大きく超える。案A(NULL許容)なら既存の全社共通データを壊さず、必要な所だけ会社固有の休日を足せて段階移行でき、現状アーキとの相性も高い。『正しさは保ちつつ変更は最小限』を満たす案を選ぶ(=既存の最小マイグレーション・新機能を既存フローに乗せる判断と同根)。案Bが本筋になるのは会社選択UIや認証整備まで含む別の大きなIssueとして扱う場合。"},
  {cat:"設計判断",situation:"上と同じ件。Issueには『推奨は案B』と書かれていたが、着手後の調査で『認証にcompany_idが無い/会社選択UIが無い』など、案Bを重くする制約が新たに判明した。",q:"Issueの推奨と、調査で判明した制約が食い違うときどうする？",options:["Issueの推奨が絶対なので必ず案Bで進める","調査で分かった制約を踏まえて方針を見直し、必要なら推奨と違う案(A)を理由とともに提案・確認する","制約は無視してとりあえず動くものを作る","判断できないのでIssueをクローズする"],answer:1,explain:"Issueの推奨は『その時点の情報による暫定方針』であって絶対の命令ではない。着手後の調査で前提を覆す制約(認証にID無し・UI無し等)が分かったら、それを踏まえて方針を見直すのが正しい。鵜呑みにせず、なぜ推奨と違う案が適切かを理由とともに示して確認する。これは『指摘・提案の前提を自分で確かめる』姿勢と同じで、新事実が出たら判断を更新するのが妥当。"},
  {cat:"設計判断",situation:"設計でNULLの扱いを決める。案Aは『company_id が NULL=全社共通、値あり=その会社固有』とNULLに意味を持たせる。一方でNULLは『未設定・値なし』を表す状態でもある。",q:"このようにNULLに意味を持たせる設計の注意点は？",options:["NULLは使えないので不可能","『NULL=全社共通』という約束をコード全体で一貫させ、ドキュメント化しないと『未設定なのか全社共通なのか』が曖昧になり誤読・バグを生む","NULLは常に最良の選択なので注意点はない","NULLを使うと必ずエラーになる"],answer:1,explain:"NULLは本来『値なし』を表すため、そこに『全社共通』という業務的な意味を乗せると、読み手が『単に入れ忘れたのか/意図的な全社共通なのか』を区別できなくなる危険がある。だから採用するなら『NULL=全社共通』という約束を全コードで一貫させ、コメントや仕様に明記して誤読を防ぐ必要がある。これを徹底できれば既存を壊さず段階移行できる有効な手だが、約束が曖昧だと静かなバグの温床になる(意図はコメントで見える化する、と同じ考え)。"}
];

  "冪等":"何回実行しても結果が同じになる性質。再適用しても壊れないマイグレーションなどに重要。",
  "再現性":"同じ手順なら誰の環境でも同じ結果になる性質。マイグレーションやビルドで重要。",
  "コンパイル時":"プログラムを動かす前に、コードを変換・検査する段階。型の不整合などはここで検出される。",
  "実行時":"プログラムが実際に動いている最中。コンパイル時に防げなかった問題はここで顔を出す。",
  "ステータスコード":"HTTP応答に付く3桁の番号。2xx=成功、4xx=要求側の問題、5xx=サーバー側の問題。",
  "200":"成功を示すHTTPステータス。リクエストが正常に処理されたことを表す。",
  "ホワイトリスト":"受け入れてよいものだけを列挙し、それ以外を弾く方式。許可リストと同じ。",
  "ブラックリスト":"禁止したいものを列挙して弾く方式。列挙漏れがあると素通りする弱点がある(拒否リスト)。",
  "認可(所有確認)":"操作対象がその人のものか・操作権限があるかを確かめること。値の正しさ検証とは別レイヤー。",
  "業務上の不変条件":"その業務で必ず守られるべきルール(例: 開始があるなら終了もある)。データ設計の根拠になる。",
  "Prisma":"TypeScript向けのORM。schema.prismaの定義から型付きのDBアクセスコード(client)を生成する。",
  "ORM":"オブジェクトとDBのテーブルを対応づけ、SQLを直接書かずにDB操作できるようにする仕組み。",
  "prisma generate":"schema.prismaの定義からPrisma client(DBアクセス用のコード)を生成・更新するコマンド。スキーマを変えたら再実行が必要。",
  "Prisma client":"prisma generateで生成される、型付きでDBを操作するためのコード。古いままだと新しいカラムを認識しない。",
  "schema.prisma":"Prismaでテーブルやカラムの定義を書くスキーマファイル。ここを変えたらprisma generateとマイグレーションが必要。",
  "Nuxt":"Vueベースのフロントエンドフレームワーク。サーバーサイドレンダリングやAPIプロキシ機能を持つ。",
  "プロキシ":"リクエストを別の宛先へ中継する仕組み。フロントの/api/**をバックエンドのURLへ転送するなど。",
  "API_BASE_URL":"APIリクエストの転送先(バックエンド)を指定する環境変数。フロントはここで指定した先に通信する。",
  "Docker":"アプリを『コンテナ』という隔離環境にまとめて動かす仕組み。環境差をなくして同じように動かせる。",
  "コンテナ":"Dockerで作る隔離された実行環境。アプリと必要な依存をまとめて1つのプロセスとして動かす。",
  "docker compose":"複数のコンテナの起動・設定をまとめて管理するDockerのツール。",
  "マウント":"ホスト側のファイル/ディレクトリをコンテナ内から参照できるよう結びつけること。コードを最新に保てる。",
  "--watch":"ファイルの変更を監視し、変わったら自動で反映・再実行するオプション。",
  "ポート":"1台のマシン上で複数のサーバーを区別するための番号(例: 8080)。同じマシンでも別ポートなら別プロセス。",
  "host":"コンテナの外側、つまり自分のPC(マシン本体)側のこと。コンテナ内と対比して使う。",
  "500":"サーバー内部エラー。サーバー側で想定外の問題が起きたことを示すHTTPステータス。",
  "400":"クライアントエラー。入力など要求側の問題を示すHTTPステータス(不正な値など)。",
  "INSERT":"DBに新しいレコード(行)を追加するSQL操作。",
  "ハードリロード":"ブラウザのキャッシュを無視して再読み込みすること(Cmd+Shift+R等)。フロントの古い表示対策。",
  "ZodError":"Zodの入力検証に失敗したときに投げられるエラー。これを捕まえて400などを返すことが多い。",
  "review エージェント":"コード変更をレビューする専用のAIエージェント。実装した本人とは別の客観的な視点でチェックできる。",
  "自己検証":"実装者(やそのエージェント)自身がテストやlintを走らせて自分の変更を確認すること。機械的チェック中心で、レビューの代わりにはならない。",
  "スキル規定":"そのプロジェクトやツールで定められた作業手順・ルール。『review必須』などの取り決めを含む。",
  "create":"データを新規作成する操作(CRUDのC)。",
  "update":"既存データを更新する操作(CRUDのU)。",
  "deleteBreak":"休憩(break)レコードを削除するバックエンドの関数名の例。",
  "undefined":"JavaScriptで『値が未定義』を表す状態。想定外のundefinedアクセスはエラーの原因になる。",
  "実害":"放置すると実際に不具合や被害が出ること。優先度を判断する材料になる。",
  "承認反映":"申請が承認された結果を実データや画面へ反映する処理。",
  "DELETE":"HTTPメソッドの一つ。リソースの削除を表す(GET取得/POST作成/PUT更新など)。",
  "監査性":"誰がいつ何を変更したかを後から追跡・検証できる性質。承認フローや変更ログで担保する。",
  "監査ログ":"操作の履歴(誰が・いつ・何を)を記録したもの。不正調査や検証の証跡になる。",
  "ワークフロー":"申請→承認→反映のように、決められた順序で処理を進める業務フロー。",
  "セルフサービス":"利用者自身が操作・申請して完結できる仕組み。管理者の手を借りない。",
  "CRUD":"データ操作の基本4つ。Create(作成)/Read(取得)/Update(更新)/Delete(削除)の頭文字。",
  "不変条件":"システムが常に守るべき前提・ルール(invariant)。壊すとデータ不整合やバグの原因になる。",
  "nullable":"その項目に空(null)を許す設定。値が未定でもよいことを表す。",
  "オーバーエンジニアリング":"今は不要な拡張性まで作り込み、必要以上に複雑にしてしまうこと。",
  "scope creep":"当初の作業範囲が少しずつ膨らんで本来の目的を超えてしまうこと。",
  "PUT":"HTTPメソッドの一つ。リソースの更新(置き換え)を表す。",
  "DateTime":"日付と時刻をまとめて表すデータ型。",
  "mock":"テストで本物の代わりに使う偽物のデータや処理。依存を切り離して検証しやすくする。",
  "Prisma":"DBをTypeScriptから型安全に操作できるORM(データベースツール)。",
  "ORM":"DBのテーブルをプログラムのオブジェクトとして扱えるようにする仕組み。",
  "@default(false)":"Prismaスキーマの指定。その項目を省略したらDB側で自動的にfalseを入れる既定値設定。",
  "フォールバック":"指定や値が無いときに使う代替の動き・既定値。",
  "忠実性":"テストのmockなどが本物の挙動をどれだけ正確に再現できているか。",
  "won't-fix":"課題として認識した上で『今回は対応しない』と判断してクローズすること。",
  "spread":"{ ...data } のように既存オブジェクトの中身を展開してコピーするJavaScriptの記法。"
};
const GLOSS_TERMS=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GLOSS_RE=new RegExp(GLOSS_TERMS.map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|'),'g');
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
// テキストをエスケープしつつ、用語にハイライト用spanを付与する（同一テキスト内では各用語を1回だけ）
function gloss(text){
  const seen=new Set();
  return esc(text).replace(GLOSS_RE,(m,offset,full)=>{
    if(seen.has(m))return m;
    if(/^[\x20-\x7e]+$/.test(m)){ // 英数字の用語は、より長い単語の一部なら除外
      const b=full[offset-1],a=full[offset+m.length];
      if(b&&/[A-Za-z0-9]/.test(b))return m;
      if(a&&/[A-Za-z0-9]/.test(a))return m;
    }
    seen.add(m);
    return `<span class="term" tabindex="0" data-def="${escAttr(GLOSSARY[m])}">${m}</span>`;
  });
}
function initGlossary(){
  const pop=document.createElement('div');
  pop.className='glosspop';pop.style.display='none';
  document.body.appendChild(pop);
  let pinned=null,timer=null;
  function show(el){
    pop.textContent=el.getAttribute('data-def');
    pop.style.display='block';pop.style.left='0px';pop.style.top='0px';
    const r=el.getBoundingClientRect();
    const pw=pop.offsetWidth,ph=pop.offsetHeight,vw=document.documentElement.clientWidth;
    let left=window.scrollX+r.left+r.width/2-pw/2;
    left=Math.max(window.scrollX+8,Math.min(left,window.scrollX+vw-pw-8));
    let top=window.scrollY+r.top-ph-10;
    if(top<window.scrollY+4)top=window.scrollY+r.bottom+10;
    pop.style.left=left+'px';pop.style.top=top+'px';
  }
  function hide(){pop.style.display='none';}
  document.addEventListener('mouseover',e=>{const t=e.target.closest&&e.target.closest('.term');if(t){clearTimeout(timer);if(!pinned)show(t);}});
  document.addEventListener('mouseout',e=>{const t=e.target.closest&&e.target.closest('.term');if(t&&!pinned)timer=setTimeout(hide,140);});
  document.addEventListener('click',e=>{
    if(e.target.closest('.glosspop'))return;
    const t=e.target.closest('.term');
    if(t){e.stopPropagation();if(pinned===t){pinned=null;hide();}else{pinned=t;show(t);}return;}
    if(pinned){pinned=null;hide();}
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){pinned=null;hide();return;}
    const ae=document.activeElement;
    if((e.key==='Enter'||e.key===' ')&&ae&&ae.classList&&ae.classList.contains('term')){
      e.preventDefault();if(pinned===ae){pinned=null;hide();}else{pinned=ae;show(ae);}
    }
  });
  window.addEventListener('scroll',()=>{if(pinned)show(pinned);else hide();},true);
  window.addEventListener('resize',()=>{if(pinned)show(pinned);else hide();});
}

const LS_BEST="learnquiz_best_v1";
const LS_DELETED="learnquiz_deleted_v1";
let pool=QUESTIONS.slice();
let activeCats=null;
let order=[],idx=0,score=0,answered=false,history=[];

function getBest(){try{return JSON.parse(localStorage.getItem(LS_BEST))||{};}catch(e){return {};}}
function setBest(b){try{localStorage.setItem(LS_BEST,JSON.stringify(b));}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// 削除した問題はこの端末に記録し、以後出題しない（問題文＋カテゴリで識別。復元も可能）
function qkey(q){return q.cat+'|'+q.q;}
function getDeleted(){try{return JSON.parse(localStorage.getItem(LS_DELETED))||{};}catch(e){return {};}}
function setDeleted(d){try{localStorage.setItem(LS_DELETED,JSON.stringify(d));}catch(e){}}
function liveQuestions(){const d=getDeleted();return QUESTIONS.filter(q=>!d[qkey(q)]);}
function deletedCount(){return Object.keys(getDeleted()).length;}
function restoreDeleted(){setDeleted({});}
function deleteCurrent(){
  if(answered)return;
  const q=pool[order[idx]];
  if(!confirm('この問題を削除しますか？\nこの端末では今後出題されなくなります（復元も可能）。'))return;
  const d=getDeleted();d[qkey(q)]=1;setDeleted(d);
  order.splice(idx,1);
  if(idx>=order.length)renderResult();else renderQ();
}

function renderBest(){
  const b=getBest();
  const el=document.getElementById('best');
  if(b.pct!=null){el.innerHTML=`ベスト記録 <b>${b.pct}%</b>（${b.score}/${b.total}）`;}
  else{el.textContent="";}
}

function setBar(p){const el=document.getElementById('bar');if(el)el.querySelector('i').style.width=p+'%';}

function start(){
  const base=liveQuestions();
  pool=activeCats?base.filter(q=>activeCats.includes(q.cat)):base.slice();
  order=shuffle(pool.map((_,i)=>i));
  idx=0;score=0;answered=false;history=[];
  renderQ();
}

function renderQ(){
  const s=document.getElementById('screen');
  if(idx>=order.length)return renderResult();
  const q=pool[order[idx]];answered=false;
  s.innerHTML=`
    <div class="bar" id="bar"><i></i></div>
    <div class="toprow">
      <span class="cat">${esc(q.cat)}</span>
      <span class="meta">問題 ${idx+1} / ${order.length}　スコア ${score}</span>
    </div>
    <div class="situation"><div class="lbl">状況</div><div class="body">${gloss(q.situation)}</div></div>
    <div class="question">${gloss(q.q)}</div>
    <div class="opts" id="opts"></div>
    <div id="fb"></div>
    <div id="delrow"><button class="delbtn" id="delq">🗑 この問題を削除</button></div>`;
  setBar(idx/order.length*100);
  const marks=['A','B','C','D'];
  const opts=document.getElementById('opts');
  q.options.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt';
    b.innerHTML=`<span class="mk">${marks[i]}</span><span>${gloss(o)}</span>`;
    b.onclick=(e)=>{if(e.target.closest('.term'))return;pick(i);};
    opts.appendChild(b);
  });
  document.getElementById('delq').onclick=deleteCurrent;
}

function pick(i){
  if(answered)return;answered=true;
  const dr=document.getElementById('delrow');if(dr)dr.style.display='none';
  const q=pool[order[idx]];
  const correct=i===q.answer;
  if(correct)score++;
  history.push({cat:q.cat,correct});
  const opts=document.getElementById('opts').children;
  for(let k=0;k<opts.length;k++){
    opts[k].disabled=true;
    if(k===q.answer)opts[k].classList.add('correct');
    else if(k===i)opts[k].classList.add('wrong');
  }
  const last=idx+1>=order.length;
  document.getElementById('fb').innerHTML=`
    <div class="fb">
      <div class="res ${correct?'ok':'ng'}">${correct?'✓ 正解':'✕ 不正解'}</div>
      <div class="exp"><b>解説：</b>${gloss(q.explain)}</div>
      <button class="next" id="nx">${last?'結果を見る':'次の問題 →'}</button>
    </div>`;
  setBar((idx+1)/order.length*100);
  document.getElementById('nx').onclick=()=>{idx++;renderQ();};
}

function renderResult(){
  const total=order.length;
  if(total===0){
    document.getElementById('screen').innerHTML=`
      <div class="result">
        <div class="msg">出題できる問題がありません。${deletedCount()>0?'削除した問題を復元してください。':'カテゴリの選択を見直してください。'}</div>
        <div class="actions">
          ${deletedCount()>0?`<button class="next" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
          <button class="ghost" onclick="catScreen()">カテゴリを選ぶ</button>
        </div>
      </div>`;
    return;
  }
  const pct=Math.round(score/total*100);
  let msg;
  if(pct===100)msg="完璧。パターン認識が完全に身についています。";
  else if(pct>=70)msg="優秀。実践の判断軸がしっかり定着しています。";
  else if(pct>=40)msg="良い調子。解説を見返してパターンを掴みましょう。";
  else msg="復習のチャンス。状況のタイプ判別から見直しを。";
  const b=getBest();
  let isBest=false;
  if(b.pct==null||pct>b.pct){setBest({pct,score,total});isBest=true;}
  renderBest();
  const marks={};
  document.getElementById('screen').innerHTML=`
    <div class="result">
      <div class="big">${pct}%</div>
      <div class="of">${score} / ${total} 問正解${isBest?'　🎉 自己ベスト更新':''}</div>
      <div class="msg">${msg}</div>
      <div class="review">
        ${history.map(h=>`<div class="rrow"><span>${esc(h.cat)}</span><span class="ic ${h.correct?'ok':'ng'}">${h.correct?'✓':'✕'}</span></div>`).join('')}
      </div>
      <div class="actions">
        <button class="next" onclick="catScreen()">カテゴリを選んで再挑戦</button>
        <button class="ghost" onclick="start()">全問もう一度</button>
        ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();start()">削除した問題を復元（${deletedCount()}件）</button>`:''}
      </div>
    </div>
    <div class="note">記録はこの端末に保存されます。<br>新しい問題を増やしたいときは、Claudeに「クイズ更新して」と伝えて最新版ファイルを受け取ってください。</div>`;
}

function catScreen(){
  const cats=[...new Set(liveQuestions().map(q=>q.cat))];
  if(!activeCats)activeCats=cats.slice();
  else activeCats=activeCats.filter(c=>cats.includes(c));
  const s=document.getElementById('screen');
  s.innerHTML=`
    <div style="margin-bottom:18px;font-size:14px;color:var(--txt2);">出題するカテゴリを選んでください（タップで切替）</div>
    <div class="pills" id="pills"></div>
    <div class="actions">
      <button class="next" onclick="start()">スタート</button>
      <button class="ghost" onclick="activeCats=null;start()">全カテゴリで開始</button>
      ${deletedCount()>0?`<button class="ghost" onclick="restoreDeleted();catScreen()">削除した問題を復元（${deletedCount()}件）</button>`:''}
    </div>`;
  const p=document.getElementById('pills');
  cats.forEach(c=>{
    const b=document.createElement('button');
    b.className='pill'+(activeCats.includes(c)?' on':'');
    b.textContent=c;
    b.onclick=()=>{
      if(activeCats.includes(c))activeCats=activeCats.filter(x=>x!==c);
      else activeCats.push(c);
      if(activeCats.length===0)activeCats.push(c);
      catScreen();
    };
    p.appendChild(b);
  });
}

initGlossary();
renderBest();
start();
</script>
</body>
